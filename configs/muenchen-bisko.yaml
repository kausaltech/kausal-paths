#//////  Nodes  ///////////////////////////////////////////////////////////////////////////////////////////////////

nodes:

- id: action_data
  name: Action data
  type: generic.GenericNode
  quantity: emissions
  unit: kt/a
  input_dimensions: [action, sector, energy_carrier]
  output_dimensions: [action, sector, energy_carrier]
  input_datasets:
  - id: muenchen/direkte_massnahmen_ikka
    # tags: [inventory_only]

- id: population
  name_en: Population
  name_de: Bevölkerung
  type: simple.AdditiveNode
  quantity: number
  unit: cap
  historical_values: [[2018, 1505306], [2023, 1505306]]
  input_dataset_processors: [LinearInterpolation]

- id: net_emissions
  name_de: Netto-Emissionen
  name_en: Net emissions
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  is_outcome: true
  goals:
  - label_de: Emissionen
    label_en: Emissions
    default: true
    linear_interpolation: true
    is_main_goal: true
    values:
    - year: 2023
      value: 3000
    - year: 2040
      value: 0

- id: now_year
  name_de: Aktuelles Jahr
  name_en: Current year
  type: generic.ConstantNode
  quantity: number
  unit: dimensionless
  params:
  - id: constant
    value: 2024
    unit: dimensionless

- id: scaling_rate
  name_de: Skalierungsfaktor
  name_en: Scaling rate
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: now_year
    tags: [n]
  params:
    formula: 3 * (max(0, min(1, (year(n) - n) / (2035 - n)))) ** 2 - 2 * (max(0,
      min(1, (year(n) - n) / (2035 - n)))) ** 3

- id: emission_reduction_potential
  name_de: Emission Reduktionspotential
  name_en: Emission reduction potential
  type: formula.FormulaNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, action] # TODO sector --> handlungsfeld
  output_dimensions: [sector, action]
  input_datasets:
  - id: muenchen/emission_reduction_potential_total
    tags: [potential]
  input_nodes:
  - id: scaling_rate
  params:
    formula: drop_nans(extend_all(potential) * scaling_rate)

- id: action_index
  name_de: Aktion Index
  name_en: Action index
  type: generic.GenericNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [action, sector, energy_carrier, vehicle_type]
  output_dimensions: [action, sector, energy_carrier, vehicle_type]
  input_datasets:
  - id: muenchen/action_index
  params:
    operations: get_single_dataset  # inventory_only omitted: dataset has 2024 data, beyond Munich's max_historical_year 2023

- id: action_emission_shares
  name_de: Emissionenanteil nach Maßnahme
  name_en: Action emission shares
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [sector, energy_carrier, vehicle_type, action]
  output_dimensions: [sector, energy_carrier, vehicle_type, action]
  input_nodes:
  - id: stationary_energy_by_type
    tags: [st]
    to_dimensions:
    - id: vehicle_type
      categories: [none]
    - id: energy_carrier
    - id: sector
  - id: vehicle_energy_by_type
    tags: [veh]
    to_dimensions:
    - id: sector
      categories: [transport]
    - id: vehicle_type
    - id: energy_carrier
  - id: emission_factors
    tags: [ef]
  - id: action_index
    tags: [index]
  - id: planned_action_shares
    tags: [planned]
  params:
    # empty_to_zero converts 0/0=NaN to 0 for sectors with zero energy use
    # (e.g. municipal_facilities is all-zero in Munich's BISKO dataset)
    formula: empty_to_zero((st + veh) * ef * index / sum_dim(sum_dim(sum_dim((st
      + veh) * ef * index, energy_carrier), sector), vehicle_type)) + planned

- id: action_potential_by_dimensions
  name_de: Aktion Potential nach Dimensionen
  name_en: Action potential by dimensions
  type: formula.FormulaNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier, vehicle_type, action]
  output_dimensions: [sector, energy_carrier, vehicle_type, action]
  input_nodes:
  - id: action_emission_shares
    tags: [shares]
  - id: emission_reduction_potential
    tags: [potential]
    from_dimensions:
    - id: sector
      flatten: true
  params:
  - id: formula
    value: extend_all(shares) * potential * constant
  - id: constant
    value: -1.0
    unit: dimensionless

# --- Nodes needed by the action pipeline ---
# These bridge BISKO's baseline data pipeline into the Cologne-style
# action calculation mechanism.

- id: stationary_energy_by_type
  name_de: Stationäre Endenergieverbrauch nach Typ
  name_en: Stationary energy use by type
  description_de: Stationärer Endenergieverbrauch aus dem BISKO-Datensatz, 
    genutzt für die Berechnung der Maßnahmenanteile.
  description_en: Stationary final energy use from the BISKO dataset, used for 
    computing action emission shares.
  type: generic.GenericNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: final_energy_use

- id: vehicle_energy_by_type
  name_de: Verkehrsenergieverbrauch nach Fahrzeugtyp
  name_en: Vehicle energy use by vehicle type
  description_de: Endenergieverbrauch im Verkehr nach Fahrzeugtyp, aus 
    BISKO-Fahrleistungsstatistiken. Einzelne Kraftstofftypen werden zu "fuels" 
    aggregiert, damit die Dimension mit dem Cologne action_index übereinstimmt 
    (Platzhalter bis zur Munich-spezifischen Datenerstellung).
  description_en: Transport final energy use by vehicle type, from BISKO mileage
    statistics. Individual fuel types are aggregated into "fuels" so the 
    dimension matches the Cologne action_index (placeholder until 
    Munich-specific data is created).
  type: formula.FormulaNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [vehicle_type, energy_carrier]
  output_dimensions: [vehicle_type, energy_carrier]
  input_nodes:
  - id: transport_energy
    tags: [veh]
  params:
    # Aggregate all fossil/bio liquid and gaseous fuels into the 'fuels' category
    # so the energy_carrier dimension matches the Cologne action_index dataset,
    # which uses 'fuels' for all drive_transition and mobility_transition actions.
    # Electricity and hydrogen remain as separate categories.
    formula: sum_into_cat(veh, energy_carrier, [petrol, diesel, bio_petrol, 
      biodiesel, biogas, biogas_chp, cng_bio, cng_fossil, lpg, propane, 
      natural_gas, kerosene], fuels)

- id: transport_ef_fuels
  name_de: Emissionsfaktor für aggregierte Kraftstoffe
  name_en: Emission factor for aggregated transport fuels
  description_de: Gewichteter Durchschnitts-Emissionsfaktor für den aggregierten
    Kraftstoffträger 'fuels' — berechnet aus den BISKO-Verkehrsemissionsfaktoren
    gewichtet nach dem Fahrzeugenergieverbrauch. Wird benötigt, damit 
    action_emission_shares mit dem Cologne-action_index kompatibel ist.
  description_en: Weighted average emission factor for the aggregated 'fuels' 
    energy carrier — derived from BISKO transport emission factors weighted by 
    vehicle energy consumption. Needed so action_emission_shares is compatible 
    with the Cologne action_index (which uses 'fuels' for drive_transition 
    actions).
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g_co2e/kWh
  input_dimensions: [energy_carrier]
  output_dimensions: [energy_carrier]
  input_nodes:
  - id: transport_emission_factors
    tags: [ef]
  - id: transport_energy
    tags: [veh]
    from_dimensions:
    - id: vehicle_type
      flatten: true
  params:
    # Weighted average: ef_fuels = Σ(ef_i × energy_i) / Σ(energy_i) for i in fuel types
    # sum_into_cat aggregates source categories into target, keeping non-fuel carriers
    formula: sum_into_cat(ef * veh, energy_carrier, [petrol, diesel, bio_petrol,
      biodiesel, biogas, biogas_chp, cng_bio, cng_fossil, lpg, propane, 
      natural_gas, kerosene], fuels) / sum_into_cat(veh, energy_carrier, 
      [petrol, diesel, bio_petrol, biodiesel, biogas, biogas_chp, cng_bio, 
      cng_fossil, lpg, propane, natural_gas, kerosene], fuels)

