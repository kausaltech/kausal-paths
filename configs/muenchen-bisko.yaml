# This model is based on placeholder data.
# Only the final_energy_use is actual Munich data.
id: muenchen-bisko
default_language: de
supported_languages: [en]
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: a8e9584d8a313025877793f4ceabac8fcf865ace
  dvc_remote: kausal-s3
name_de: Maßnahmenplan Klimaneutralität München
name_en: Munich Climate Dashboard
owner: München Stadt
theme_identifier: de-muenchen
target_year: 2035
model_end_year: 2050
reference_year: 2018
minimum_historical_year: 2018
maximum_historical_year: 2023
emission_unit: kt_co2e/a
features:
  baseline_visible_in_graphs: true
  use_datasets_from_db: true
  show_explanations: true
  show_category_warnings: true

include:
- file: modules/bisko/model.yaml
  allow_override: true
  dataset_replacements:
  - from: bisko/final_energy
    to: muenchen/final_energy
  - from: bisko/energy_costs
    to: muenchen/energy_costs
  # - from: bisko/historical_emissions
  #   to: augsburg/historical_emissions
  # - from: bisko/passenger_kilometers
  #   to: augsburg/passenger_kilometers
  # - from: bisko/vehicle_energy
  #   to: augsburg/vehicle_energy
- file: modules/health/air_pollution_exposure.yaml
  allow_override: true
- file: modules/health/attribution_and_cost.yaml
  allow_override: true

impact_overviews:

- graph_type: cost_benefit
  effect_node: total_cost
  indicator_unit: MEUR
  cost_dimension: cost_type
  stakeholder_dimension: stakeholder
  label_de: Kosten-Nutzen

- graph_type: cost_efficiency
  cost_node: total_cost
  effect_node: total_emissions
  cost_unit: MEUR
  effect_unit: kt_co2e
  indicator_unit: EUR/t_co2e
  label_de: Kosteneffizienz

- graph_type: cost_benefit
  effect_node: discounted_health_costs
  indicator_unit: MEUR
  label_de: Diskontierte Gesundheitskosten

#//////  Parameters  ////////////////////////////////////////////////////////////////////////////////////////////////////
params:

- id: weather_correction
  label_de: Wetterkorrektur durchführen?
  label_en: Perform weather correction?
  value: false
  is_customizable: true
  is_visible: true
- id: municipality_name
  label_en: Municipality name
  label_de: Gemeindename
  value: München
  is_customizable: true
  is_visible: true
- id: ags_number
  label_en: AGS number
  label_de: AGS-Nummer
  value: '09162000'
  is_customizable: false
  is_visible: false
- id: use_national_values
  label_en: Use national rather than local electricity emission factors (BISKO)
  label_de: Verwenden Sie nationale statt lokaler Stromemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true
- id: use_mileage
  label_en: Use BISKO mileage statistics rather than own energy data for 
    transport
  label_de: Nutzen Sie die BISKO-Transportstatistiken anstatt der eigenen 
    Energieverbrauchsdaten für den Transport.
  value: true
  is_visible: true
  is_customizable: true
- id: use_local_values # FIXME Make connection to district heating emission factors dataset.
  label_en: Use local rather than national district heating emission factors 
    (BISKO)
  label_de: Verwenden Sie lokale statt nationale Fernwärmeemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true
- id: discount_rate
  label: Discount rate
  value: 3.5
  min_value: 0
  max_value: 5
  unit: '%'
  is_visible: true
  is_customizable: false


