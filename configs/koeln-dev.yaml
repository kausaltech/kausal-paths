- id: home
  name_de: Köln BASIC+ Treibhausgasinventar
  name_en: Cologne BASIC+ Greenhouse Gas Inventory
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title_de: Übersicht Bilanzen Köln
  lead_title_en: Overview of Cologne's Greenhouse Gas Balances
  lead_paragraph_de: GPC BASIC+ Treibhausgasinventar (2008-2020) und Prognose 
    (2021-2030) für die Stadt Köln.
  lead_paragraph_en: GPC BASIC+ greenhouse gas inventory (2008-2020) and 
    forecast (2021-2030) for the City of Cologne.

