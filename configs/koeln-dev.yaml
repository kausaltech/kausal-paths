- id: emission_scope # Copied from zuerich-dev.yaml
  label: Emissionsbereiche
  label_en: Emission scopes
  help_text: Die Netto-Null-Berichterstattung fokussiert im ersten Jahr auf die 
    direkten Emissionen; die indirekten Emissionen werden später ergänzt. Die 
    hier dargestellten indirekten Emissionen basieren weitgehend auf der 
    Netto-Null-Grundlagenstudie und bilden die bis 2040 angestrebte Reduktion 
    noch nicht ab.
  groups:
  - id: direct
    label: Direkte Emissionen
    label_en: Direct emissions
    color: '#0f05a0'
    order: 1
  - id: indirect
    label: Indirekte Emissionen
    label_en: Indirect emissions
    color: '#6496ff'
    order: 2
  - id: negative
    label: Negative Emissionen
    label_en: Negative emissions
    color: '#8ECF69'
    order: -1
  categories:
  - id: scope1
    label_de: Scope 1
    label_en: Scope 1
    color: '#0f05a0'
    group: direct
    order: 0
  - id: scope2
    label_de: Scope 2
    label_en: Scope 2
    color: '#30505e'
    group: indirect
    order: 1
  - id: scope3
    label_de: Scope 3
    label_en: Scope 3
    color: '#6496ff'
    group: indirect
    order: 2
  - id: negative_emissions
    label_de: Negative Emissionen
    label_en: Negative emissions
    color: '#8ECF69'
    group: negative
    order: -1

nodes:

- id: net_emissions
  name_de: Netto Emissionen
  name_en: Net emissions
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  is_outcome: true
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  goals:
  - label_de: Emissionen
    label_en: Emissions
    default: true
    linear_interpolation: true
    is_main_goal: true
    values:
    - year: 2020
      value: 8805
    - year: 2021
      value: 8805
    - year: 2029
      value: 3509
    - year: 2030
      value: 2221
    - year: 2035
      value: 271
    - year: 2050
      value: 163

- id: weather_correction
  name: Witterungsbereinigung
  name_en: Weather Correction
  type: generic.GenericNode
  quantity: ratio
  unit: dimensionless
  input_dimensions: [sector]
  output_dimensions: [sector]
  input_datasets:
  - id: koeln/weather_correction
  params:
  - id: operations
    value: get_single_dataset,do_correction
  - id: do_correction
    ref: weather_correction

- id: population
  name_en: Inhabitants
  name_de: Einwohner*in
  type: generic.GenericNode
  quantity: population
  unit: cap
  input_datasets:
  - id: koeln/einwohnerin
    column: einwohnerin

- id: historical_emissions
  name: Historische Emissionen
  name_en: Historical emissions
  type: generic.GenericNode
  quantity: emissions
  unit: t/a
  color: '#00A969'
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: koeln/koln_emissionen_update_2023
    column: emissions
    filters:
    - column: energy_carrier
      value: total
      exclude: true
      drop_col: false
  params:
  - id: operations
    value: get_single_dataset,apply_multiplier
  - id: multiplier
    value: 1
    unit: t/t_co2e

- id: stationary_energy_by_type
  name: Stationäre Endenergieverbrauch nach Typ
  name_en: Stationary energy use by type
  type: generic.GenericNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: koeln/stationary_energy_by_type

- id: vehicle_energy_by_type
  name: Verkehrsenergieverbrauch nach Typ
  name_en: Vehicle energy use by type
  type: generic.GenericNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [vehicle_type, energy_carrier]
  output_dimensions: [vehicle_type, energy_carrier]
  input_datasets:
  - id: koeln/vehicle_energy_by_type

- id: action_emission_shares
  name: Emissionenanteil nach Maßnahme
  name_en: Action emission shares
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [sector, energy_carrier, vehicle_type, action]
  output_dimensions: [sector, energy_carrier, vehicle_type, action]
  input_nodes:
  - id: stationary_energy_by_type
    tags: [st]
    to_dimensions:
    - id: vehicle_type
      categories: [none]
    - id: energy_carrier
    - id: sector
  - id: vehicle_energy_by_type
    tags: [veh]
    to_dimensions:
    - id: sector
      categories: [transport]
    - id: vehicle_type
    - id: energy_carrier
  - id: emission_factors
    tags: [ef]
  - id: action_index
    tags: [index]
  params:
    formula: (st + veh) * ef * index / sum_dim(sum_dim(sum_dim((st + veh) * ef *
      index, energy_carrier), sector), vehicle_type)

- id: action_potential_by_dimensions
  name_de: Aktion Potential nach Dimensionen
  name_en: Action potential by dimensions
  type: formula.FormulaNode
  quantity: emissions
  unit: kt/a
  input_dimensions: [sector, energy_carrier, vehicle_type, action]
  output_dimensions: [sector, energy_carrier, vehicle_type, action]
  input_nodes:
  - id: action_emission_shares
    tags: [shares]
  - id: emission_reduction_potential
    tags: [potential]
    from_dimensions:
    - id: sector
      flatten: true
  params:
  - id: formula
    value: extend_all(shares) * potential * constant
  - id: constant
    value: -1.0
    unit: t/t_co2e

- id: net_emissions_historical # TODO Remove when no longer needed.
  name: Historische Emissionen2
  name_en: Historical emissions
  type: generic.GenericNode
  quantity: emissions
  unit: kt/a
  color: '#00A969'
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: koeln/historische_emissionen
    column: emissions

- id: final_energy_use
  name: Energieverbrauch
  type: generic.GenericNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [energy_carrier, sector]
  output_dimensions: [energy_carrier, sector]
  input_datasets:
  - id: koeln/koln_endenergie_update_2023
    column: energy
    filters:
    - column: energy_carrier
      value: total
      exclude: true
      drop_col: false

- id: emission_factors_derived
  name: Emissionsfaktoren abgeleitet aus historischen Emissionen
  name_en: Emission factors derived from historical emissions
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g/kWh
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: historical_emissions
    tags: [emissions]
  - id: final_energy_use
    tags: [energy]
  params:
    formula: extend_all(drop_nans(emissions / energy))

- id: sector_emission_factors_derived # Transport values added to the dataset for local emission facotrs.
  name: Sektoren-Emissionsfaktoren abgeleitet aus historischen Emissionen
  name_en: Sector emission factors derived from historical emissions
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g/kWh
  input_dimensions: [sector]
  output_dimensions: [sector]
  input_nodes:
  - id: historical_emissions
    tags: [emissions]
    from_dimensions:
    - id: energy_carrier
      flatten: true
  - id: final_energy_use
    tags: [energy]
    from_dimensions:
    - id: energy_carrier
      flatten: true
  params:
    formula: emissions / energy

- id: end_energy_emission_factors_national # From IFEU dataset
  name: Endenergie Emissionsfaktoren national
  name_en: End energy emission factors
  type: generic.GenericNode
  quantity: emission_factor
  unit: g/kWh
  input_dimensions: [energy_carrier]
  output_dimensions: [energy_carrier]
  input_datasets:
  - id: bisko/endenergie_emissionsfaktoren
    filters:
    - column: per_what_energy
    - column: upstream_included
  params:
  - id: operations
    value: get_single_dataset,apply_multiplier,truncate_before_start
  - id: multiplier
    value: 1
    unit: g/g_co2e

- id: end_energy_emission_factors_local
  name: Endenergie Emissionsfaktoren lokal
  name_en: End energy emission factors local
  type: generic.GenericNode
  quantity: emission_factor
  unit: g/kWh
