  name: Aktuelles Jahr
  name_en: Current year
  type: generic.ConstantNode
  quantity: number
  unit: dimensionless
  params:
  - id: constant
    value: 2024
    unit: dimensionless

- id: scaling_rate
  name: Skalierungsfaktor
  name_en: Scaling rate
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: now_year
    tags: [n]
  params:
    formula: 3 * (max(0, min(1, (year(n) - n) / (2035 - n)))) ** 2 - 2 * (max(0,
      min(1, (year(n) - n) / (2035 - n)))) ** 3

