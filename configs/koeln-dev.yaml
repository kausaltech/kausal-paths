id: koeln-dev
default_language: de
supported_languages: [en]
site_url: https://koeln-dev.paths.staging.kausal.tech
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 6507e1755a4c402b794565e9908db8a37a0d2a42
  dvc_remote: kausal-s3
  # Data from https://docs.google.com/spreadsheets/d/1qUIUgAE1Sqbt6qIClxEypuWRi0GpQQUc/edit?gid=1907288926#gid=1907288926
name: Treibhausgasinventar
owner: Köln Stadt
theme_identifier: de-koeln
target_year: 2035
model_end_year: 2050
reference_year: 2008
minimum_historical_year: 2008
maximum_historical_year: 2023
emission_unit: kt/a
emission_forecast_from: 2022
emission_dimensions: [scope]
features:
  baseline_visible_in_graphs: true
  use_datasets_from_db: true
  show_explanations: true
normalizations:
- normalizer_node: population
  default: false
  quantities:
  - id: emissions
    unit: t/cap/a

# Abfallreduktion & Anlageneffizienz		nicht aktiv, da nicht in Bilanz
# Wasser-/Abwasserreduktion & Anlageneffizienz		Aktiv
# Ernährung & Lebensmittel		nicht aktiv, da nicht in Bilanz
# Aufforstung & nachhaltige Bewirtschaftung von Wäldern 		nicht aktiv, da nicht in Bilanz
# Wiedervernässung organischer Böden		nicht aktiv, da nicht in Bilanz
# Klimafreundlicheres Konsumverhalten der Bevölkerung		nicht aktiv, da nicht in Bilanz
# Mobilitätswende - Nahmobilität		Basis (aktiv)
# Antriebswende - Motorisierter Individualverkehr		Basis (aktiv)
# Antriebswende - Güterverkehr		Basis (nicht aktiv)
# Antriebswende - Bus		Basis (aktiv)
# Mobilitätswende - Regionale Mobilität		Basis (aktiv)
# Mobilitätswende - Güterverkehr		Basis (nicht aktiv)
# Erneuerbare Stromerzeugung durch kleine dezentrale Anlagen		Basis (aktiv)
# Erneuerbare Stromerzeugung in der Fläche		Basis (aktiv)
# Stromeinsparung durch Haushalte		Basis (nicht aktiv)
# Stromeinsparung im Gewerbesektor 		Basis (aktiv)
# Stromeinsparung in der Industrie		Basis (nicht aktiv)
# Erneuerbare Stromerzeugung durch Kraftwerke		Basis (aktiv)
# THG neutrale Verwaltung - Scope 1 & 2		Basis (aktiv)
# THG neutrale Verwaltung - Scope 3		nicht aktiv, da nicht in Bilanz
# Übergreifende Klimaschutzaspekte		Basis (aktiv)
# Wärmequellenerschließung für Wärmenetze		Basis (aktiv)
# Erweiterung und Verdichtung der Wärmenetze		Basis (nicht aktiv)
# Dezentraler Heizungstausch in Haushalten 		Basis (nicht aktiv)
# Sanierung Wohngebäude 		Basis (aktiv)
# Effiziente Wärmenutzung im Industriesektor		Basis (nicht aktiv)
# Neubau Wohngebäude		Basis (aktiv)
# Verhaltensänderung beim Wärmeverbrauch in Haushalten 		Basis (nicht aktiv)
# Dezentraler Heizungstausch im Gewerbe		Basis (aktiv)
# Effiziente Wärmenutzung im Gewerbe		Basis (nicht aktiv)
# Neubau Gewerbe/Industrie		Basis (nicht aktiv)

include:
- file: frameworks/standard_dims.yaml
  allow_override: false

