  dvc_remote: kausal-s3
name: Equalia Climate Action Plan
owner: Kausal Ltd
theme_identifier: default
target_year: 2035
model_end_year: 2050
reference_year: 2010
minimum_historical_year: 2010
maximum_historical_year: 2025
emission_unit: kt_co2e/a
features:
