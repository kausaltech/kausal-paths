nodes:

- id: net_emissions
  name: Net emissions
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt_co2e/a
  is_outcome: true
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  goals:
  - label_en: Net direct emissions
    default: true
    linear_interpolation: true
    values:
    - year: 2020
      value: 2800
    - year: 2040
      value: 0
    is_main_goal: true

- id: historical_emissions
  name: Historical emissions
  type: generic.GenericNode
  quantity: emissions
  unit: t_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: bisko/historical_emissions

- id: total_emissions
  name: Total emissions
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: historical_emissions
  - id: road_transportation_emissions
    from_dimensions:
    - id: vehicle_type
      flatten: true
    to_dimensions:
    - id: sector
      categories: [transport]
    - id: energy_carrier
  output_nodes:
  - id: net_emissions

- id: net_emissions_per_person
  name: Net emissions per person
  description: Annual CO2 emissions per capita from transport sector in city
  type: formula.FormulaNode
  quantity: emissions
  unit: t_co2e/person/a
  input_nodes:
  - id: net_emissions
    from_dimensions:
    - id: sector
      flatten: true
    - id: energy_carrier
      flatten: true
    tags: [emissions]
  - id: population
    from_dimensions:
    - id: stakeholder
      flatten: true
  params:
    formula: emissions / population

# ===== FREE RIDER PROBLEM OPERATIONALIZATION =====

- id: commons_sensitivity
  name: Commons survival capacity
  description: |
    Survival capacity or resilience of the climate system, i.e. how long does the system hold against exploitation.
    If it goes to zero, detrimental tipping points are likely.
  type: generic.ConstantNode
  quantity: duration
  unit: a
  params:
  - id: constant
    value: 15.0
    unit: a
    label: How fragile is the climate system?

- id: free_rider_threshold_alpha
  name: Free rider distribution parameter alpha
  description: |
    Alpha parameter for beta distribution of conditional cooperation thresholds (y_i).
    Together with beta, defines distribution of "at what % cooperation will I cooperate?"
    Higher alpha → distribution skewed toward cooperators (high y_i)
  type: generic.ConstantNode
  quantity: number
  unit: dimensionless
  params:
  - id: constant
    value: 2.0
    unit: dimensionless
    label: Shape of cooperation threshold distribution

- id: free_rider_threshold_beta
  name: Free rider distribution parameter beta
  description: |
    Beta parameter for beta distribution of conditional cooperation thresholds.
    Higher beta → distribution skewed toward free riders (low y_i)
  type: generic.ConstantNode
  quantity: number
  unit: dimensionless
  params:
  - id: constant
    value: 2.0
    unit: dimensionless
    label: Shape of cooperation threshold distribution

- id: expected_free_rider_threshold
  name: Expected free rider threshold (mean of beta distribution)
  description: |
    Expected value of the cooperation threshold under Beta(α, β):
    E[threshold] = α / (α + β). Interpreted as the mean threshold in the population
    ("at what % cooperation will I cooperate?"). Used as our city's threshold
    when evaluating whether to cooperate.
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: free_rider_threshold_alpha
    tags: [alpha]
  - id: free_rider_threshold_beta
    tags: [beta]
  params:
    formula: alpha / (alpha + beta)

- id: expected_cooperation_rate
  name: Expected global cooperation rate
  description: |
    Expected percentage of cities/jurisdictions worldwide that will take 
    comparable climate action. Based on current trends, commitments, political climate.
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  input_nodes:
  - id: expected_free_rider_threshold
    tags: [modeled]
  - id: hypothesis_index
    tags: [index]
  input_datasets:
  - id: transportation/cooperation_rate_estimates
    output_dimensions: [hypotheses]
    tags: [observed, primary]
  params:
    formula: coalesce_df(observed, modeled * index)

- id: hypothesis_index
  name: Hypothesis index
  description: Index of the hypotheses.
  type: generic.GenericNode
  quantity: ratio
  unit: dimensionless
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  input_datasets:
  - id: transportation/hypothesis_index
    output_dimensions: [hypotheses]

- id: commons_survival_time
  name: Commons survival time
  description: |
    Does the climate system survive? This node gives the time until the climate system fails
    with the given resilience and exploitation rate.
  type: formula.FormulaNode
  quantity: duration
  unit: a
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  is_outcome: true
  input_nodes:
  - id: expected_cooperation_rate
    to_dimensions:
    - id: hypotheses
    tags: [cooperation]
  - id: commons_sensitivity
    tags: [resilience]
  - id: hypothesis_index
    tags: [index]
  params:
  - id: formula
    value: (resilience * index) - cumulative(complement(cooperation))

- id: commons_survival
  name: Commons survival
  description: |
    Does the climate system survive? True if exploitation stays below degradation threshold.
    Returns 1 if enough resilience, 0 if commons degrades
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  input_nodes:
  - id: commons_survival_time
    tags: [time]
  params:
  - id: formula
    value: time >= constant
  - id: constant
    value: 0.0
    unit: a

- id: should_we_cooperate
  name: Should our city cooperate (given free rider logic)
  description: |
    Evaluation based on our city's conditional cooperation threshold:
    We should cooperate if expected_cooperation_rate >= our_city_threshold
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  is_outcome: true
  input_nodes:
  - id: expected_cooperation_rate
    to_dimensions:
    - id: hypotheses
    tags: [others_cooperating]
  - id: hypothesis_index
    tags: [index]
  params:
    formula: others_cooperating >= (our_threshold * index)


