- id: end_energy_emission_factors
  name_de: Endenergie Emissionsfaktoren
  name_en: End energy emission factors
  description_en: |
    The emission factors are given per final energy use. They are relevant for all sectors and
    the whole of Germany. They include upstream emissions of energy used for production. Upstream products (gray
    emissions) are not included. The gases considered are CO<sub>2</sub>, CH<sub>4</sub>, and N<sub>2</sub>O, and the
    values are CO<sub>2</sub> equivalents for 100-year global warming potential.<br/>
    These emission factors were received from IFEU, and they are updated annually. The detailed data sources are given
    in the dataset. There are two versions of this dataset, national and local. You can toggle between the two
    via 'Edit scenario' panel with the national vs. local toggle.<br/> Originally the datasets
    are the same, but the city admin user can edit the local values via the admin user interface.
  description_de: |
    Die Emissionsfaktoren sind pro Endenergieverbrauch angegeben. Sie sind für alle Sektoren und
    für ganz Deutschland relevant. Sie enthalten Vorkettenemissionen der für die
    Produktion verwendeten Brennstoffe. Die berücksichtigten Gase sind CO<sub>2</sub>, CH<sub>4</sub> und
    N<sub>2</sub>O, und die Werte sind CO<sub>2</sub>-Äquivalente für ein 100-jähriges
    Treibhauspotenzial (GWP).<br/>
    Diese Emissionsfaktoren stammen von IFEU und werden jährlich aktualisiert. Die detaillierten Datenquellen sind
    im Datensatz angegeben. Es gibt zwei Versionen dieses Datensatzes, national und lokal. Sie können zwischen den
    beiden über das Panel „Szenario bearbeiten“ mit dem national-vs.-lokal-Schalter wechseln.<br/> Ursprünglich sind
    die Datensätze gleich, aber die Stadt-Admin-Benutzer können die lokalen Werte über die
    Admin-Benutzeroberfläche anpassen.
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g_co2e/kWh
  input_dimensions: [energy_carrier]
  output_dimensions: [energy_carrier]
  input_datasets:
  - id: bisko/endenergie_emissionsfaktoren  # standard ifeu dataset
    tags: [national]
    filters:
    - column: per_what_energy
    - column: upstream_included
  - id: bisko/end_energy_emission_factors
    tags: [local]
  params:
  - id: formula
    value: extend_all(select_port(condition, national, local))
  - id: condition
    ref: use_national_values

- id: electricity_production_emission_factors
  name_de: Emissionsfaktoren für Erzeugung
  name_en: Emission factors for electricity production
  description_en: |
    The emission factors are given per final electricity produced. They are relevant for renewable electricity
    production or power plants producing only electricity (i.e., not combined heat and power plants) anywhere in
    Germany. They include upstream emissions of energy used for production. Upstream products (gray emissions)
    are not included. The gases considered are CO<sub>2</sub>, CH<sub>4</sub>, and N<sub>2</sub>O, and the values
    are CO<sub>2</sub> equivalents for 100-year global warming potential.<br/>
    These emission factors were received from IFEU, and they are updated annually. The detailed data sources are given
    in the dataset. There are two versions of this dataset, national and local. You can toggle between the two
    via 'Edit scenario' panel with the national vs. local toggle.<br/> Originally the datasets
    are the same, but the city admin user can edit the local values via the admin user interface.
  description_de: |
    Die Emissionsfaktoren sind pro erzeugter Endstrommenge angegeben. Sie sind relevant für erneuerbare
    Stromerzeugung oder Kraftwerke, die ausschließlich Strom erzeugen (d. h. keine
    Kraft-Wärme-Kopplungsanlagen) überall in Deutschland. Sie enthalten Vorkettenemissionen der für die
    Produktion verwendeten Brennstoffe. Die berücksichtigten Gase sind CO<sub>2</sub>, CH<sub>4</sub> und
    N<sub>2</sub>O, und die Werte sind CO<sub>2</sub>-Äquivalente für ein 100-jähriges
    Treibhauspotenzial (GWP).<br/>
    Diese Emissionsfaktoren stammen von IFEU und werden jährlich aktualisiert. Die detaillierten Datenquellen sind
    im Datensatz angegeben. Es gibt zwei Versionen dieses Datensatzes, national und lokal. Sie können zwischen den
    beiden über das Panel „Szenario bearbeiten“ mit dem national-vs.-lokal-Schalter wechseln.<br/> Ursprünglich sind
    die Datensätze gleich, aber die Stadt-Admin-Benutzer können die lokalen Werte über die
    Admin-Benutzeroberfläche anpassen.
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g_co2e/kWh
  input_dimensions: [energy_carrier, per_what_energy]
  output_dimensions: [energy_carrier, per_what_energy]
  input_datasets:
  - id: bisko/emissionsfaktoren_fr_erzeugung  # ifeu dataset, name of tab in excel, rename at some point, does not filter by city here
    filters:
    - column: upstream_included
    tags: [national]
  - id: bisko/electricity_production_emission_factors  # dataset from another city (Ddorf or Potsdam), change to city-specific data IF NEEDED
    tags: [local]
  params:
  - id: formula
    value: extend_all(select_port(condition, national, local))
  - id: condition
    ref: use_national_values

- id: emission_factors_without_fuel_data
  name_de: Emissionsfaktoren ohne Brennstoffinputinformationen
  name_en: Emission factors for electricity and heat without known shares
  description_en: |
    The emissions factors are product-specific and calculated per electricity or heat produced.
    This is useful in a situation where you don't know the shares of electricity and heat produced, but you know
    the amount of electricity of heat used.
    Therefore, you cannot sum up the emission factors of an energy carrier to get the total emission factor.
    Instead, you need to calculate the emissions for each product separately and then sum them up.
    The emission factors are relevant for the processes of electricity and heat production anywhere in
    Germany. They include upstream emissions of energy used for production. Upstream products (gray emissions) are not
    included. The gases considered are CO<sub>2</sub>, CH<sub>4</sub>, and N<sub>2</sub>O, and the values
    are CO<sub>2</sub> equivalents for 100-year global warming potential.<br/>
    These emission factors were received from IFEU, and they are updated annually.
    There are two versions of this dataset, national and local. You can toggle between the two
    via 'Edit scenario' panel with the national vs. local toggle.<br/> Originally the datasets
    are the same, but the city admin user can edit the local values via the admin user interface.
  description_de: |
    Die Emissionsfaktoren sind produktbezogen und pro erzeugter Strom- oder Wärmemenge berechnet.
    Das ist nützlich, wenn die Anteile von erzeugtem Strom und Wärme nicht bekannt sind, Sie aber die
    Menge der genutzten Strom- oder Wärmemenge kennen.
    Daher können Sie die Emissionsfaktoren eines Energieträgers nicht einfach summieren, um den
    Gesamtemissionsfaktor zu erhalten. Stattdessen müssen Sie die Emissionen für jedes Produkt
    separat berechnen und anschließend summieren.
    Die Emissionsfaktoren sind relevant für die Prozesse der Strom- und Wärmeerzeugung überall in
    Deutschland. Sie enthalten Vorkettenemissionen der für die
    Produktion verwendeten Brennstoffe. Die berücksichtigten Gase sind CO<sub>2</sub>, CH<sub>4</sub> und
    N<sub>2</sub>O, und die Werte sind CO<sub>2</sub>-Äquivalente für ein 100-jähriges
    Treibhauspotenzial (GWP).<br/>
    Diese Emissionsfaktoren stammen von IFEU und werden jährlich aktualisiert.
    Es gibt zwei Versionen dieses Datensatzes, national und lokal. Sie können zwischen den beiden
    über das Panel „Szenario bearbeiten“ mit dem national-vs.-lokal-Schalter wechseln.<br/> Ursprünglich sind
    die Datensätze gleich, aber die Stadt-Admin-Benutzer können die lokalen Werte über die
    Admin-Benutzeroberfläche anpassen.
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g_co2e/kWh
  input_dimensions: [energy_carrier, per_what_energy]
  output_dimensions: [energy_carrier, per_what_energy]
  input_datasets:
  - id: bisko/emissionsfaktoren_ohne_brennstoffinputinformationen # ifeu dataset, national value (not separated for municipalities)
    filters:
    - column: upstream_included
    tags: [national]
  - id: bisko/emission_factors_without_fuel_data
    tags: [local]
  params:
  - id: formula
    value: extend_all(select_port(condition, national, local))
  - id: condition
    ref: use_national_values

- id: emission_factors_for_district_heating_by_generic_fuel
  name_de: Emissionsfaktoren für Fernwärme - überwiegend
  name_en: Emission factors for district heating by generic fuel
  description_en: |
    The emissions factors are product-specific and calculated per heat produced.
    This is useful in a situation where you don't know the shares of electricity and heat produced in combined
    heat and power plants, but you know the amount of heat used.
    The emission factors are relevant for the processes of heat production (mentioned in the energy carrier dimension)
    anywhere in Germany. They include upstream emissions of energy used for production. Upstream products (gray
    emissions) are not included. The gases considered are CO<sub>2</sub>, CH<sub>4</sub>, and N<sub>2</sub>O, and the
    values are CO<sub>2</sub> equivalents for 100-year global warming potential.<br/>
    These emission factors were received from IFEU, and they are updated annually.
    There are two versions of this dataset, national and local. You can toggle between the two
    via 'Edit scenario' panel with the national vs. local toggle.<br/> Originally the datasets
    are the same, but the city admin user can edit the local values via the admin user interface.
  description_de: |
    Die Emissionsfaktoren sind produktbezogen und pro erzeugter Wärmemenge berechnet.
    Das ist nützlich, wenn die Anteile von erzeugtem Strom und Wärme in Kraft-Wärme-Kopplungsanlagen nicht
    bekannt sind, Sie aber die genutzte Wärmemenge kennen.
    Die Emissionsfaktoren sind relevant für die Prozesse der Wärmeerzeugung (in der
    Energieträger-Dimension genannt) überall in Deutschland. Sie enthalten Vorkettenemissionen der für die
    Produktion verwendeten Brennstoffe. Die berücksichtigten Gase sind CO<sub>2</sub>, CH<sub>4</sub> und
    N<sub>2</sub>O, und die Werte sind CO<sub>2</sub>-Äquivalente für ein 100-jähriges
    Treibhauspotenzial (GWP).<br/>
    Diese Emissionsfaktoren stammen von IFEU und werden jährlich aktualisiert.
    Es gibt zwei Versionen dieses Datensatzes, national und lokal. Sie können zwischen den beiden
    über das Panel „Szenario bearbeiten“ mit dem national-vs.-lokal-Schalter wechseln.<br/> Ursprünglich sind
    die Datensätze gleich, aber die Stadt-Admin-Benutzer können die lokalen Werte über die
    Admin-Benutzeroberfläche anpassen.
  type: formula.FormulaNode
  quantity: emission_factor
  unit: g_co2e/kWh
  input_dimensions: [energy_carrier, per_what_energy]
  output_dimensions: [energy_carrier, per_what_energy]
  input_datasets:
  - id: bisko/fernwarme_berwiegend # ifeu
    filters:
    - column: upstream_included
    tags: [national]
  - id: bisko/emission_factors_for_district_heating_by_generic_fuel  # change to city-speific later IF NEEDED
    tags: [local]
  params:
  - id: formula
    value: extend_all(select_port(condition, national, local))
  - id: condition
    ref: use_national_values

- id: combined_heat_and_power_ef
  name_en: Combined heat and power emission factor
  name_de: Emissionsfaktor für Kombination aus Wärme und Strom
  type: generic.ChpNode
  quantity: emission_factor
  unit: g_co2e/kWh
  output_dimensions: [energy_carrier]
  input_nodes:
  - id: emission_factors_for_district_heating_by_generic_fuel
    from_dimensions:
    - id: energy_carrier
      categories: [natural_gas_turbine]
      flatten: true
    - id: per_what_energy
      flatten: true
  params:
    method: bisko
    electricity_fraction: 0.3
    t_supply: 373
    t_return: 283
    # electricity_reference_efficiency: 0.4 # Only needed to efficiency method (commonly used in Finland)
    # heat_reference_efficiency: 0.9

