# Road types below are from BISKO/IFEU (AB/AO/IO). They are only populated when
# using BISKO datasets (e.g. gemeindefeine_fahrleistungen_straenverkehr,
# energy_factor, energy_shares). KSP data uses different codes in field_key
# (QZBV, QZVV, QZFV, BBV, BFV, BVV, KBF) and has no road_type dimension.
- id: road_type
  label_en: Road Type
  label_de: Straßentyp
