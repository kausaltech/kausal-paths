#//////  BISKO Compliance  /////////////////////////////////////////////////////////////////////////////////

- id: is_bisko_compliant
  name_en: Are the inventories BISKO compliant?
  name_de: Sind die Inventare BISKO-konform?
  description_en: Test for the BISKO compliance criteria (1 = compliant, 0 = 
    non-compliant):<ul><li>No weather correction</li> <li>Local emission factors
    for district heating</li><li>National emission factors for 
    electricity</li><li>Grid-based energy data have quality A</li></ul>
  description_de: Test für die BISKO-Konformitätskriterien (1 = konform, 0 = 
    nicht-konform):<ul><li>Keine Wetterkorrektur</li> <li>Lokale 
    Emissionsfaktoren für Fernwärme</li><li>Nationale Emissionsfaktoren für 
    Strom</li><li>Gitterbasierte Energiedaten haben Qualität A</li></ul>
  type: formula.FormulaNode
  quantity: probability
  unit: dimensionless
  input_nodes:
  - id: has_no_weather_correction
    tags: [weather]
  - id: has_national_electricity_emission_factors
    tags: [electricity]
  - id: has_local_district_heating_emission_factors
    tags: [district_heating]
  - id: has_quality_a_data_for_grid_based_energy
    tags: [grid_energy]
  params:
    formula: weather * electricity * district_heating * grid_energy

- id: has_no_weather_correction
  name_en: Has no weather correction?
  name_de: Hat keine Witterungsbereinigung?
  description_en: BISKO inventory must not be corrected for weather.
  description_de: BISKO-Inventar muss nicht für Wetter korrigiert werden.
  type: generic.ConstantNode
  quantity: probability
  unit: dimensionless
  params:
  - id: condition
    ref: weather_correction
  - id: operations
    value: constant,complement

- id: has_national_electricity_emission_factors
  name_en: Has national electricity emission factors?
  name_de: Hat nationale Stromemissionsfaktoren?
  description_en: BISKO inventory must use national electricity emission 
    factors.
  description_de: BISKO-Inventar muss nationale Stromemissionsfaktoren 
    verwenden.
  type: generic.ConstantNode
  quantity: probability
  unit: dimensionless
  params:
  - id: condition
    ref: use_national_values

- id: has_local_district_heating_emission_factors
  name_en: Has local district heating emission factors?
  name_de: Hat lokale Fernwärmeemissionsfaktoren?
  description_en: BISKO inventory must use local district heating emission 
    factors.
  description_de: BISKO-Inventar muss lokale Fernwärmeemissionsfaktoren 
    verwenden.
  type: generic.ConstantNode
  quantity: probability
  unit: dimensionless
  params:
  - id: condition
    ref: use_local_values

- id: quality_criteria
  name_en: Quality criteria
  name_de: Qualitätskriterien
  type: generic.GenericNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [energy_carrier, sector]
  output_dimensions: [energy_carrier, sector]
  input_datasets:
  - id: bisko/quality_criteria
  params:
    operations: get_single_dataset,extend_all

- id: quality_a_data_for_grid_based_energy
  name_en: Quality A data for grid-based energy
  name_de: Qualität A-Daten für gitterbasierte Energie
  # FIXME When we fix the graph, it will show 1 rather than 3.
  description_en: BISKO inventory must use regional primary data for grid-based 
    energy. To be BISKO-compliant, each sector should have value 3 in the graph.
    It means that all three critical energy carriers (electricity, natural gas,
    district heating) have quality A data. Use this node to identify data points
    that don't meet the quality criteria yet and need to be improved to reach
    BISKO-compliance.
  description_de: BISKO-Inventar muss regionale Primärdaten für gitterbasierte 
    Energie verwenden. Um BISKO-konform zu sein, sollte jeder Sektor den Wert 3
    in der Grafik haben. Das bedeutet, dass alle drei kritischen Energieträger 
    (Strom, Erdgas, Fernwärme) Qualität A-Daten haben. Verwenden Sie diesen Knoten,
    um Datenpunkte zu identifizieren, die noch nicht die Qualitätskriterien
    erfüllen und verbessert werden müssen, um BISKO-Konformität zu erreichen.
  type: formula.FormulaNode
  quantity: probability
  unit: dimensionless
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: final_energy_use_data_quality
    tags: [data_quality]
    from_dimensions:
    - id: energy_carrier
      categories: [electricity, natural_gas, district_heating]
  - id: quality_criteria
  params:
  - id: formula
    value: data_quality >= quality_criteria

- id: has_quality_a_data_for_grid_based_energy
  name_en: Has quality A data for grid-based energy?
  name_de: Hat Qualität A-Daten für gitterbasierte Energie?
  description_en: BISKO inventory must use regional primary data for grid-based 
    energy.
  description_de: BISKO-Inventar muss regionale Primärdaten für gitterbasierte 
    Energie verwenden.
  type: formula.FormulaNode
  quantity: probability
  unit: dimensionless
  input_nodes:
  - id: quality_a_data_for_grid_based_energy
    tags: [quality_a]
  params:
  - id: formula
    value: prod_dim(prod_dim(quality_a, energy_carrier), sector)

- id: weighted_data_quality_by_sector
  name_en: Weighted data quality by sector
  name_de: Gewichtete Datenqualität nach Sektor
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [sector]
  output_dimensions: [sector]
  input_nodes:
  - id: final_energy_use_data_quality
    tags: [quality]
  - id: final_energy_use
    tags: [energy]
  params:
  - id: formula
    value: drop_nans(sum_dim(quality * energy, energy_carrier) / sum_dim(energy, energy_carrier))

- id: weighted_data_quality_by_energy_carrier
  name_en: Weighted data quality by energy carrier
  name_de: Gewichtete Datenqualität nach Energieträger
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [energy_carrier]
  output_dimensions: [energy_carrier]
  input_nodes:
  - id: final_energy_use_data_quality
    tags: [quality]
  - id: final_energy_use
    tags: [energy]
  params:
  - id: formula
    value: drop_nans(sum_dim(quality * energy, sector) / sum_dim(energy, sector))

- id: total_weighted_data_quality
  name_en: Total weighted data quality
  name_de: Gesamte gewichtete Datenqualität
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: final_energy_use_data_quality
    tags: [quality]
  - id: final_energy_use
    tags: [energy]
  params:
  - id: formula
    value: drop_nans(sum_dim(sum_dim(quality * energy, sector),energy_carrier) / sum_dim(sum_dim(energy, sector), energy_carrier))
