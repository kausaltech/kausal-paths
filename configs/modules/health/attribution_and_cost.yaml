nodes:

# ---------- Placeholder nodes -----------

- id: air_pollution_exposure
  name_en: Air pollution exposure, placeholder
  name_de: Luftschadstoffexposition, Platzhalter
  name_fi: Ilmansaastealtistus, esimerkki
  type: generic.GenericNode
  quantity: exposure
  unit: µg/m³
  input_dimensions: [pollutant]
  output_dimensions: [pollutant]
  input_datasets:
  - id: health/placeholders/air_pollution_exposure
    forecast_from: 2025

- id: incidence
  name_fi: Ilmaantuvuus
  name_en: Incidence
  name_de: Inzidenz
  description_fi: Ympäristöaltisteiden kannalta olennaisten tautien ja vaikutusten ilmaantuvuus.
    Käytetään Terveyden ja hyvinvoinnin laitoksen tautitaakkamallia. Useita alkuperäislähteitä.
  description_en: 'Incidence of environmentally relevant diseases and effects. Uses
    the THL disease burden model. Multiple original sources.'
  description_de: 'Inzidenz umweltrelevanter Erkrankungen und Gesundheitseffekte. Verwendet das
    THL-Krankheitslastmodell. Mehrere Originalquellen.'
  type: generic.GenericNode
  quantity: incidence
  unit: case/personyear
  input_dimensions: [response]
  output_dimensions: [response]
  input_datasets:
  - id: health/incidence
    column: incidence
    filters:
    - column: place
      value: default
    - column: population
      value: default

- id: air_pollution_attributable_fraction
  name_fi: Ilmansaasteiden syyosuus
  name_en: Attributable fraction of air pollution
  name_de: Attributabler Anteil der Luftverschmutzung
  description_fi: 'Se osuus havaitusta tautitaakasta, joka selittyy ilmansaastealtistuksella.
    Syyosuus lasketaan näin: AF = RR / (RR + 1) missä RR on suhteellinen riski.'
  description_en: 'The fraction of observed disease burden that can be attributed to air pollution exposure.
    Attributable fraction is typically calculated as AF = RR / (RR + 1) where RR is the relative risk.'
  description_de: 'Der Anteil der beobachteten Krankheitslast, der auf Luftschadstoffexposition
    zurückgeführt werden kann. Der attributable Anteil wird typischerweise berechnet
    als AF = RR / (RR + 1), wobei RR das relative Risiko ist.'
  type: health.AttributableFractionRR # FIXME Convert to FormulaNode.
  quantity: exposure_response
  unit: dimensionless  # TODO Allow for different units in dataset and node.
  input_dimensions: [response, pollutant]
  output_dimensions: [response, pollutant]
  input_datasets:
  - id: hia/exposure_response/air_pollution_erf
    filters:
    - column: Route
      value: inhalation
  input_nodes:
  - id: air_pollution_exposure
    to_dimensions:
    - id: pollutant
  params:
    sector: Air pollution

- id: total_number_of_cases
  name_fi: Kokonaistapausmäärä
  name_en: Total number of cases
  name_de: Gesamtzahl der Fälle
  description_fi: Kokonaistapausmäärä kohdeväestössä saadaan kertomalla taustailmaantuvuus väestömäärällä.
  description_en: 'Total number of cases in the target population is calculated by multiplying
    the background incidence by the population size.'
  description_de: 'Die Gesamtzahl der Fälle in der Zielpopulation wird berechnet, indem die
    Hintergrundinzidenz mit der Bevölkerungsgröße multipliziert wird.'
  type: simple.MultiplicativeNode
  quantity: health_effect
  unit: case/a
  input_dimensions: [response]
  output_dimensions: [response]
  input_nodes:
  - id: incidence
    to_dimensions:
    - id: response
  - id: population
    to_dimensions: []

- id: attributable_cases
  name_fi: Ilmansaasteisiin kohdentuvat tapaukset
  name_en: Cases attributable to air pollution
  name_de: Der Luftverschmutzung zuzurechnende Fälle
  description_fi: 'Se osa kokonaistapausmäärästä, joka kohdentuu pienhiukkasiin ja typenoksideihin.
    Arvio perustuu Terveyden ja hyvinvoinnin laitoksen kehittämään <a
    href="https://en.opasnet.org/w/Health_impact_assessment">tautitaakkamalliin</a>.'
  description_en: 'The fraction of total number of cases that is attributable to PM2.5 and NOx.
    The estimate is based on a <a href="https://en.opasnet.org/w/Health_impact_assessment">
    disease burden model</a> developed by the National Institute for Health and Welfare (THL).'
  description_de: 'Der Anteil der Gesamtzahl der Fälle, der auf PM2,5 und NOx zurückzuführen ist.
    Die Schätzung basiert auf einem <a href="https://en.opasnet.org/w/Health_impact_assessment">
    Krankheitslastmodell</a>, das vom Nationalen Institut für Gesundheit und Wohlfahrt
    (THL) entwickelt wurde.'
  type: simple.MultiplicativeNode
  quantity: health_effect
  unit: case/a
  input_dimensions: [response, pollutant]
  output_dimensions: [response, pollutant]
  input_nodes:
  - id: air_pollution_attributable_fraction
    tags: [bring_to_maximum_historical_year]
  - id: total_number_of_cases
    tags: [bring_to_maximum_historical_year, non_additive]
    to_dimensions:
    - id: response
  output_nodes:
  - id: total_exposure_related_cases
    from_dimensions:
    - id: pollutant
      flatten: true
    to_dimensions:
    - id: response
    - id: iteration
      categories: [thl]

- id: total_exposure_related_cases
  name_fi: Altisteisiin kohdentuva tapausmäärä yhteensä
  name_en: Number of cases attributable to exposure
  name_de: Anzahl expositionsbedingter Fälle insgesamt
  description_fi: Yhteismäärään lasketaan kaikkien mallissa olevien altisteiden aiheuttamat tapaukset. Positiivisen luvut ovat tautitapauksia, negatiiviset luvut ehkäistyjä tapauksia.
  description_de: Die Gesamtzahl umfasst Fälle, die durch alle Expositionen im Modell verursacht
    werden. Positive Zahlen stellen Krankheitsfälle dar, negative Zahlen verhinderte
    Fälle.
  type: simple.AdditiveNode
  quantity: health_effect
  unit: case/a
  input_dimensions: [response, iteration]
  output_dimensions: [response, iteration]

- id: premature_deaths
  name_fi: Ennenaikaiset kuolemat
  name_en: Premature deaths
  name_de: Vorzeitige Sterblichkeit
  description_fi: Tarkasteltujen altisteiden aiheuttamat ennenaikaiset kuolemat. Usein malleissa tarkastellaan
    altisteina pienhiukkasia, typenoksideja ja liikenneonnettomuuksia sekä aktiivista liikkumista kuolemien
    ehkäisijänä. Altistelista kuitenkin vaihtelee mallista toiseen, tämän mallin altisteet listataan
    <a href="air_pollution_exposure">täällä</a>.
  description_en: 'Premature deaths caused by the studied exposures. Often the model studies
    PM2.5, NOx, traffic accidents, and physical activity as exposures. The list of exposures
    varies from model to model, the exposures for this model are listed
    <a href="air_pollution_exposure">here</a>.'
  description_de: 'Vorzeitige Todesfälle, die durch die untersuchten Expositionen verursacht werden.
    Häufig untersucht das Modell PM2,5, NOx, Verkehrsunfälle und körperliche Aktivität
    als Expositionen. Die Liste der Expositionen variiert von Modell zu Modell;
    die Expositionen für dieses Modell sind
    <a href="air_pollution_exposure">hier</a> aufgeführt.'
  type: simple.AdditiveNode
  quantity: health_effect
  unit: case/a
  input_dimensions: [response, iteration]
  output_dimensions: [response, iteration]
  input_nodes:
  - id: total_exposure_related_cases
    from_dimensions:
    - id: response
      categories: [mortality, physical_activity, air_pollution, crash_risk]

- id: case_burden
  name_fi: Tautitaakka per tapaus # TODO Add references.
  name_en: Disease burden by case
  name_de: Krankheitslast pro Fall
  description_fi: Yhden tapauksen aiheuttama tautitaakka eri vasteille.
  description_en: Disease burden caused by a single case.
  description_de: Krankheitslast, die durch einen einzelnen Fall verursacht wird.
  type: generic.GenericNode
  quantity: case_burden
  unit: DALY/case
  input_dimensions: [response]
  output_dimensions: [response]
  input_datasets:
  - id: health/case_burden
    column: case_burden
    forecast_from: 2025

- id: disease_burden_attributed_to_exposure
  name_fi: Altisteisiin kohdentuva tautitaakka
  name_en: Disease burden caused by air pollution
  name_de: Durch Luftverschmutzung verursachte Krankheitslast
  description_fi: Tarkasteltaviin altistuksiin kohdentuva tautitaakka väestössä. Ilmansaasteet
    leviävät satojen kilometrien päähän saastelähteestä. Tässä laskelmassa tarkastellaan kaikkea
    altistumista mutta ne kohdennetaan paikalliseen väestöön. Tämä on tärkeää, koska jokaisen
    päästölähteen pitää huolehtia omista päästöistään, vaikka haitat syntyisivät muualla.</p>
    Mittatikkuna käytetään haittapainotettuja elinvuosia (<a 
    href="https://fi.wikipedia.org/wiki/DALY-arvo">DALY</a>, disability-adjusted life years).
    DALY kuvaa menetettyjä terveitä elinvuosia väestötasolla ottaen huomioon haitan vakavuuden ja keston.
    Esimerkiksi ennenaikaisen kuoleman haittapainokerroin on 1 (suurin mahdollinen), kun taas
    alaselkäkivun kerroin on 0.03.
  description_en: 'Disease burden attributable to the studied exposures. Air pollution spreads
    hundreds of kilometers from the source. This estimate is about all exposure because each
    emission source needs to consider their own emissions irrespective of where the harm occurs.</p>
    The measurement unit is disability-adjusted life year (<a href="https://en.wikipedia.org/wiki/
    Disability-adjusted_life_year">DALY</a>). DALY describes the number of lost healthy life years
    at the population level taking into account the severity and duration of the disability.
    For example, the disability weight for premature death is 1 (the highest possible), while
    the disability weight for lower back pain is 0.03.'
  description_de: 'Krankheitslast, die auf die untersuchten Expositionen zurückgeführt wird.
    Luftverschmutzung breitet sich Hunderte von Kilometern von der Quelle aus.
    Diese Schätzung bezieht sich auf die gesamte Exposition, da jede Emissionsquelle
    ihre eigenen Emissionen berücksichtigen muss, unabhängig davon, wo der Schaden
    entsteht.</p>
    Die Maßeinheit ist das behinderungsbereinigte Lebensjahr (<a href="https://de.wikipedia.org/
    wiki/Behinderungsbereinigte_Lebensjahre">DALY</a>). DALY beschreibt die Anzahl
    verlorener gesunder Lebensjahre auf Bevölkerungsebene unter Berücksichtigung der
    Schwere und Dauer der Beeinträchtigung. Das Behinderungsgewicht für vorzeitigen
    Tod beträgt beispielsweise 1 (das höchstmögliche), für Kreuzschmerzen 0,03.'
  type: simple.MultiplicativeNode
  quantity: health_effect
  unit: DALY/a
  input_dimensions: [response, iteration]
  output_dimensions: [response, iteration]
  is_outcome: true
  input_nodes:
  - id: case_burden
    tags: [extend_to_history, bring_to_maximum_historical_year, non_additive]
    to_dimensions:
    - id: response
  - id: total_exposure_related_cases

# --------------- Health costs ----------------

- id: health_outcome_unit_price
  name_fi: Terveysvaikutusten yksikkökustannukset
  name_en: Health outcome unit price
  name_de: Einheitspreis für Gesundheitsfolgen
  description_fi: 'Käytössä on kaksi lopputulemaa: kuolema (ilmansaastealtistukselle, onnettomuuksille
    ja fyysiselle aktiivisuudelle) sekä menetetty työpäivä. Menetetyn työpäivän hinnaksi lasketaan
    työn tekemisestä tuleva lisäarvo, joka jää sairauden takia saamatta. Tilastollisen kuoleman
    kustannus (value of statistical life) arvioidaan tarkastelemalla hintaa, jonka ihmiset ovat
    valmiita maksamaan pienen kuolemanriskin välttämiseksi.'
  description_en: 'There are basically two different endpoints: death (for air pollution exposures,
    accidents, and physical activity) and work day lost. The value of a work day is calculated as
    the additional value of work that is lost due to absence. The cost of a statistical death
    (value of statistical life) is estimated by looking at the price that people are willing to
    pay to avoid a small risk of death.'
  description_de: 'Es gibt grundsätzlich zwei unterschiedliche Endpunkte: Tod (für Luftschadstoff-
    expositionen, Unfälle und körperliche Aktivität) und verlorener Arbeitstag.
    Der Wert eines Arbeitstages wird als der durch Abwesenheit entgangene Mehrwert
    der Arbeit berechnet. Die Kosten eines statistischen Todes (Wert des statistischen
    Lebens) werden anhand des Preises geschätzt, den Menschen bereit sind zu zahlen,
    um ein kleines Sterberisiko zu vermeiden.'
  type: generic.GenericNode
  quantity: unit_price
  unit: kEUR/case
  input_dimensions: [response]
  output_dimensions: [response]
  input_datasets:
  - id: health/health_outcome_unit_price
    column: health_outcome_unit_price

- id: responses_vs_cost_types
  name_fi: Vasteet vs kustannuslajit
  name_en: Responses vs cost types
  name_de: Gesundheitseffekte vs. Kostenarten
  type: generic.GenericNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [response, cost_type]
  output_dimensions: [response, cost_type]
  input_datasets:
  - id: health/responses_vs_cost_types
    column: responses_vs_cost_types

- id: health_costs_attributed_to_exposure
  name_fi: Altistumiseen kohdentuvat terveyskustannukset
  name_en: Health costs attributable to exposure
  name_de: Expositionsbedingte Gesundheitskosten
  description_fi: Kaikki tarkasteltavat terveysvaikutukset kustannuslajin mukaan. Lisäksi on
    mahdollista tarkastella tuloksia sen perusteella, minkä mallin mukaisesti niitä on laskettu.
    Jos kaksi mallia laskee samaa asiaa, tuloksissa voi olla kaksoislaskentaa tässä solmussa, ja
    oikea tulos saadaan valitsemalla haluttu malli. Diskontatuista terveyskustannuksista kaksoislaskenta
    on poistettu.
  description_en: 'All the studied health impacts are attributed to the cost type. In addition,
    it is possible to examine the results based on which model they have been calculated from.
    If two models calculate the same thing, there may be double counting in the results in this
    node and the correct result is selected by choosing the desired model. Double counting has
    been removed from the discounted health costs.'
  description_de: 'Alle untersuchten Gesundheitsauswirkungen werden einem Kostentyp zugeordnet.
    Darüber hinaus können die Ergebnisse danach analysiert werden, mit welchem Modell
    sie berechnet wurden. Wenn zwei Modelle dasselbe berechnen, kann es in diesem
    Knoten zu Doppelzählungen kommen; das korrekte Ergebnis erhält man durch Auswahl
    des gewünschten Modells. Doppelzählungen wurden aus den diskontierten
    Gesundheitskosten entfernt.'
  type: generic.GenericNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [response, cost_type, iteration]
  output_dimensions: [response, cost_type, iteration]
  input_nodes:
  - id: total_exposure_related_cases
    to_dimensions:
    - id: response
    - id: iteration
  - id: responses_vs_cost_types
    tags: [extend_to_history]
    to_dimensions:
    - id: response
    - id: cost_type
  - id: health_outcome_unit_price
    tags: [extend_to_history]
    to_dimensions:
    - id: response
  output_nodes:
  - id: discounted_health_costs
    tags: [expectation]
    from_dimensions:
    - id: response
      flatten: true

- id: discounted_health_costs
  name_fi: Diskontatut terveyskustannukset
  name_en: Discounted health costs
  name_de: Diskontierte Gesundheitskosten
  description_fi: Diskonttaamalla on arvostettu lähiaikoina syntyviä terveysvaikutuksia
    enemmän kuin kaukana tulevaisuudessa tapahtuvia.
  description_en: 'The discounted health costs are discounted by the discount rate,
    favoring more recent health impacts over future ones.'
  description_de: 'Die diskontierten Gesundheitskosten werden mit dem Diskontierungszinssatz
    abgezinst, wobei neuere Gesundheitsauswirkungen gegenüber zukünftigen
    bevorzugt werden.'
  type: costs.ExponentialNode
  quantity: consumption
  unit: MEUR/a
  input_dimensions: [cost_type, iteration]
  output_dimensions: [cost_type, iteration]
  params:
  - id: annual_change
    ref: discount_rate
  - id: is_decreasing_rate
    value: true
