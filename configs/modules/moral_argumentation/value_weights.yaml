# Moral value module — calculation layer
# Defines ValueActions (one per value topic) and utility nodes that multiply each
# value's weight by the relevant duty/contribution. No global weight params; each
# weight is the ValueAction's node-specific "constant" parameter.
# Include action_groups with id moral_values. See README.md section 4.3.
# Instance must define (or override): fair_share_met, emissions_acceptable; optional commons_survival.
# Optional contribution nodes (default to constants): cost_efficiency_contribution, actor_roi_contribution,
# net_benefit_contribution, outcome_risk_large_or_systemic. Risk premium: risk_magnitude, risk_premium_cost.

actions:

- id: value_fairness
  name: 'VAL-1: We should do our fair share even if others do not.'
  description: |
    <h3>Value: Fair share regardless of others</h3>
    <p><strong>Sentiment:</strong> Everyone who contributes must do their fair share. Moral duty exists independent of whether others act. "Do unto others as you would have them do unto you."</p>
    <p><strong>Related:</strong> <code>fair_share_met</code>, <code>emissions_acceptable</code></p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_fairness
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: free_rider
  name: 'VAL-2: Whether others act matters to me when I decide.'
  description: |
    <h3>Value: Conditional cooperation</h3>
    <p><strong>Sentiment:</strong> I care whether others are doing their part before I commit. If other cities/countries don't act, we bear costs while they get benefits (climate is global). So the extent to which others act influences how much I weight this consideration.</p>
    <p><strong>Type:</strong> Moral value (conditional cooperation). This is called the "sucker's payoff" in game theory. It is also known as "free-rider approach" or "common-pool problem". However, it is not a "problem" from the holder's view — it is the view that reciprocity and others' behaviour matter when deciding.</p>
    <p><strong>Related Evaluation Nodes:</strong></p>
    <ul>
    <li><code>fair_share_met</code> - Are we doing our part (regardless of others)?</li>
    <li><code>fair_share_fraction</code> - What % of obligation are we meeting?</li>
    </ul>
    <p><strong>Contrast:</strong> VAL-1 says we should do our share regardless of others. VAL-2 says whether others act matters to me. High weight here = this consideration matters in my priorities.</p>
    <p><strong>Weight:</strong> Adjust to set how much "whether others act" contributes to your priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_reciprocity
    tags: [weight]
  - id: should_we_cooperate
    tags: [our_threshold]
  params:
  - id: constant
    value: 0.3
    min_value: 0
    max_value: 1
    step: 0.1
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_stewardship
  name: 'VAL-3: We should leave a habitable world for future generations.'
  description: |
    <h3>Value: Stewardship / intergenerational</h3>
    <p><strong>Sentiment:</strong> We hold the planet in trust for future generations. Cannot sacrifice their wellbeing for our convenience. "What will you tell your grandchildren?"</p>
    <p><strong>Related:</strong> <code>emissions_acceptable</code></p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_stewardship
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_non_harm
  name: 'VAL-4: We should not contribute to avoidable harm.'
  description: |
    <h3>Value: Non-harm</h3>
    <p><strong>Sentiment:</strong> Contributing to avoidable harm is wrong; we must reduce our contribution. Every jurisdiction's emissions contribute to harm.</p>
    <p><strong>Related:</strong> <code>emissions_acceptable</code></p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_non_harm
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_common_heritage
  name: 'VAL-5: We should stay within our share of the global commons.'
  description: |
    <h3>Value: Common heritage</h3>
    <p><strong>Sentiment:</strong> Climate is a shared commons; we have no right to overuse. Duty to stay within our share.</p>
    <p><strong>Related:</strong> <code>emissions_acceptable</code>, <code>fair_share_met</code></p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_common_heritage
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_cost_efficiency
  name: 'VAL-6: We should prioritise actions that achieve the most outcome per unit of resource (cost-efficiency).'
  description: |
    <h3>Value: Cost-efficiency</h3>
    <p><strong>Sentiment:</strong> Reach as much emission reduction (or other desired outcome) with as little input resources as possible (e.g. public budget, citizens' effort). This also distributes moral responsibility: those who can implement cost-efficient actions have more reason to act.</p>
    <p><strong>Related:</strong> <code>cost_efficiency_contribution</code> — override in instance with outcome per unit cost (e.g. emission reduction per euro) or a normalised 0–1 contribution.</p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_cost_efficiency
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_roi
  name: 'VAL-7: I care whether the actor who implements the action gets a return on that investment.'
  description: |
    <h3>Value: Return on investment (actor-centric)</h3>
    <p><strong>Sentiment:</strong> More individualistic than cost-efficiency: benefits to the implementing stakeholder matter; benefits to others are given less weight. Prioritise actions where the actor who pays gets sufficient return.</p>
    <p><strong>Related:</strong> <code>actor_roi_contribution</code> — override in instance with ROI or normalised 0–1 contribution.</p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_roi
    tags: [weight]
  params:
  - id: constant
    value: 0.5
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_cost_benefit
  name: 'VAL-8: We should maximise net benefit when outcomes can be compared in a single metric (cost-benefit).'
  description: |
    <h3>Value: Cost-benefit analysis</h3>
    <p><strong>Sentiment:</strong> When outcomes can be weighted or prioritised in a common metric, maximise utility: choose actions and levels that yield positive net benefit and avoid those not worth pursuing. More holistic than cost-efficiency (which only ranks actions); CBA can also say how far to go. Costs can include a risk premium.</p>
    <p><strong>Related:</strong> <code>net_benefit_contribution</code>, <code>risk_premium_cost</code> (additional cost in CBA, dependent on risk).</p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_cost_benefit
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

- id: value_precaution
  name: 'VAL-9: We should deprioritise actions that entail very large or systemic outcome risks (precautionary principle).'
  description: |
    <h3>Value: Precautionary principle</h3>
    <p><strong>Sentiment:</strong> When outcome risk is very large and/or systemic, actions that trigger such risks are deprioritised. This value is activated by high risk; low risk does not add utility, but high risk reduces it.</p>
    <p><strong>Related:</strong> <code>outcome_risk_large_or_systemic</code> — 0 = low/small risk, 1 = large or systemic risk. Override in instance when risk data is available.</p>
    <p><strong>Weight:</strong> Use the slider to set how much this value contributes to priorities (0 = ignore).</p>
  type: simple.ValueAction
  quantity: value_weight
  unit: dimensionless
  group: moral_values
  output_nodes:
  - id: utility_precaution
    tags: [weight]
  params:
  - id: constant
    value: 1
    min_value: 0
    max_value: 10
    unit: dimensionless
    is_customizable: true
    is_visible: true

nodes:

# Each utility = value action output (weight) × duty fulfilment.
# Duty nodes (fair_share_met, emissions_acceptable) must exist in the instance.

# ===== ETHICAL EVALUATION NODES =====

- id: acceptable_emissions_per_person
  name: Acceptable emissions per person threshold
  description: |
    Morally acceptable per-capita emissions level consistent with climate goals.
    Typically 2-3 tonnes CO2e/person/year for 2°C target; 1-1.5 tonnes for 1.5°C target.
  type: generic.GenericNode
  quantity: emissions
  unit: t_co2e/person/a
  input_datasets:
  - id: transportation/acceptable_emissions_per_person
    output_dimensions: []
  params:
  - id: multiplier
    value: 1.0
    unit: dimensionless

- id: emissions_acceptable
  name: Emissions meet acceptable threshold
  description: Evaluation of whether per-capita emissions are below morally 
    acceptable level
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: net_emissions_per_person
    tags: [actual]
  - id: acceptable_emissions_per_person
    tags: [thresholdd]
  params:
    formula: actual <= thresholdd

- id: emission_target_gap
  name: Emission target gap
  description: The difference between the net emissions and the emission target.
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_nodes:
  - id: net_emissions
  params:
    operations: goal_gap

- id: emission_target_achieved
  name: Emission target achieved
  description: Whether the emission target is met.
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: emission_target_gap
  params:
  - id: formula
    value: emission_target_gap <= constant
  - id: constant
    value: 0
    unit: kt_co2e/a

# FAIR SHARE ASSESSMENT

- id: emission_reduction_achieved
  name: Emission reduction achieved
  description: Reduction from baseline due to policy
  type: generic.GenericNode
  quantity: emissions
  unit: t_co2e/person/a
  input_nodes:
  - id: net_emissions_per_person
  params:
    operations: add,scenario_impact

- id: emission_reduction_target_per_person
  name: Emission reduction target per person
  description: Target reduction per person
  type: generic.ConstantNode
  quantity: emissions
  unit: g_co2e/person/a
  params:
  - id: constant
    value: -1.0
    unit: g_co2e/person/a
    label: Target reduction per person

- id: fair_share_met
  name: Fair share obligation met
  description: |
    Evaluation of whether city is meeting its proportional responsibility for 
    emission reductions. Returns 1 if fair share met, 0 if not.
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_nodes:
  - id: emission_reduction_achieved
    tags: [achieved]
  - id: emission_reduction_target_per_person
    tags: [obligation]
  params:
    formula: achieved <= obligation

# ===== COST-EFFICIENCY, ROI, COST-BENEFIT, RISK (placeholders; override in instance) =====

- id: cost_efficiency_contribution
  name: Cost-efficiency contribution
  description: |
    Contribution to cost-efficiency value: higher when actions achieve more outcome per unit resource (e.g. emission reduction per euro). 0–1 or normalised. Override in instance with real metric (e.g. outcome/cost relative to benchmark).
  type: generic.ConstantNode
  quantity: fraction
  unit: dimensionless
  params:
  - id: constant
    value: 1.0
    unit: dimensionless

- id: actor_roi_contribution
  name: Actor return-on-investment contribution
  description: |
    Contribution to ROI value: higher when the implementing stakeholder gets sufficient return on investment. 0–1 or normalised. Override in instance with actor-centric ROI.
  type: generic.ConstantNode
  quantity: fraction
  unit: dimensionless
  params:
  - id: constant
    value: 1.0
    unit: dimensionless

- id: net_benefit_contribution
  name: Net benefit (cost-benefit) contribution
  description: |
    Contribution to cost-benefit value: higher when net benefit (benefits − costs, optionally minus risk premium) is larger. Normalised or threshold. Override in instance when benefits and costs are in a common metric.
  type: generic.ConstantNode
  quantity: fraction
  unit: dimensionless
  params:
  - id: constant
    value: 1.0
    unit: dimensionless

- id: outcome_risk_large_or_systemic
  name: Outcome risk large or systemic
  description: |
    For precautionary principle: 0 = low/small risk, 1 = large or systemic outcome risk. Actions with high values get deprioritised. Override in instance when risk data is available; later replace with probability-based risk.
  type: generic.ConstantNode
  quantity: fraction
  unit: dimensionless
  params:
  - id: constant
    value: 0.0
    unit: dimensionless

- id: risk_magnitude
  name: Risk magnitude (for risk premium)
  description: |
    Magnitude of risk used to compute risk premium as additional cost in cost-benefit analysis. Simplistic for now; later replace with proper probability/utility-based calculation.
  type: generic.ConstantNode
  quantity: fraction
  unit: dimensionless
  params:
  - id: constant
    value: 0.0
    unit: dimensionless

- id: risk_premium_cost
  name: Risk premium (additional cost in CBA)
  description: |
    Additional cost in cost-benefit analysis dependent on risk magnitude. Formula risk_magnitude * constant; instances can override constant or the node. Add to costs when computing net benefit for CBA.
  type: formula.FormulaNode
  quantity: currency
  unit: EUR
  input_nodes:
  - id: risk_magnitude
    tags: [risk_magnitude]
  params:
  - id: formula
    value: risk_magnitude * constant
  - id: constant
    value: 0
    unit: EUR

- id: utility_own_targets_achieved
  name: Utility from own targets achieved
  description: Whether the own targets are met.
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: emission_target_achieved
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: emission_target_achieved * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_fairness
  name: Utility from fairness (fair share met)
  description: Contribution of the fairness value. Weight comes from value_fairness action; contribution from fair_share_met.
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: fair_share_met
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_reciprocity
  name: Utility from reciprocity (doing our part)
  description: Contribution of the reciprocity value. Same duty as fairness (acting is doing our part).
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: fair_share_met
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_stewardship
  name: Utility from stewardship (emissions acceptable for future generations)
  description: Contribution of the stewardship value.
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_dimensions: [hypotheses]
  output_dimensions: [hypotheses]
  input_nodes:
  - id: emissions_acceptable
    tags: [contribution]
  - id: commons_survival
    tags: [survival]
  output_nodes:
  - id: total_utility
    from_dimensions:
    - id: hypotheses
      categories: [moderate]
      flatten: true
  params:
  - id: formula
    value: weight * contribution * survival * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_non_harm
  name: Utility from non-harm (emissions within acceptable level)
  description: Contribution of the non-harm value.
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: emissions_acceptable
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_common_heritage
  name: Utility from common heritage (within our share)
  description: Contribution of the common heritage value. Uses emissions_acceptable as proxy for staying within share.
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: emissions_acceptable
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_cost_efficiency
  name: Utility from cost-efficiency
  description: Contribution of the cost-efficiency value. Weight from value_cost_efficiency; contribution from cost_efficiency_contribution (override in instance).
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: cost_efficiency_contribution
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_roi
  name: Utility from return on investment (actor-centric)
  description: Contribution of the ROI value. Weight from value_roi; contribution from actor_roi_contribution (override in instance).
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: actor_roi_contribution
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_cost_benefit
  name: Utility from cost-benefit analysis
  description: Contribution of the cost-benefit value. Weight from value_cost_benefit; contribution from net_benefit_contribution. Costs can include risk_premium_cost (override in instance).
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: net_benefit_contribution
    tags: [contribution]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * contribution * constant
  - id: constant
    value: 1
    unit: Ut

- id: utility_precaution
  name: Utility from precautionary principle
  description: Contribution of the precautionary principle. High outcome_risk_large_or_systemic deprioritises actions (utility = weight * (1 - risk) * constant).
  type: formula.FormulaNode
  quantity: utility
  unit: Ut
  input_nodes:
  - id: outcome_risk_large_or_systemic
    tags: [risk]
  output_nodes:
  - id: total_utility
  params:
  - id: formula
    value: weight * (1 - risk) * constant
  - id: constant
    value: 1
    unit: Ut

- id: total_utility
  name: Total utility
  description: |
    Sum of utilities from each moral value (fairness, reciprocity, stewardship, non-harm, common heritage, cost-efficiency, ROI, cost-benefit, precaution).
    Each value contributes (weight × duty_fulfilled or weight × contribution). Weights are set per value via each ValueAction's slider. Risk premium (risk_premium_cost) is available as an additional cost for cost-benefit analysis.
  type: simple.AdditiveNode
  quantity: utility
  unit: Ut
  is_outcome: true
  # Inputs defined by utility_* nodes' output_nodes (no duplicate input_nodes here)
