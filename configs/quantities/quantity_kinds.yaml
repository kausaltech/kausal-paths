# Quantity kinds define the semantic meaning of a numeric value.
#
# Each entry has:
#   label:        Translations keyed by language code (en required)
#   icon:         Optional emoji for UI display
#   qudt:         QUDT quantityKind IRI (where a reasonable match exists)
#   is_stackable: Values can be summed across child nodes (default false)
#   is_activity:  Represents a physical activity or flow (default false)
#   is_factor:    A rate or conversion factor (default false)
#   is_unit_price: A monetary cost per unit of something (default false)

