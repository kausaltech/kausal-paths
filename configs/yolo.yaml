- id: vehicle_miles_traveled_ev
  name: Vehicle Miles Traveled (EVs)
  type: formula.FormulaNode
  quantity: mileage
  unit: miles/a
  input_dimensions: [ev_type, vehicle_type, speed_bin, travel_boundary]
  output_dimensions: [ev_type, vehicle_type, speed_bin, travel_boundary]
  params:
    formula: vmt * annualization_factor * dt3 * split
  input_nodes:
  - id: vehicle_miles_traveled
    tags: [vmt]
    to_dimensions:
    - id: vehicle_type
    - id: speed_bin
    - id: travel_boundary
