pages:
- id: home
  name: Yolo County Greenhouse Gas Emissions
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Yolo County Greenhouse Gas Emissions
  lead_paragraph: Community-wide greenhouse gas inventory and targets.

scenarios:
- id: baseline
  name: Business as Usual

- id: abau
  name: Adjusted Business as Usual
  all_actions_enabled: false
  param_values:
    abau_electricity_emission_factors.enabled: true
    abau_onroad_transportation_emission_factors_ice.enabled: true
    abau_building_electricity_usage.enabled: true
    abau_building_natural_gas_usage.enabled: true

- id: default
  default: true
  name: Climate Action and Adaptation Plan
  all_actions_enabled: true