- id: building_emissions
  name: Building Energy
  color: '#4E79A7'
  type: formula.FormulaNode
  quantity: emissions
  unit: t_co2e/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier, ghg, scope]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier, ghg, scope]
  params:
    formula: ((electricity_usage * electricity_emission_factors) + (gas_usage * gas_emission_factors)) * gwp
  input_nodes:
  - id: building_electricity_usage
    tags: [electricity_usage]
    to_dimensions:
    - id: subsector
    - id: building_type
    - id: building_status
    - id: energy_provider
    - id: energy_carrier
  - id: building_natural_gas_usage
    tags: [gas_usage]
    to_dimensions:
    - id: subsector
    - id: building_type
    - id: building_status
    - id: energy_provider
    - id: energy_carrier
  - id: electricity_emission_factors
    to_dimensions:
    - id: energy_provider
    - id: ghg
    - id: scope
    - id: energy_carrier
  - id: natural_gas_emission_factors
    tags: [gas_emission_factors]
    to_dimensions:
    - id: energy_provider
    - id: ghg
    - id: scope
    - id: energy_carrier
  - id: global_warming_potential
    tags: [gwp]
    to_dimensions:
    - id: ghg
  output_nodes:
  - id: net_emissions
    from_dimensions:
    - id: building_type
      flatten: true
    - id: building_status
      flatten: true
    - id: energy_provider
      flatten: true
    - id: energy_carrier
      flatten: true
    - id: ghg
      flatten: true

