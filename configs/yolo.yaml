id: yolo
default_language: en
supported_languages: []
site_url: https://yolo.paths.kausal.tech
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 3b6d7581b74b2508551191ddc6bb9ce0d9f02164
  dvc_remote: kausal-s3
name: Yolo County Greenhouse Gas Emissions
owner: Yolo County
theme_identifier: us-yolo
target_year: 2030
model_end_year: 2045
reference_year: 2022
minimum_historical_year: 2022
maximum_historical_year: 2022
emission_unit: t_co2e/a
emission_forecast_from: 2023
emission_dimensions: [subsector, scope]
features:
  baseline_visible_in_graphs: true

action_group:
- id: transportation_act
  name: Decarbonize Transportation
  color: '#545A79'
- id: buildings_act
  name: Decarbonize Energy and Buildings and Increase Energy Efficiency
  color: '#A4C146'
- id: water_act
  name: Optimize Water Use
  color: '#3C8BDB'
- id: waste_act
  name: Minimize Waste
  color: '#897C24'
- id: offroad_act
  name: Reduce Off-Road Equipment Emissions
  color: '#325437'
- id: sequestration_act
  name: Sequester and Store Carbon in Natural and Working Lands
  color: '#025B57'
- id: abau
  name: Federal- and State-mandated GHG emission reduction measures
  color: '#000000'

dimensions:
# - id: sector
#   label: Sector
#   categories:
#   - id: building_energy
#     label: Building Energy
#   - id: on_road_transportation
#     label: On-road Transportation
#   - id: offroad_equipment
#     label: Off-road Equipment
#   - id: solid_waste
#     label: Solid Waste
#   - id: water
#     label: Water
#   - id: wastewater
#     label: Wastewater
#   - id: agriculture
#     label: Agriculture

- id: subsector
  label: Subsector
  categories:
  #----- Buildings
  - id: residential
    label: Residential
  - id: commercial
    label: Commercial
  - id: agricultural
    label: Agricultural
  - id: industrial
    label: Industrial

  # ----- Off-road Equipment
  - id: agricultural_eq
    label: Agricultural Equipment
  - id: tru_eq
    label: TRUs
  - id: construction_eq
    label: Construction
  - id: industrial_eq
    label: Industrial
  - id: lawn_garden_eq
    label: Lawn & Garden
  - id: light_commercial_eq
    label: Light Commercial
  - id: pleasure_craft
    label: Pleasure Craft
  - id: recreational_eq
    label: Recreational
  - id: portable_eq
    label: Portable Equipment

  # ----- Solid Waste
  - id: waste_in_place
    label: Waste In-Place
  - id: waste_generation
    label: Waste Generation

  # ----- Water
  - id: groundwater_pumping
    label: Groundwater Pumping for Community Use

  # ----- Agriculture
  - id: irrigation_pumps
    label: Agricultural Irrigation Pumps
  - id: residue_burning
    label: Residue Burning
  - id: livestock
    label: Livestock
  - id: rice_cultivation
    label: Rice Cultivation
  - id: nitrogen_application
    label: Nitrogen Application
  - id: urea_application
    label: Urea Application
  - id: lime_application
    label: Lime Application

- id: scope
  label: Scope
  categories:
  - id: scope1
    label: Scope 1
    order: 0
  - id: scope2
    label: Scope 2
    order: 1
  - id: scope3
    label: Scope 3
    order: 2
  - id: negative
    label: Negative Emissions
    order: -1

- id: ghg
  label: Greenhouse Gas
  categories:
  - id: ch4
    label: CH4
  - id: co2
    label: CO2
  - id: co2e
    label: CO2e
  - id: n2o
    label: N2O

- id: energy_provider
  label: Energy provider 
  categories:
  - id: PG&E
    label: PG&E
  - id: VCE
    label: VCE

- id: energy_carrier
  label: Energy Carrier
  categories: 
  - id: electricity
    label: Electricity
  - id: natural_gas 
    label: Natural Gas

- id: building_type
  label: Building Type
  categories:
  - id: single_family
    label: Single-Family
  - id: multi_family
    label: Multi-Family
  - id: non_residential
    label: Non-Residential

- id: building_status
  label: Building Status
  categories: 
  - id: new
    label: New
  - id: existing
    label: Existing

# -- on-road transportation
- id: travel_boundary
  label: Travel Boundary
  categories: 
  - id: within_sacog
    label: Within SACOG
  - id: outside_sacog
    label: Outside SACOG

- id: vehicle_type
  label: Vehicle Type
  categories:
  - id: personal_vehicle
    label: Personal Vehicle
  - id: commercial_small_vehicle
    label: Commercial Small Vehicle
  - id: commercial_large_vehicle
    label: Commercial Large Vehicle

- id: speed_bin
  label: Speed Bin
  categories:
  - id: 0-5
    label: 0-5
  - id: 5-10
    label: 5-10
  - id: 10-15
    label: 10-15
  - id: 15-20
    label: 15-20
  - id: 20-25
    label: 20-25
  - id: 25-30
    label: 25-30
  - id: 30-35
    label: 30-35
  - id: 35-40
    label: 35-40
  - id: 40-45
    label: 40-45
  - id: 45-50
    label: 45-50
  - id: 50-55
    label: 50-55
  - id: 55-60
    label: 55-60
  - id: 60-65
    label: 60-65
  - id: 65-70
    label: 65-70

- id: ev_type
  label: EV Type
  categories: 
  - id: bev
    label: Battery Electric Vehicle
  - id: phev
    label: Plug-in Hybrid Electric Vehicle

# -- water 
- id: water_source
  label: Water source
  categories:
  - id: north_davis_meadows
    label: North Davis Meadows
  - id: wild_wings_csd
    label: Wild Wings CSD

# -- agriculture
- id: crops_harvested
  label: Crops Harvested
  categories: 
  - id: corn
    label: Corn
  - id: rice
    label: Rice
  - id: almond
    label: Almond
  - id: walnut
    label: Walnut
  - id: wheat
    label: Wheat
  - id: barley
    label: Barley

- id: livestock_name
  label: Livestock Name
  categories:
  - id: cattle
    label: Cattle
  - id: lambs
    label: Lambs

- id: livestock_emission_source
  label: Emission source
  categories:
  - id: enteric_fermentation
    label: Enteric Fermentation
  - id: manure_management
    label: Manure Management

# -- wastewater
- id: influent_source
  label: Influent Source
  categories:
  - id: wild_wings_csd_wrf
    label: Wild Wings CSD Wastewater Recycling Facility
  - id: madison_wwtf
    label: Madison WWTF
  - id: knights_landing_csd_wwtp
    label: Knights Landing CSD WWTP
  - id: esparto_csd_wwtp
    label: Esparto CSD WWTP
  - id: davis_wwtp
    label: City of Davis WWTP (Unincorporated Population)
  - id: dunnigan_wwtf
    label: Dunnigan WWTF

- id: action
  label: Action
  categories:
  - id: dt3
    label: Encourage transition to electric vehicles
  - id: eb1b
    label: Incentivize cool and green roofs installation
  - id: eb1d
    label: Energy efficiency retrofits for existing buildings
  - id: eb2b
    label: Incentivize appliance electrification in existing buildings
  - id: eb2c
    label: Require new buildings to install zero emission equipment
  # - id: eb3d
  #   label: Install solar PV systems on new development 
  # - id: eb3e
  #   label: Facilitate adoption of enhanced solar PV system requirements
  - id: eb4d
    label: Encourage enrollment in "UltraGreen" program by VCE
  - id: w2
    label: Encourage efficient water use in agricultural operations 
  - id: w4
    label: Conserve water in unincorporated county areas
  - id: sw1
    label: Waste diversion
  - id: sw3
    label: Landfill gas capture improvements
  - id: ofr1
    label: Decarbonize offroad & landscaping equipment
  - id: ofr2
    label: Decarbonize agricultural equipment
  - id: nwl1
    label: Encourage climate smart practices in working lands
  - id: nwl2
    label: Restore natural lands 
  - id: abau_trend_electricity
    label: Federal- and State-mandated electricity emissions reduction
  - id: abau_trend_transportation
    label: Federal- and State-mandated transportation emission reduction
  - id: abau_trend_building_electricity
    label: Federal- and State-mandated building electricity use reduction
  - id: abau_trend_building_natural_gas
    label: Federal- and State-mandated building natural gas use reduction


emission_sectors:
- id: net_emissions
  name: Net Emissions
  is_outcome: true

- id: negative_emissions
  name: Negative Emissions
  part_of: net_emissions
  order: -1

nodes: 

# -- energy emission factors 

- id: electricity_emission_factor
  name: Electricity Emission Factor
  type: simple.AdditiveNode
  quantity: emission_factor
  unit: lbs_co2e/MWh
  input_dimensions: [scope, ghg, energy_provider, energy_carrier]
  output_dimensions: [scope, ghg, energy_provider]
  input_datasets:
  - id: yolo/energy-emission-factors
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
  input_dataset_processors: [LinearInterpolation]

- id: natural_gas_emission_factor
  name: Natural Gas Emission Factor
  type: simple.AdditiveNode
  quantity: emission_factor
  unit: lbs_co2e/MWh
  input_dimensions: [scope, ghg, energy_provider, energy_carrier]
  output_dimensions: [scope, ghg, energy_provider]
  input_datasets:
  - id: yolo/energy-emission-factors
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
  input_dataset_processors: [LinearInterpolation]

  # -- building 

- id: building_electricity_use
  label: Building Electricity Use
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
  input_dataset_processors: [LinearInterpolation]

- id: abau_new_buildings_electricity_use
  name: New Buildings Electricity Use (Adjusted Business As Usual)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
    - dimension: building_status
      categories: [new]
    - dimension: scenario_id
      categories: [adjusted_baseline]
  input_dataset_processors: [LinearInterpolation]

# --- nodes related to action eb1b
- id: ac_factor
  name: AC Factor
  type: simple.AdditiveNode
  quantity: factor
  unit: dimensionless
  input_dimensions: [subsector, building_status, factor_type]
  output_dimensions: [subsector, building_status]
  input_datasets:
  - id: yolo/actions-input
    filters:
    - column: action
      value: eb1b
    - column: quantity
      value: factor
    - dimension: factor_type
      categories: [ac]

- id: cool_roof_factor
  name: Cool Roof Factor
  type: simple.AdditiveNode
  quantity: factor
  unit: dimensionless
  input_dimensions: [subsector, building_status, factor_type]
  output_dimensions: [subsector, building_status]
  input_datasets:
  - id: yolo/actions-input
    filters:
    - column: action
      value: eb1b
    - column: quantity
      value: factor
    - dimension: factor_type
      categories: [cool_roof]

- id: eb1b_electricity_reduction
  name: New Buildings Electricity Use Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  params:
    formula: -fraction * new_bldg_elec * ac_factor * cool_roof_factor
  input_nodes:
  - id: eb1b
    tags: [fraction]
  - id: abau_new_buildings_electricity_use
    tags: [new_bldg_elec]
  - id: ac_factor
    tags: [ac_factor]
  - id: cool_roof_factor
    tags: [cool_roof_factor]
  output_nodes:
  - id: building_electricity_use

# -- nodes related to action eb1d
- id: eb1d_existing_commercial_electricity
  name: Existing Commercial Buildings Electricity Use (Adjusted BAU)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: [energy_provider]
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
    - dimension: building_status
      categories: [existing]
    - dimension: subsector
      categories: [commercial]
    - dimension: scenario_id
      categories: [adjusted_baseline]
  input_dataset_processors: [LinearInterpolation]

- id: eb1d_existing_commercial_electricity_total
  name: Existing Commercial Buildings Total Electricity Use (Adjusted BAU)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [energy_provider]
  output_dimensions: []
  input_nodes:
  - id: eb1d_existing_commercial_electricity
    to_dimensions: []

- id: eb1d_utility_share
  name: Existing Commercial Buildings Electricity Share by Provider
  type: formula.FormulaNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [energy_provider]
  output_dimensions: [energy_provider]
  params:
    formula: elec_by_provider / total_elec
  input_nodes:
  - id: eb1d_existing_commercial_electricity
    tags: [elec_by_provider]
  - id: eb1d_existing_commercial_electricity_total
    tags: [total_elec]

- id: eb1d_csi_electricity_reduction
  name: EB1D CSI Electricity Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [energy_provider]
  output_dimensions: [energy_provider]
  params:
    formula: -5883.5 * (fraction / 100) * 663.5 * utility_share
  input_nodes:
  - id: eb1d
    tags: [fraction]
  - id: eb1d_utility_share
    tags: [utility_share]
  output_nodes:
  - id: building_electricity_use

- id: eb1d_pace_electricity_reduction
  name: EB1D PACE Electricity Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [energy_provider]
  output_dimensions: [energy_provider]
  params:
    formula: -1.02 * fraction * 663.5 * utility_share
  input_nodes:
  - id: eb1d
    tags: [fraction]
  - id: eb1d_utility_share
    tags: [utility_share]
  output_nodes:
  - id: building_electricity_use

- id: eb1d_csi_gas_reduction
  name: EB1D CSI Natural Gas Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: []
  output_dimensions: []
  params:
    formula: -2282.02 * fraction * 663.5
  input_nodes:
  - id: eb1d
    tags: [fraction]
  output_nodes:
  - id: building_natural_gas_use

# --- nodes related to action eb2b
- id: eb2b_existing_buildings_natural_gas
  name: Existing Buildings Natural Gas Use (Adjusted BAU)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: []
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
    - dimension: building_status
      categories: [existing]
    - dimension: scenario_id
      categories: [adjusted_baseline]
  input_dataset_processors: [LinearInterpolation]

- id: eb2b_gas_reduction
  name: EB2B Natural Gas Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: []
  output_dimensions: []
  params:
    formula: -fraction * total_gas
  input_nodes:
  - id: eb2b
    tags: [fraction]
  - id: eb2b_existing_buildings_natural_gas
    tags: [total_gas]
  output_nodes:
  - id: building_natural_gas_use

- id: eb2b_electricity_increase
  name: EB2B Electricity Increase from Electrification
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: []
  output_dimensions: []
  params:
    formula: fraction * total_gas * 0.91
  input_nodes:
  - id: eb2b
    tags: [fraction]
  - id: eb2b_existing_buildings_natural_gas
    tags: [total_gas]
  output_nodes:
  - id: building_electricity_use
    to_dimensions:
    - id: energy_provider
      categories: [PG&E]

# --- nodes related to action eb2c
- id: eb2c_new_buildings_natural_gas
  name: New Buildings Natural Gas Use (Adjusted BAU)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: []
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
    - dimension: building_status
      categories: [new]
    - dimension: scenario_id
      categories: [adjusted_baseline]
  input_dataset_processors: [LinearInterpolation]

- id: eb2c_gas_reduction
  name: EB2C Natural Gas Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: []
  output_dimensions: []
  params:
    formula: -fraction * total_gas
  input_nodes:
  - id: eb2c
    tags: [fraction]
  - id: eb2c_new_buildings_natural_gas
    tags: [total_gas]
  output_nodes:
  - id: building_natural_gas_use

- id: eb2c_electricity_increase
  name: EB2C Electricity Increase from Electrification
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: []
  output_dimensions: []
  params:
    formula: fraction * total_gas * 0.91
  input_nodes:
  - id: eb2c
    tags: [fraction]
  - id: eb2c_new_buildings_natural_gas
    tags: [total_gas]
  output_nodes:
  - id: building_electricity_use
    to_dimensions:
    - id: energy_provider
      categories: [PG&E]

# --- nodes related to action eb4d
- id: eb4d_building_electricity
  name: Building Electricity Use (Adjusted BAU)
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
    - dimension: subsector
      categories: [residential, commercial]
    - dimension: scenario_id
      categories: [adjusted_baseline]
  input_dataset_processors: [LinearInterpolation]

- id: eb4d_electricity_reduction
  name: EB4D Electricity Reduction
  type: formula.FormulaNode
  quantity: energy_consumption
  unit: kWh/year
  input_dimensions: [subsector, energy_provider, building_type, building_status]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  params:
    formula: -fraction * total_elec
  input_nodes:
  - id: eb4d
    tags: [fraction]
  - id: eb4d_building_electricity
    tags: [total_elec]
  output_nodes:
  - id: building_electricity_use

- id: building_natural_gas_use
  label: Building Natural Gas Use
  type: simple.AdditiveNode
  quantity: energy_consumption
  unit: therms/year
  input_dimensions: [subsector, energy_provider, building_type, building_status, energy_carrier]
  output_dimensions: [subsector, energy_provider, building_type, building_status]
  input_datasets:
  - id: yolo/building-input
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
  input_dataset_processors: [LinearInterpolation]

- id: building_emissions
  label: Building Energy
  type: formula.FormulaNode #possible to simplify this to a multiplicative node 
  quantity: emissions
  unit: t_co2e/a
  input_dimensions: [scope, subsector, ghg, building_type, building_status, energy_provider]
  output_dimensions: [scope, subsector, ghg, building_type, building_status]
  params: 
    formula: electricity_from_pge*pge_electricity_emfac + electricity_from_vce*vce_electricity_emfac + gas_from_pge*pge_gas_emfac
  input_nodes:
  - id: building_electricity_use
    filters: 
    - dimension: energy_provider
      categories: [PG&E]
    tags: [electricity_from_pge]
  - id: building_electricity_use
    filters: 
    - dimension: energy_provider
      categories: [VCE]
    tags: [electricity_from_vce]
  - id: building_natural_gas_use
    filters: 
    - dimension: energy_provider
      categories: [PG&E]
    tags: [gas_from_pge]
  - id: electricity_emission_factor
    filters:
    - dimension: energy_provider
      categories: [PG&E]
    tags: [pge_electricity_emfac]
  - id: electricity_emission_factor
    filters:
    - dimension: energy_provider
      categories: [VCE]
    tags: [vce_electricity_emfac] 
  - id: natural_gas_emission_factor
    filters:
    - dimension: energy_provider
      categories: [PG&E]
    tags: [pge_gas_emfac]
  output_nodes:
  - id: net_emissions
    to_dimensions: [scope]

    # -- on-road transportation

- id: vehicle_miles_travelled
  label: Vehicle Miles Travelled
  type: simple.AdditiveNode
  quantity: mileage
  unit: miles/day
  input_dimensions: [travel_boundary, speed_bin, vehicle_type]
  output_dimensions: [travel_boundary, speed_bin, vehicle_type]
  input_datasets:
  - id: yolo/transportation-input
    forecast_from: 2023
    filters: 
    - column: quantity
      value: mileage
  input_dataset_processors: [LinearInterpolation]

- id: days_per_year
  name: Days per Year
  type: simple.AdditiveNode
  quantity: factor
  unit: day/a
  input_dimensions: []
  output_dimensions: []
  input_datasets:
  - id: yolo/transportation-input
    forecast_from: 2023
    filters:
    - column: quantity
      value: factor
  input_dataset_processors: [LinearInterpolation]

- id: transportation_emission_factors
  label: Transportation Emission Factors
  type: simple.AdditiveNode
  quantity: emission_factor
  unit: t_co2e/mile
  input_dimensions: [scope, travel_boundary, speed_bin, vehicle_type]
  output_dimensions: [scope, travel_boundary, speed_bin, vehicle_type]
  input_datasets:
  - id: yolo/transportation-input
    filters: 
    - column: quantity
      value: emission_factor
    - column: ev_type
      value: ""
    forecast_from: 2023
  input_dataset_processors: [LinearInterpolation]

- id: ev_vmt
  name: Electric Vehicle Miles Travelled
  type: formula.FormulaNode
  quantity: mileage
  unit: miles/a
  input_dimensions: [travel_boundary, speed_bin, vehicle_type]
  output_dimensions: [travel_boundary, speed_bin, vehicle_type]
  params:
    formula: total_vmt*ev_fraction*days_per_year
  input_nodes: 
  - id: vehicle_miles_travelled
    tags: [total_vmt]
  - id: dt3
    tags: [ev_fraction]
  - id: days_per_year
    tags: [days_per_year]

- id: ice_vmt
  name: ICE Vehicle Miles Travelled
  type: formula.FormulaNode
  quantity: mileage
  unit: miles/a
  input_dimensions: [travel_boundary, speed_bin, vehicle_type]
  output_dimensions: [travel_boundary, speed_bin, vehicle_type]
  params:
    formula: total_vmt * (1 - ev_fraction)*days_per_year
  input_nodes:
  - id: vehicle_miles_travelled
    tags: [total_vmt]
  - id: dt3
    tags: [ev_fraction]
  - id: days_per_year
    tags: [days_per_year]

