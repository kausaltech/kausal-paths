  input_dimensions: [scope, subsector,ghg, energy_provider, energy_carrier, water_source]
  output_dimensions: [scope, ghg, water_source]
  params: 
    formula: groundwater_use*pumping_energy_intensity*pump_electricity_emission_factor
  input_nodes:
  - id: water_use
    tags: [groundwater_use]
    from_dimensions: 
    - id: water_source
  - id: groundwater_pumping_energy_intensity
    tags: [pumping_energy_intensity]
  - id: electricity_emission_factor
