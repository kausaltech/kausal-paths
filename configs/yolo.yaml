  type: simple.MultiplicativeNode
  quantity: emissions
  unit: t_co2e/a
  input_dimensions: [scope, travel_boundary, speed_bin, vehicle_type, ev_type]
  output_dimensions: [scope, travel_boundary, vehicle_type]
  input_nodes:
  - id: ev_vmt_by_type
  - id: ev_emission_factors

- id: ice_transportation_emissions
  label: ICE Transportation Emissions
  type: formula.FormulaNode
