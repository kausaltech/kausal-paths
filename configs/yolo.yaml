id: yolo
default_language: en
supported_languages: []
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 2189e4c3ebd6f7a790c950b717890b2b4b931a7e
  dvc_remote: kausal-s3
name: Yolo County Greenhouse Gas Emissions
owner: Yolo County
theme_identifier: us-yolo
target_year: 2030
model_end_year: 2045
reference_year: 2022
minimum_historical_year: 2022
maximum_historical_year: 2022
emission_unit: t_co2e/a
emission_forecast_from: 2023
emission_dimensions: [subsector, scope]
features:
  baseline_visible_in_graphs: true

action_groups:
- id: onroad_transportation
  name: Decarbonize Transportation
  color: '#E15759'
- id: buildings
  name: Decarbonize Energy and Buildings and Increase Energy Efficiency
  color: '#4E79A7'
- id: water
  name: Optimize Water Use
  color: '#76B7B2'
# - id: waste_act
#   name: Minimize Waste
#   color: '#897C24'
- id: offroad_equipment
  name: Reduce Off-Road Equipment Emissions
  color: '#F28E2B'
- id: sequestration
  name: Sequester and Store Carbon in Natural and Working Lands
  color: '#A0CBE8'
- id: abau
  name: Federal- and State-Mandated Emissions Reduction Measures
  color: '#BAB0AC'

dimensions:
- id: demographic_group
  label: Demographic Group
  categories:
  - id: households
    label: Households
  - id: students
    label: Students
  - id: employees
    label: Employees

- id: demographic_quantity
  label: Demographic Quantity
  categories:
  - id: total
    label: Total
  - id: change_from_2022
    label: Change from 2022

- id: subsector
  label: Subsector
  categories:
  #----- Buildings
  - id: residential
    label: Residential
  - id: commercial
    label: Commercial
  - id: agricultural
    label: Agricultural
  - id: industrial
    label: Industrial

  # ----- On-Road Transportation
  - id: onroad_transportation
    label: On-Road Transportation

  # ----- Off-road Equipment
  - id: agricultural_equipment
    label: Agricultural Equipment
  - id: trus
    label: TRUs
  - id: construction_equipment
    label: Construction Equipment
  - id: industrial_equipment
    label: Industrial Equipment
  - id: lawn_garden_equipment
    label: Lawn & Garden Equipment
  - id: light_commercial_equipment
    label: Light Commercial Equipment
  - id: pleasure_craft
    label: Pleasure Craft
  - id: recreational_equipment
    label: Recreational Equipment
  - id: portable_equipment
    label: Portable Equipment

  # ----- Solid Waste
  - id: waste_in_place
    label: Waste In-Place
  - id: waste_generation
    label: Waste Generation

  # ----- Water
  - id: groundwater_pumping
    label: Groundwater Pumping for Community Use

  # ----- Wastewater
  - id: wastewater_treatment
    label: Wastewater Treatment

  # ----- Agriculture
  - id: irrigation_pumps
    label: Agricultural Irrigation Pumps
  - id: residue_burning
    label: Residue Burning
  - id: livestock
    label: Livestock
  - id: rice_cultivation
    label: Rice Cultivation
  - id: nitrogen_application
    label: Nitrogen Application
  - id: urea_application
    label: Urea Application
  - id: lime_application
    label: Lime Application

  # ----- Sequestration
  - id: sequestration
    label: Sequestration

- id: scope
  label: Scope
  categories:
  - id: scope1
    label: Scope 1
  - id: scope2
    label: Scope 2
  - id: scope3
    label: Scope 3
  - id: negative
    label: Negative Emissions

- id: ghg
  label: Greenhouse Gas
  categories:
  - id: ch4
    label: CH4
  - id: co2
    label: CO2
  - id: n2o
    label: N2O

- id: factor_type
  label: Factor Type
  categories:
  - id: ac
    label: AC Factor
  - id: cool_roof
    label: Cool Roof Factor

- id: energy_provider
  label: Energy Provider
  categories:
  - id: pge
    label: PG&E
  - id: vce
    label: VCE

- id: energy_carrier
  label: Energy Carrier
  categories:
  - id: diesel
    label: Diesel
  - id: electricity
    label: Electricity
  - id: natural_gas
    label: Natural Gas
  - id: propane
    label: Propane

- id: building_type
  label: Building Type
  categories:
  - id: single_family
    label: Single-Family
  - id: multi_family
    label: Multi-Family
  - id: non_residential
    label: Non-Residential

- id: building_status
  label: Building Status
  categories:
  - id: new
    label: New
  - id: existing
    label: Existing

# ----- On-Road Transportation
- id: travel_boundary
  label: Travel Boundary
  categories:
  - id: within_sacog
    label: Within SACOG
  - id: outside_sacog
    label: Outside SACOG

- id: vehicle_type
  label: Vehicle Type
  categories:
  - id: personal_vehicle
    label: Personal Vehicle
  - id: commercial_small_vehicle
    label: Commercial Small Vehicle
  - id: commercial_large_vehicle
    label: Commercial Large Vehicle

- id: speed_bin
  label: Speed Bin
  categories:
  - id: '0_5'
    label: 0-5 MPH
  - id: '5_10'
    label: 5-10 MPH
  - id: '10_15'
    label: 10-15 MPH
  - id: '15_20'
    label: 15-20 MPH
  - id: '20_25'
    label: 20-25 MPH
  - id: '25_30'
    label: 25-30 MPH
  - id: '30_35'
    label: 30-35 MPH
  - id: '35_40'
    label: 35-40 MPH
  - id: '40_45'
    label: 40-45 MPH
  - id: '45_50'
    label: 45-50 MPH
  - id: '50_55'
    label: 50-55 MPH
  - id: '55_60'
    label: 55-60 MPH
  - id: '60_65'
    label: 60-65 MPH
  - id: '65_70'
    label: 65-70 MPH
  - id: all
    label: All

- id: ev_type
  label: EV Type
  categories:
  - id: bev
    label: Battery Electric Vehicle
  - id: phev
    label: Plug-in Hybrid Electric Vehicle

# ----- Water
- id: water_source
  label: Water Source
  categories:
  - id: north_davis_meadows
    label: North Davis Meadows
  - id: wild_wings_csd
    label: Wild Wings CSD

# ----- Agriculture
- id: crop
  label: Crop
  categories:
  - id: corn
    label: Corn
  - id: rice
    label: Rice
  - id: almond
    label: Almond
  - id: walnut
    label: Walnut
  - id: wheat
    label: Wheat
  - id: barley
    label: Barley

- id: livestock
  label: Livestock
  categories:
  - id: cattle
    label: Cattle
  - id: lambs
    label: Lambs

- id: emission_source
  label: Emission Source
  categories:
  - id: enteric_fermentation
    label: Enteric Fermentation
  - id: manure_management
    label: Manure Management

# ----- Wastewater
- id: influent_source
  label: Influent Source
  categories:
  - id: wild_wings_csd_wastewater_recycling_facility
    label: Wild Wings CSD Wastewater Recycling Facility
  - id: madison_wwtf
    label: Madison WWTF
  - id: knights_landing_csd_wwtp
    label: Knights Landing CSD WWTP
  - id: esparto_csd_wwtp
    label: Esparto CSD WWTP
  - id: city_of_davis_wwtp_unincorporated_population
    label: City of Davis WWTP (Unincorporated Population)
  - id: dunnigan_wwtf
    label: Dunnigan WWTF

- id: action
  label: Action
  categories:
  - id: dt3
    label: Encourage Transition to EVs
  - id: eb1b
    label: Incentivize Cool & Green Roofs
  - id: eb1d
    label: Energy Efficiency Retrofits in Existing Buildings
  - id: eb2b
    label: Incentivize Electrification in Existing Buildings
  - id: eb2c
    label: Require Zero-Emission Equipment in New Buildings
  - id: eb3d
    label: Install PV Systems on New Development
  - id: eb3e
    label: Facilitate Adoption of Enhanced PV Requirements
  - id: eb4d
    label: Encourage Enrollment in VCE "UltraGreen" Program
  - id: w2
    label: Encourage Efficient Water Use in Agriculture
  - id: w4
    label: Conserve Water in Unincorporated Areas
  - id: sw1
    label: Waste Diversion
  - id: sw3
    label: Landfill Gas Capture Improvements
  - id: ofr1
    label: Decarbonize Off-Road & Landscaping Equipment
  - id: ofr2
    label: Decarbonize Agricultural Equipment
  - id: nwl1
    label: Encourage Climate Smart Practices on Working Lands
  - id: nwl2
    label: Restore Natural Lands

emission_sectors:
- id: net_emissions
  name: Net Emissions
  is_outcome: true

- id: negative_emissions
  name: Negative Emissions
  color: '#A0CBE8'
  part_of: net_emissions

nodes:
# ----- Global Warming Potential
- id: global_warming_potential
  name: Global Warming Potential
  type: simple.AdditiveNode
  quantity: factor
  unit: t_co2e/t
  input_dimensions: [ghg]
  output_dimensions: [ghg]
  input_datasets:
  - id: yolo/global_warming_potential
    column: factor
    forecast_from: 2023
  input_dataset_processors: [LinearInterpolation]

# ----- Energy Emission Factors
- id: electricity_emission_factors
  name: Electricity Emission Factors
  type: simple.AdditiveNode
  quantity: emission_factor
  unit: lbs/MWh
  input_dimensions: [energy_provider, ghg, scope, energy_carrier]
  output_dimensions: [energy_provider, ghg, scope, energy_carrier]
  input_datasets:
  - id: yolo/energy_emission_factors
    column: emission_factor
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [electricity]
  input_dataset_processors: [LinearInterpolation]

- id: natural_gas_emission_factors
  name: Natural Gas Emission Factors
  type: simple.AdditiveNode
  quantity: emission_factor
  unit: lbs/MWh
  input_dimensions: [energy_provider, ghg, scope, energy_carrier]
  output_dimensions: [energy_provider, ghg, scope, energy_carrier]
  input_datasets:
  - id: yolo/energy_emission_factors
    column: emission_factor
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
  input_dataset_processors: [LinearInterpolation]

# ----- Buildings

# ---------- Baseline Electricity Use & Mixes
- id: baseline_existing_building_electricity_usage
  name: Baseline Electricity Usage (Existing Buildings)
  type: simple.AdditiveNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  input_datasets:
  - id: yolo/buildings
    column: energy
    forecast_from: 2023
    filters:
    - dimension: building_status
      categories: [existing]
  input_dataset_processors: [LinearInterpolation]

- id: baseline_new_building_electricity_usage
  name: Baseline Electricity Usage (New Buildings)
  type: simple.AdditiveNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  input_datasets:
  - id: yolo/buildings
    column: energy
    min_year: 2023
    forecast_from: 2023
    filters:
    - dimension: building_status
      categories: [new]
  input_dataset_processors: [LinearInterpolation]

- id: baseline_existing_commercial_electricity_mix
  name: Baseline Electricity Mix (Existing Commercial Buildings)
  type: simple.MixNode
  quantity: mix
  unit: '%'
  input_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  output_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  input_nodes:
  - id: baseline_existing_building_electricity_usage
    tags: [activity]
    from_dimensions:
    - id: subsector
      categories: [commercial]

- id: baseline_new_residential_electricity_mix
  name: Baseline Electricity Mix (New Residential Buildings)
  type: simple.MixNode
  quantity: mix
  unit: '%'
  input_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  output_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  input_nodes:
  - id: baseline_new_building_electricity_usage
    tags: [activity]
    from_dimensions:
    - id: subsector
      categories: [residential]

- id: baseline_new_commercial_electricity_mix
  name: Baseline Electricity Mix (New Commercial Buildings)
  type: simple.MixNode
  quantity: mix
  unit: '%'
  input_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  output_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  input_nodes:
  - id: baseline_new_building_electricity_usage
    tags: [activity]
    from_dimensions:
    - id: subsector
      categories: [commercial]

# ---------- End Electricity & Natural Gas

- id: building_electricity_usage
  name: Building Electricity Usage
  type: simple.AdditiveNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  input_nodes:
  - id: baseline_existing_building_electricity_usage
  - id: baseline_new_building_electricity_usage
  - id: eb1b_electricity_reduction_cool_green_roofs
  - id: eb3d_electricity_reduction_new_residential_buildings
  - id: eb3d_electricity_reduction_new_commercial_buildings

- id: building_natural_gas_usage
  name: Building Natural Gas Usage
  type: simple.AdditiveNode
  quantity: fuel_consumption
  unit: therms/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  input_datasets:
  - id: yolo/buildings
    column: fuel_consumption
    forecast_from: 2023
    filters:
    - dimension: energy_carrier
      categories: [natural_gas]
  input_dataset_processors: [LinearInterpolation]

# ---------- EB1B
- id: building_air_conditioning_electricity_use_percentage
  name: Building Air Conditioning Electricity Use Percentage
  type: simple.AdditiveNode
  quantity: fraction
  unit: '%'
  input_dimensions: [subsector]
  output_dimensions: [subsector]
  input_datasets:
  - id: yolo/actions
    column: fraction
    forecast_from: 2023
    filters:
    - column: action
      value: eb1b
    - column: factor_type
      value: ac
    - column: building_status
  input_dataset_processors: [LinearInterpolation]

- id: eb1b_electricity_reduction_cool_green_roofs
  name: 'EB1B Electricity Reduction: Cool and Green Roofs'
  type: formula.FormulaNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  params:
    formula: electricity_usage * ac_percentage * cool_roof_factor * eb1b
  input_datasets:
  - id: yolo/actions
    tags: [cool_roof_factor]
    column: factor
    forecast_from: 2023
    filters:
    - column: action
      value: eb1b
    - column: factor_type
      value: cool_roof
  input_dataset_processors: [LinearInterpolation]
  input_nodes:
  - id: baseline_new_building_electricity_usage
    tags: [electricity_usage]
  - id: building_air_conditioning_electricity_use_percentage
    tags: [ac_percentage]
    to_dimensions:
    - id: subsector

# ---------- EB1D
- id: eb1d_csi_electricity_usage_reduction
  name: EB1D CSI Electricity Usage Reduction
  type: formula.FormulaNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  params:
    formula: -5883.5 * (reduction_percentage / 100) * 663.5 * mix
  input_nodes:
  - id: baseline_existing_commercial_electricity_mix
    tags: [mix]

- id: eb1d_pace_electricity_usage_reduction
  name: EB1D PACE Electricity Usage Reduction
  type: formula.FormulaNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  output_dimensions: [subsector, building_type, building_status, energy_provider, energy_carrier]
  params:
    formula: -1.02 * reduction_percentage * 663.5 * mix
  input_nodes:
  - id: baseline_existing_commercial_electricity_mix
    tags: [mix]

