# ---------- EB3D

# --------------- Residential
- id: new_households
  name: Number of New Households from 2022
  type: simple.AdditiveNode
  quantity: number
  unit: count
  input_dimensions: []
  output_dimensions: []
  input_datasets:
  - id: yolo/households_and_employees
    column: number
    forecast_from: 2023
    filters:
    - column: demographic_group
      value: households
    - column: demographic_quantity
      value: change_from_2022
  input_dataset_processors: [LinearInterpolation]

- id: pv_electricity_production_per_household
  name: PV Electricity Production per Household
  type: simple.AdditiveNode
  quantity: factor
  unit: kWh/count/a
  input_dimensions: []
  output_dimensions: []
  input_datasets:
  - id: yolo/households_and_employees
    column: factor_energy_per_household
    forecast_from: 2023
    filters:
    - column: demographic_group
    - column: demographic_quantity
  input_dataset_processors: [LinearInterpolation]

- id: eb3d_electricity_reduction_new_residential_buildings
  name: 'EB3D Electricity Reduction: PV on New Residential Buildings'
  type: simple.MultiplicativeNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  output_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
  input_nodes:
  - id: new_households
    to_dimensions: []
  - id: pv_electricity_production_per_household
    tags: [non_additive]
    to_dimensions: []
  - id: baseline_new_residential_electricity_mix

# --------------- Commercial
- id: new_employees
  name: Number of New Employees from 2022
  type: simple.AdditiveNode
  quantity: population
  unit: cap
  input_dimensions: []
  output_dimensions: []
  input_datasets:
  - id: yolo/households_and_employees
    column: population
    forecast_from: 2023
    filters:
    - column: demographic_group
      value: employees
    - column: demographic_quantity
      value: change_from_2022
  input_dataset_processors: [LinearInterpolation]

- id: new_commercial_square_footage
  name: New Commercial Square Footage from 2022
  type: formula.FormulaNode
  quantity: floor_area
  unit: ft**2
  input_dimensions: []
  output_dimensions: []
  params:
    formula: new_employees * area_per_employee
  input_datasets:
  - id: yolo/households_and_employees
    column: factor_area_per_employee
    forecast_from: 2023
    tags: [area_per_employee]
    filters:
    - column: demographic_group
    - column: demographic_quantity
  input_dataset_processors: [LinearInterpolation]
  input_nodes:
  - id: new_employees

- id: pv_electricity_production_per_commercial_square_foot
  name: PV Electricity Production per Commercial Square Foot
  type: simple.AdditiveNode
  quantity: factor
  unit: kWh/ft**2/a
  input_dimensions: []
  output_dimensions: []
  input_datasets:
  - id: yolo/households_and_employees
    column: factor_energy_per_area
    forecast_from: 2023
    filters:
    - column: demographic_group
    - column: demographic_quantity
  input_dataset_processors: [LinearInterpolation]

- id: eb3d_electricity_reduction_new_commercial_buildings
  name: 'EB3D Electricity Reduction: PV on New Commercial Buildings'
  type: simple.MultiplicativeNode
  quantity: energy
  unit: kWh/a
  input_dimensions: [energy_provider, subsector, building_type, building_status, energy_carrier]
