actions:

# ---- adjusted business as usual actions/trends

- id: abau_trend_electricity
  name: Federal- and State-mandated electricity emissions reduction
  type: GpcTrajectoryAction
  group: abau
  unit: lbs/MWh
  parameters:
    enabled: false
    multiplier: 1.0
    dataset_id: "yolo/energy-emission-factors"
    dimension: "scenario_id"
    category: "adjusted_baseline"
  input_dataset_processors: [LinearInterpolation]

- id: abau_trend_transportation
  name: Federal- and State-mandated transportation emission reduction
  type: GpcTrajectoryAction
  group: abau
  unit: t_co2e/mile
  parameters: 
    enabled: false
    multiplier: 1.0
    dataset_id: "yolo/transportation-input"
    dimension: "scenario_id"
    category: "adjusted_baseline"
  input_dataset_processors: [LinearInterpolation]

- id: abau_trend_building_electricity
  name: Federal- and State-mandated building electricity use reduction
  type: GpcTrajectoryAction
  group: abau
  unit: kWh/year
  parameters: 
    enabled: false
    multiplier: 1.0
    dataset_id: "yolo/building-input"
    dimension: "scenario_id"
    category: "adjusted_baseline"
  input_dataset_processors: [LinearInterpolation]

- id: abau_trend_building_natural_gas
  name: Federal- and State-mandated building natural gas use reduction
  type: GpcTrajectoryAction
  group: abau
  unit: therms/year
  parameters: 
    enabled: false
    multiplier: 1.0
    dataset_id: "yolo/building-input"
    dimension: "scenario_id"
    category: "adjusted_baseline"
  input_dataset_processors: [LinearInterpolation]

