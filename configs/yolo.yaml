  name: BEV/PHEV VMT Split
  type: simple.AdditiveNode
  quantity: fraction
  unit: '%'
  input_dimensions: [ev_type]
  output_dimensions: [ev_type]
  input_datasets:
  - id: yolo/actions-input
    forecast_from: 2023
    filters:
    - column: action
      value: dt3_ev_split
  input_dataset_processors: [LinearInterpolation]

- id: ev_vmt_by_type
  name: EV VMT by Type
  type: simple.MultiplicativeNode
  quantity: mileage
  unit: miles/a
  input_dimensions: [travel_boundary, speed_bin, vehicle_type, ev_type]
  output_dimensions: [travel_boundary, speed_bin, vehicle_type, ev_type]
  input_nodes:
