id: augsburg-bisko  # defines which instance is updated
default_language: de
supported_languages: [en]
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: a8e9584d8a313025877793f4ceabac8fcf865ace
  dvc_remote: kausal-s3
name_de: CO₂-Zukunfts-Rechner
name_en: CO₂-Future Calculator
owner: Stadt Augsburg
theme_identifier: de-augsburg
target_year: 2050
model_end_year: 2050
reference_year: 1996
minimum_historical_year: 1996
maximum_historical_year: 2023
emission_unit: kt_co2e/a
features:
  baseline_visible_in_graphs: true
  use_datasets_from_db: true
  show_explanations: true
  show_category_warnings: true

include:
- file: modules/bisko/model.yaml
  allow_override: true
  dataset_replacements:
  - from: bisko/final_energy
    to: augsburg/final_energy
  - from: bisko/historical_emissions
    to: augsburg/historical_emissions
  - from: bisko/passenger_kilometers
    to: augsburg/passenger_kilometers
  - from: bisko/vehicle_energy
    to: augsburg/vehicle_energy


# Augsburg Custom Color Palette
_palette:
  BlueCity_DarkBlue:    &darkblue     '#203abf'
  BlueCity_Blue:        &blue         '#46bee0'
  BlueCity_Lilac:       &lilac        '#838ac3'
  BlueCity_Green:       &green        '#04a64a'
  BlueCity_Lime:        &lime         '#b9c400'
  BlueCity_Grey:        &grey         '#bfcfd8'
  BlueCity_Black:       &black        '#000000'

  gradient_grey1:       &g_grey1      '#303436'
  gradient_grey2:       &g_grey2      '#60686c'
  gradient_grey3:       &g_grey3      '#8f9ba2'
  gradient_darkblue2:   &g_darkblue2  '#337cd0'
  gradient_blue2:       &g_blue2      '#65a4d2'
  gradient_lilac2:      &g_lilac2     '#449887'
  gradient_green2:      &g_green2     '#5fb525'
  gradient_lime2:       &g_lime2      '#bcca6c'
  
# Order of sectors in public page:
# Private Household (emissions)
# Commerce, Trade & Services (emissions)
# Industry
# Transportation
# Kommunal Facilities


#//////  Parameters  ////////////////////////////////////////////////////////////////////////////////////////////////////
params:

- id: weather_correction
  label_de: Wetterkorrektur durchführen?
  label_en: Perform weather correction?
  value: false
  is_customizable: true
  is_visible: true
- id: municipality_name
  label_en: Municipality name
  label_de: Gemeindename
  value: Augsburg
  is_customizable: true
  is_visible: true
- id: ags_number
  label_en: AGS number
  label_de: AGS-Nummer
  value: '09761000'
  is_customizable: false
  is_visible: false
- id: use_national_values
  label_en: Use national rather than local electricity emission factors (BISKO)
  label_de: Verwenden Sie nationale statt lokaler Stromemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true
- id: use_mileage
  label_en: Use BISKO mileage statistics rather than own energy data for 
    transport
  label_de: Nutzen Sie die BISKO-Transportstatistiken anstatt der eigenen 
    Energieverbrauchsdaten für den Transport.
  value: true
  is_visible: true
  is_customizable: true
- id: use_local_values # FIXME Make connection to district heating emission factors dataset.
  label_en: Use local rather than national district heating emission factors 
    (BISKO)
  label_de: Verwenden Sie lokale statt nationale Fernwärmeemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true


