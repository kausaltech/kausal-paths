#//////  Result Excels  ///////////////////////////////////////////////////////////////////////////////////////////////////
result_excels:
- base_excel_url: 
    https://docs.google.com/spreadsheets/d/13URk1zrbyu5Dyjw-w7tIiaAlrERNul-L/export?format=xlsx
  name_de: Stadtspezifische Werte aus BISKO-Datensätzen und anderen Quellen
  name_en: City-specific values from BISKO datasets and elsewhere
  node_ids:
  - weather_correction
  - final_energy_use
  - final_energy_use_data_quality
  # - final_municipal_facilities_energy_use_by_type
  # - municipal_fleet_energy
  - historical_emissions
  - end_energy_emission_factors
  - electricity_production_emission_factors
  - emission_factors_without_fuel_data
  - emission_factors_for_district_heating_by_generic_fuel
  - vehicle_kilometers_ifeu
  - other_transport_energy

action_groups:

- id: combined_heat_and_power
  name_en: Combined heat and power
  name_de: Kombination aus Wärme und Strom
  color: '#007C78'


#//////  Nodes  ///////////////////////////////////////////////////////////////////////////////////////////////////
# copied from bisko --> model.yaml  for changing colors
# in order how they appear on homepage

nodes:
- id: private_household_emissions
  name_de: Private Haushalte
  name_en: Private household emissions
  color: *darkblue
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: stationary_emissions
    from_dimensions:
    - id: sector
      categories: [private_households]
  output_nodes:
  - id: net_emissions


- id: commerce_trade_services_emissions
  name_de: Gewerbe, Handel, Dienstleistungen
  name_en: Commerce, trade, services emissions
  color: *blue
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: stationary_emissions
    from_dimensions:
    - id: sector
      categories: [commerce_trade_services]
  output_nodes:
  - id: net_emissions


- id: industry_emissions
  name_de: Industrie
  name_en: Industry emissions
  color: *grey
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: stationary_emissions
    from_dimensions:
    - id: sector
      categories: [industry]
  output_nodes:
  - id: net_emissions


- id: transport_emissions
  name_en: Transport emissions
  name_de: Transportemissionen
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  color: *lilac
  input_dimensions: [vehicle_type, energy_carrier]
  output_dimensions: [vehicle_type, energy_carrier]
  input_nodes:
  - id: transport_energy
    to_dimensions:
    - id: vehicle_type
    - id: energy_carrier
  - id: transport_emission_factors
    to_dimensions:
    - id: energy_carrier
  output_nodes:
  - id: net_emissions
    from_dimensions:
    - id: vehicle_type
      flatten: true
    to_dimensions:
    - id: energy_carrier
    - id: sector
      categories: [transport]


- id: municipal_facilities_emissions
  name_de: Kommunale Einrichtungen
  name_en: Municipal facilities emissions
  color: *lime
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: stationary_emissions
    from_dimensions:
    - id: sector
      categories: [municipal_facilities]
  output_nodes:
  - id: net_emissions


#//////  Actions  ///////////////////////////////////////////////////////////////////////////////////////////////////

#actions:
#- id: 


#//////  Pages  ///////////////////////////////////////////////////////////////////////////////////////////////////

pages:
- id: home
  name_de: Treibhausgasbilanz
  name_en: Greenhouse Gas Inventory
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Treibhausgasbilanz Stadt Augsburg
  lead_paragraph: Unsere Emissionen nach Sektoren und Jahren


#//////  Scenarios  ///////////////////////////////////////////////////////////////////////////////////////////////////


scenarios:

- id: baseline
  name_de: Business as Usual
  name_en: Business as Usual

- id: default
  default: true
  all_actions_enabled: true
  name_de: Klimaschutzprogramm
  name_en: Climate Protection Program
