#//////  Parameters  ////////////////////////////////////////////////////////////////////////////////////////////////////
params:

- id: weather_correction
  label_de: Wetterkorrektur durchführen?
  label_en: Perform weather correction?
  value: false
  is_customizable: true
  is_visible: true
- id: municipality_name
  label_en: Municipality name
  label_de: Gemeindename
  value: Bayreuth
  is_customizable: true
  is_visible: true
- id: ags_number
  label_en: AGS number
  label_de: AGS-Nummer
  value: '09462000'
  is_customizable: false
  is_visible: false
- id: use_national_values
  label_en: Use national rather than local electricity emission factors (BISKO)
  label_de: Verwenden Sie nationale statt lokaler Stromemissionsfaktoren 
    (BISKO).
  value: false
  is_visible: true
  is_customizable: true
- id: use_mileage
  label_en: Use BISKO mileage statistics rather than own energy data for 
    transport
  label_de: Nutzen Sie die BISKO-Transportstatistiken anstatt der eigenen 
    Energieverbrauchsdaten für den Transport.
  value: false
  is_visible: true
  is_customizable: true
- id: use_local_values # FIXME Make connection to district heating emission factors dataset.
  label_en: Use local rather than national district heating emission factors 
    (BISKO)
  label_de: Verwenden Sie lokale statt nationale Fernwärmeemissionsfaktoren 
    (BISKO).
  value: false
  is_visible: true
  is_customizable: true

#//////  Result Excels  ///////////////////////////////////////////////////////////////////////////////////////////////////
result_excels:
- base_excel_url: 
    https://docs.google.com/spreadsheets/d/13URk1zrbyu5Dyjw-w7tIiaAlrERNul-L/export?format=xlsx
  name_de: Stadtspezifische Werte aus BISKO-Datensätzen und anderen Quellen
  name_en: City-specific values from BISKO datasets and elsewhere
  node_ids:
  - weather_correction
  - final_energy_use
  - final_energy_use_data_quality
  # - final_municipal_facilities_energy_use_by_type
  # - municipal_fleet_energy
  - historical_emissions
  - end_energy_emission_factors
  - electricity_production_emission_factors
  - emission_factors_without_fuel_data
  - emission_factors_for_district_heating_by_generic_fuel
  - vehicle_kilometers_ifeu
  - other_transport_energy



#//////  Nodes  ///////////////////////////////////////////////////////////////////////////////////////////////////

nodes:

- id: net_emissions    # Node copied here to enable goals.
  name_de: Netto-Emissionen
  name_en: Net emissions
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  is_outcome: true
  goals: 
  - label_de: Ursprünglicher Zielpfad 2022
    label_en: Original path 2
    default: true
    is_main_goal: true   # should be here to enbale dashboard page
    linear_interpolation: true
    values:
    - year: 2019
      value: 696.41147
    - year: 2021
      value: 664.732782
    - year: 2040
      value: 0

- id: sector_index   # Translates BISKO categories to Wärme/Strom/Verkehr sectors. TRUE for any allowed combi of sector and energy carrier
  name_de: Sektor Index
  name_en: Sector index
  type: generic.GenericNode
  quantity: ratio
  unit: dimensionless
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: bisko/sector_index
    forecast_from: 2025
    tags: [extend_all]

- id: final_energy_use
  name_de: Endenergie
  name_en: Final energy use
  type: generic.GenericNode
  quantity: energy
  unit: MWh/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_datasets:
  - id: bayreuth/final_energy
    tags: [non_additive]
    column: Value
    filters:
    - column: energy_carrier
      value: not_defined
      exclude: true
      drop_col: false
    - dimension: sector
      flatten: true
  input_nodes:
  - id: sector_index
  - id: weather_correction

- id: sinks
  name_de: Senken
  name_en: Sinks
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector]
  output_dimensions: [sector]
  color: *viridis_green
  input_datasets:
  - id: bayreuth/sinks
  output_nodes:
  - id: net_emissions
    to_dimensions:
    - id: sector
    - id: energy_carrier
      categories: [not_defined]

- id: bau_emission_reduction
  name: BAU emission reduction
  type: generic.GenericNode
  quantity: fraction
  unit: dimensionless
  input_datasets:
  - id: bayreuth/emission_reduction_action
    column: baseline
  output_nodes:
  - id: stationary_emissions

- id: heating_emissions
  name_de: Wärme Emissionen
  name_en: Heating Emissions
  type: formula.FormulaNode
  quantity: emissions
  unit: kt_co2e/a
  color: *viridis_yellow
  input_dimensions: [energy_carrier, sector]  # switched around dimensions, because in Outcome page it shows the first listed dimension when "drilling down" 
  output_dimensions: [energy_carrier, sector]
  input_nodes:
  - id: stationary_emissions
    tags: [emissions]
    from_dimensions:
    - id: sector
      categories: [heating]
  output_nodes:
  - id: net_emissions
  params:
    formula: sum_into_cat(emissions, energy_carrier, [district_heating, 
      local_heating], district_and_local_heating)
  goals:
  - label_de: Ursprünglicher Zielpfad 2022
    label_en: Original path 2
    default: true
    linear_interpolation: true
    values:
    - year: 2019
      value: 327.3133909
    - year: 2021
      value: 329.3667852
    - year: 2030
      value: 198.8110272
    - year: 2040
      value: 0

- id: electricity_emissions
  name_de: Strom Emissionen
  name_en: Electricity Emissions
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  color: *viridis_darkblue
  input_dimensions: [energy_carrier, sector]
  output_dimensions: [energy_carrier, sector]
  input_nodes:
  - id: stationary_emissions
    from_dimensions:
    - id: sector
      categories: [electricity]
  output_nodes:
  - id: net_emissions
  goals:
  - label_de: Ursprünglicher Zielpfad 2022
    label_en: Original path 2
    default: true
    linear_interpolation: true
    values:
    - year: 2019
      value: 215.8875557
    - year: 2021
      value: 186.7211469
    - year: 2030
      value: 59.47332172
    - year: 2039
      value: 0

- id: transport_emissions
  name_en: Transport emissions
  name_de: Transportemissionen
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  color: *viridis_teal
  input_dimensions: [vehicle_type, energy_carrier]
  output_dimensions: [vehicle_type, energy_carrier]
  input_nodes:
  - id: transport_energy
    to_dimensions:
    - id: vehicle_type
    - id: energy_carrier
  - id: transport_emission_factors
    to_dimensions:
    - id: energy_carrier
  - id: bau_emission_reduction
  params:
    operations: multiply,split_dims
  output_nodes:
  - id: net_emissions
    from_dimensions:
    - id: vehicle_type
      flatten: true
    to_dimensions:
    - id: energy_carrier
    - id: sector
      categories: [transport]
  goals: # Node copied here to make goals possible.
  - label_de: Ursprünglicher Zielpfad 2022
    label_en: Original path 2
    default: true
    linear_interpolation: true
    values:
    - year: 2019
      value: 153.2105234
    - year: 2021
      value: 148.6448498
    - year: 2030
      value: 91.57501005
    - year: 2038
      value: 0

- id: private_household_emissions
  name_de: Private Haushalte Emissionen
  name_en: Private household emissions
  description: This is just a placeholder to mask a redundant node.
  color: *viridis_yellow
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt_co2e/a
  historical_values: [[2019, 0], [2021, 0]]

- id: municipal_facilities_emissions
  name_de: Kommunale Einrichtungen Emissionen
  name_en: Municipal facilities emissions
  description: This is just a placeholder to mask a redundant node.
  color: *viridis_green
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt_co2e/a
  historical_values: [[2019, 0], [2021, 0]]

- id: industry_emissions
  name_de: Industrie Emissionen
