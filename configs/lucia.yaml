  type: generic.GenericNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [stakeholder, cost_type]
  output_dimensions: [stakeholder, cost_type]
  input_datasets:
  - id: nzc/waste_management
    column: waste recycling
    filters:
    - column: uuid

- id: waste_management_cost_by_stakeholder
  name_en: Waste management cost by stakeholder
  name_fi: Jätehuollon kustannukset sidosryhmittäin
  type: simple.MultiplicativeNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [cost_type, waste_treatment, stakeholder]
  output_dimensions: [cost_type, waste_treatment, stakeholder]
  input_nodes:
  - id: waste_management_cost
    tags: [non_additive]
    from_dimensions:
    - id: waste_type
      flatten: true
    to_dimensions:
    - id: cost_type
    - id: waste_treatment
  - id: waste_management_cost_shares
    to_dimensions:
    - id: stakeholder
    - id: cost_type

- id: waste_air_pollution_cost
  name_en: Waste air pollution cost
  name_fi: Jätteiden ilmansaastekustannukset
  type: simple.MultiplicativeNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type, waste_treatment]
  output_dimensions: [stakeholder, cost_type, waste_treatment]
  input_nodes:
  - id: waste_incineration_air_pollution_emissions
    from_dimensions:
    - id: waste_type
      flatten: true
    - id: energy_carrier
      flatten: true
    - id: pollutant
      flatten: true
    to_dimensions:
    - id: waste_treatment
  - id: air_pollution_unit_price
    from_dimensions:
    - id: pollutant
      flatten: true
    - id: area_distance
      categories: [outside]
      flatten: true
    to_dimensions:
    - id: cost_type
  - id: co_benefit_cost_shares
    to_dimensions:
    - id: stakeholder
    - id: cost_type

- id: waste_cost
  name_en: Waste cost
  name_fi: Jätekustannukset
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  color: '#ff7f00'
  input_dimensions: [cost_type, stakeholder]
  output_dimensions: [cost_type, stakeholder]
  input_nodes:
  - id: waste_air_pollution_cost
    from_dimensions:
    - id: waste_treatment
      flatten: true
    to_dimensions:
    - id: cost_type
    - id: stakeholder
  - id: waste_management_cost_by_stakeholder
    from_dimensions:
    - id: waste_treatment
      flatten: true
    to_dimensions:
    - id: cost_type
    - id: stakeholder
  output_nodes:
  - id: total_cost
    to_dimensions:
    - id: cost_type
    - id: stakeholder

