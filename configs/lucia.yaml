# NZC MAIN MODEL

nodes:

- id: technical_root_node
  name: Technical root node
  name_fi: Tekninen juurisolmu
  description: This node is used as the outcome node of ParentActionNodes so 
    that they don't pick a random root node from the model.
  type: simple.AdditiveNode
  quantity: fraction
  unit: m**3
  historical_values: [[2018, 0.0], [2025, 0.0]]

- id: net_emissions
  name: Net emissions
  name_fi: Kokonaispäästöt (scope 1+2)
  is_outcome: true
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_dimensions: [scope, ghg, sector]
  output_dimensions: [scope, ghg, sector]

- id: population
  name: Population
  name_fi: Väestön koko Lappeenrannassa
  type: generic.GenericNode
  quantity: population
  unit: cap
  input_datasets:
  - id: nzc/population
    column: population
    filters:
    - column: uuid
  input_nodes:
  - id: population_growth
    tags: [arithmetic_inverse, complement_cumulative_product, non_additive]

- id: population_growth
  name: Population growth
  name_fi: Väestön kasvunopeus
  type: generic.GenericNode
  quantity: rate
  unit: '%/a'
  input_datasets:
  - id: nzc/population
    column: expected_annual_population_growth_up_until_2030
    filters:
    - column: uuid

- id: aggregated_net_emissions
  name: Aggregated net emissions
  name_fi: Kootut nettopäästöt
  type: generic.GenericNode
  quantity: emissions
  unit: kt/a
  # is_outcome: true
  input_nodes:
  - id: net_emissions
    from_dimensions:
    - id: ghg
      flatten: true
    - id: scope
      flatten: true
    - id: sector
      flatten: true

# ------------- Jobs -----------------

- id: total_jobs_created
  name: Total jobs created
  name_fi: Syntyneiden työpaikkojen määrä
  type: generic.GenericNode
  quantity: employment
