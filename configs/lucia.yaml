- id: existing_building_stock
  name_en: Existing building stock
  name_fi: Nykyinen rakennuskanta
  description_en: 'Calculations: The logic is that the floor area per inhabitant stays
    constant. Amount of construction is a fixed fraction of existing building stock
    and the difference between building stock increase and construction is assumed
    to be demolished. So, logically, construction must be greater than or equal to
    population growth.'
  description_fi: 'Laskelmat: Logiikka on, että kerrosala asukasta kohden pysyy vakiona.
    Rakentamisen määrä on kiinteä osuus nykyisestä rakennuskannasta, ja rakennuskannan
    kasvun ja rakentamisen välinen erotus oletetaan purettavaksi. Loogisesti rakentamisen
    on siis oltava suurempi tai yhtä suuri kuin väestönkasvu.'
  type: generic.GenericNode
  quantity: floor_area
  unit: ksqm
  input_dimensions: [building_energy_class]
  output_dimensions: [building_energy_class]
  input_datasets:
  - id: nzc/buildings_stock_renovation
    column: total_floor_area_residental_non_residential
    filters:
    - column: uuid

