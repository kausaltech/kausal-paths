- id: waste
  name_en: 5. Waste
  name_fi: 5. Jätteet
  color: '#50c878'
- id: scope_3
  name_en: 6. Scope 3
  name_fi: 6. Scope 3
- id: reforestation
  name_en: 7. Reforestation
  name_fi: 7. Uudelleenmetsitys

