# TRANSPORT HEALTH COST

- id: air_pollution_unit_price
  name_en: Air pollution unit price
  name_fi: Ilmansaasteiden yksikköhinta
  description_en: Unit prices for air pollutants, noise, accidents, and CO2 come
    from a single source (Essen et al., 2019). Datasets can be created from 1.1 
    Reduce transport need G129:G134 (CO2 and air pollutants), G169:G179 (noise),
    G204:G209 (accidents). The values are constant across time. 
    <h2>References</h2><ul><li>Essen et. al. (2019). Handbook on the external 
    costs of transport. For European Commission Directorate-General for Mobility
    and Transport</li></ul>
  description_fi: Yksikköhinnat ilmansaasteille, melulle, onnettomuuksille ja 
    CO2:lle tulevat yhdestä lähteestä (Essen et al., 2019). Datasetin voi luoda 
    kohdista 1.1 Liikennetarpeen vähentäminen G129:G134 (CO2 ja ilmansaasteet), 
    G169:G179 (melu), G204:G209 (onnettomuudet). Arvot ovat vakioita ajan 
    suhteen. <h2>Lähteet</h2><ul><li>Essen et. al. (2019). Handbook on the 
    external costs of transport. Euroopan komission liikenne- ja 
    liikkuvuusasioiden pääosastolle</li></ul>
  type: generic.GenericNode
  quantity: unit_price
  unit: EUR/t
  input_dimensions: [pollutant, cost_type, area_distance]
