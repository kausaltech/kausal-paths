pages:
- id: home
  name: Community GHG Emissions
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Saskatoon's Community GHG Emissions Inventory
  lead_paragraph: Community greenhouse gas inventory (2014-2023) and forecast (2024-2050) for the City of Saskatoon.

scenarios:
- id: baseline
  name: BAU, Moderate Improvement

- id: action_moderate
  name: Climate Action, Moderate Improvement
  param_values:
    climate_action_moderate_improvement.enabled: true
    bau_decarbonized_grid.enabled: false
    climate_action_decarbonized_grid.enabled: false

- id: bau_decarbonized
  name: BAU, Decarbonized Grid
  param_values:
    climate_action_moderate_improvement.enabled: false
    bau_decarbonized_grid.enabled: true
    climate_action_decarbonized_grid.enabled: false

- id: default
  default: true
  name: Climate Action, Decarbonized Grid
  param_values:
    climate_action_moderate_improvement.enabled: false
    bau_decarbonized_grid.enabled: false
    climate_action_decarbonized_grid.enabled: true
