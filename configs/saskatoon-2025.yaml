id: saskatoon-2025
default_language: en
supported_languages: []
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: d2de5c4c3fcd92a918454ae0898a7f5e2d7f9fe3
  dvc_remote: kausal-s3
name: City of Saskatoon's GHG Emissions Inventories
owner: City of Saskatoon
theme_identifier: ca-saskatoon
target_year: 2050
model_end_year: 2050
reference_year: 2014
minimum_historical_year: 2014
maximum_historical_year: 2023
emission_unit: t_co2e/a
emission_forecast_from: 2024
emission_dimensions: [sector]
features:
  baseline_visible_in_graphs: true
  use_datasets_from_db: true
  show_significant_digits: 10
  maximum_fraction_digits: 0

action_groups:
- id: scenario
  name: Scenario
  color: '#A0CBE8'

dimensions:
- id: scope
  label: Emission Scope
  categories:
  - id: scope1
    label: Scope 1
  - id: scope2
    label: Scope 2
  - id: scope3
    label: Scope 3

- id: sector
  label: Emission Sector
  categories:

  # ----- Inventory
  - id: i11
    label: Residential Buildings, Fuel (Inv.)
  - id: i12
    label: Residential Buildings, Grid Energy (Inv.)
  - id: i13
    label: Residential Buildings, T & D Losses (Inv.)
  - id: i21
    label: C & I Buildings, Fuel (Inv.)
  - id: i22
    label: C & I Buildings, Grid Energy (Inv.)
  - id: i23
    label: C & I Buildings, T & D Losses (Inv.)
  - id: i31
    label: Manufacturing & Construction, Fuel (Inv.)
  - id: i32
    label: Manufacturing & Construction, Grid Energy (Inv.)
  - id: i33
    label: Manufacturing & Construction, T & D Losses (Inv.)
  - id: i44
    label: Electricity Generation (Inv.)
  - id: i62
    label: Non-Specified Sources, Grid Energy (Inv.)
  - id: i63
    label: Non-Specified Sources, T & D Losses (Inv.)
  - id: ii11
    label: On-Road Transportation, Fuel (Inv.)
  - id: ii13
    label: On-Road Transportation, Outside City (Inv.)
  - id: ii21
    label: Railway Transportation, Fuel (Inv.)
  - id: ii31
    label: Waterborne Navigation, Fuel (Inv.)
  - id: ii41
    label: Aviation, Fuel (Inv.)
  - id: ii43
    label: Aviation, Outside City (Inv.)
  - id: iii11
    label: Solid Waste, Disposed in City (Inv.)
  - id: iii12
    label: Solid Waste, Disposed Outside City (Inv.)
  - id: iii21
    label: Solid Waste, Treated Biologically in City (Inv.)
  - id: iii41
    label: Wastewater, Treated in City (Inv.)
  - id: iv1
    label: Industrial Processes (Inv.)
  - id: v1
    label: Livestock (Inv.)

  # ----- Forecast
  - id: existing_buildings_part_9
    label: Existing Buildings, Part 9 (Forecast)
  - id: existing_buildings_part_3_multifamily
    label: Existing Buildings, Part 3 Multifamily (Forecast)
  - id: existing_buildings_part_3_ci
    label: Existing Buildings, Part 3 C & I (Forecast)
  - id: new_construction_part_9
    label: New Construction, Part 9 (Forecast)
  - id: new_construction_part_3_multifamily
    label: New Construction, Part 3 Multifamily (Forecast)
  - id: new_construction_part_3_ci
    label: New Construction, Part 3 C & I (Forecast)
  - id: transport_ldvs
    label: Transport, LDVs (Forecast)
  - id: transport_hdvs
    label: Transport, HDVs (Forecast)
  - id: transport_motorcycles
    label: Transport, Motorcycles (Forecast)
  - id: transport_other
    label: Transport, Other (Forecast)
  - id: agriculture_land_use
    label: Agriculture & Land Use (Forecast)
  - id: waste
    label: Waste (Forecast)
  - id: manufacturing_construction
    label: Manufacturing & Construction (Forecast)
  - id: streetlighting
    label: Streetlighting (Forecast)
  - id: electricity_generation
    label: Electricity Generation (Forecast)
  - id: ippu
    label: IPPU (Forecast)

emission_sectors:
- id: net_emissions
  name: Net Emissions
  is_outcome: true

nodes:
- id: existing_residential_building_emissions
  name: Existing Residential Building Emissions
  short_name: Existing Residential Buildings
  color: '#FFBE7D'
  order: 1
  type: formula.FormulaNode
  quantity: emissions
  unit: t_co2e/a
  input_dimensions: [sector]
  output_dimensions: [sector]
  params:
    formula: inventory + forecast
  input_datasets:
  - id: saskatoon/community_inventory
    tags: [inventory]
    column: emissions
    filters:
    - dimension: sector
      categories: [i11, i12, i13]
    - column: scope
  - id: saskatoon/community_forecast
    tags: [forecast]
    column: emissions
    forecast_from: 2024
    filters:
    - column: scenario
      value: bau_moderate
    - dimension: sector
      categories: [existing_buildings_part_9, existing_buildings_part_3_multifamily]
  input_dataset_processors: [LinearInterpolation]
  output_nodes:
  - id: net_emissions

- id: new_residential_building_emissions
  name: New Residential Building Emissions
  short_name: New Residential Buildings
  color: '#F28E2B'
  order: 2
