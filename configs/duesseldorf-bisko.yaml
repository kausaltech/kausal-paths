id: duesseldorf-bisko
default_language: de
supported_languages: [en]
site_url: https://duesseldorf-bisko.paths.kausal.tech
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 042ea36e00165e5960343bcbf5b7aa14cdc4f549
  dvc_remote: kausal-s3
name: Düsseldorf Klima-Monitor
owner: Stadt Düsseldorf
theme_identifier: de-dusseldorf
target_year: 2035
model_end_year: 2035
reference_year: 1990
minimum_historical_year: 2010
maximum_historical_year: 2023
emission_unit: kt_co2e/a
features:
  baseline_visible_in_graphs: true
  use_datasets_from_db: true
  show_explanations: true
  show_category_warnings: true

include:
- file: modules/bisko/model.yaml
  allow_override: true
  dataset_replacements:
  - from: bisko/final_energy
    to: duesseldorf/final_energy
  - from: bisko/historical_emissions
    to: duesseldorf/historical_emissions
  - from: bisko/passenger_kilometers
    to: duesseldorf/passenger_kilometers
  - from: bisko/vehicle_energy
    to: duesseldorf/vehicle_energy

#//////  Parameters  ////////////////////////////////////////////////////////////////////////////////////////////////////
params:

- id: weather_correction
  label_de: Wetterkorrektur durchführen?
  label_en: Perform weather correction?
  value: false
  is_customizable: false
  is_visible: false
- id: municipality_name
  label_en: Municipality name
  label_de: Gemeindename
  value: Düsseldorf
  is_customizable: true
  is_visible: true
- id: ags_number
  label_en: AGS number
  label_de: AGS-Nummer
  value: '5111000' # Leading zero has dropped from the dataset.
  is_customizable: false
  is_visible: false
- id: use_national_values
  label_en: Use national rather than local electricity emission factors (BISKO)
  label_de: Verwenden Sie nationale statt lokaler Stromemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true
- id: use_mileage
  label_en: Use BISKO mileage statistics rather than own energy data for 
    transport
  label_de: Nutzen Sie die BISKO-Transportstatistiken anstatt der eigenen 
    Energieverbrauchsdaten für den Transport.
  value: true
  is_visible: true
  is_customizable: true
- id: use_local_values # FIXME Make connection to district heating emission factors dataset.
  label_en: Use local rather than national district heating emission factors 
    (BISKO)
  label_de: Verwenden Sie lokale statt nationale Fernwärmeemissionsfaktoren 
    (BISKO).
  value: true
  is_visible: true
  is_customizable: true


#//////  Result Excels  ///////////////////////////////////////////////////////////////////////////////////////////////////
result_excels:
- base_excel_url: 
    https://docs.google.com/spreadsheets/d/13URk1zrbyu5Dyjw-w7tIiaAlrERNul-L/export?format=xlsx
  name_de: Stadtspezifische Werte aus BISKO-Datensätzen und anderen Quellen
  name_en: City-specific values from BISKO datasets and elsewhere
  node_ids:
  - weather_correction
  - final_energy_use
  - final_energy_use_data_quality
  # - final_municipal_facilities_energy_use_by_type
  # - municipal_fleet_energy
  - historical_emissions
  - end_energy_emission_factors
  - electricity_production_emission_factors
  - emission_factors_without_fuel_data
  - emission_factors_for_district_heating_by_generic_fuel
  - vehicle_kilometers_ifeu
  - other_transport_energy

#//////  Nodes  ///////////////////////////////////////////////////////////////////////////////////////////////////
nodes:
# sum up Industry + Commercial
- id: industry_commerce_emissions
  name_en: Industry & Commerce
  name_de: Gewerbe/Handel/Dienstleistungen & Industrie
  type: formula.FormulaNode
  quantity: emissions
  unit: kt_co2e/a
  input_nodes: [industry_emissions, commerce_trade_services_emissions]
  params:
  - id: formula
    value: sum_into_cat(industry_emissions + commerce_trade_services_emissions, sector, [industry, commerce_trade_services], industry_commerce)
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  output_nodes: [net_emissions]


# copy them from bisko standard and remove output node net_emissions - don't forget to put allow_override=true
- id: industry_emissions
  name_de: Industrie Emissionen
  name_en: Industry emissions
  color: '#737373'
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: final_industry_energy_use
  - id: end_energy_emission_factors

- id: commerce_trade_services_emissions
  name_de: Gewerbe, Handel, Dienstleistungen Emissionen
  name_en: Commerce, trade, services emissions
  color: '#fe8035'
  type: generic.GenericNode
  quantity: emissions
  unit: kt_co2e/a
  input_dimensions: [sector, energy_carrier]
  output_dimensions: [sector, energy_carrier]
  input_nodes:
  - id: final_commerce_trade_services_energy_use
  - id: end_energy_emission_factors


#//////  Pages  ///////////////////////////////////////////////////////////////////////////////////////////////////
pages:
- id: home
  name: Düsseldorf Treibhausgasinventar
  name_en: Düsseldorf Greenhouse Gas Inventory
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Düsseldorf Treibhausgasinventar
  lead_paragraph: Historische Treibhausgasemissionen der Stadt Düsseldorf und Asenkpfade für die Szenarien "Business as Usual" und "Klimschutzmaßnahmen erfolgreich umgesetzt".


#//////  Scenarios  ///////////////////////////////////////////////////////////////////////////////////////////////////
scenarios:

- id: baseline
  name_de: Business as Usual
  name_en: Business as Usual

- id: default
  default: true
  all_actions_enabled: true
  name_de: Klimaschutzkonzept
  name_en: Climate Protection Concept
