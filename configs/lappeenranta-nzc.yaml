nodes:

- id: net_emissions
  name_fi: Kokonaispäästöt (scope 1+2)
  name_en: Net emissions (scope 1+2)
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  description_fi: 'Päästötavoitteena on olla hiilineutraali vuonna 2030. Päästöistä
    vähennetään vähintään 80 % verrattuna vuoden 2020 tilanteeseen (363,7 kt) ja korkeintaan
    20 % (72,7 kt) kompensoidaan. (Lähde: Lappeenrannan Climate City Contract)'
  description_en: 'The emissions goal is to be carbon neutral in 2030. At least 80%
    of emissions will be reduced compared to the situation in 2020 (363.7 kt) and
    a maximum of 20% (72.7 kt) will be compensated. (Source: Lappeenranta Climate
    City Contract)'
  is_outcome: true
  input_dimensions: [scope, ghg, sector]
  output_dimensions: [scope, ghg, sector]
  target_year_goal: 72.7

- id: technical_root_node
  name: Technical root node
  description: This node is used as the outcome node of ParentActionNodes so 
    that they don't pick a random root node from the model.
  type: simple.AdditiveNode
  quantity: fraction
  unit: m**3
  historical_values: [[2018, 0.0], [2023, 0.0]]

- id: population
  name_fi: Väestön koko Lappeenrannassa
  name_en: Population size in Lappeenranta
  type: gpc.DatasetNode
  quantity: population
  unit: cap
  input_datasets: [lappeenranta/defaults]
  input_nodes:
  - id: population_growth
    tags: [arithmetic_inverse, complement_cumulative_product, non_additive]
  params:
    sector: Population

- id: population_growth
  name_fi: Väestön kasvunopeus
  name_en: Population growth
  type: gpc.DatasetNode
  quantity: rate
  unit: '%/a'
  input_datasets: [lappeenranta/defaults]
  params:
    sector: Expected annual population growth (up until 2030)

# - id: aggregated_net_emissions
#   name: Aggregated net emissions
#   type: simple.AdditiveNode
#   quantity: emissions
#   unit: kt/a
#   # is_outcome: true
#   input_nodes:
#   - id: net_emissions
#     from_dimensions:
#     - id: ghg
#       flatten: true
#     - id: scope
#       flatten: true
#     - id: sector
#       flatten: true

# ------------- Jobs -----------------

- id: total_jobs_created
  name_fi: Syntyneiden työpaikkojen määrä
  name_En: Total jobs created
  type: simple.AdditiveNode
  quantity: employment
  unit: jobs

# ------------- Costs ----------------

- id: co2_unit_price
  name_fi: Hiilidioksidin yksikköhinta
  name: CO2 unit price
  type: gpc.DatasetNode
  quantity: unit_price
  unit: EUR/t
  input_dimensions: [cost_type, ghg]
  output_dimensions: [cost_type, ghg]
  input_datasets: [lappeenranta/defaults]
  params:
    sector: Value of CO2 reduction

- id: co2_emissions_cost
  name_fi: CO2-päästön kustannus
  name_en: CO2 emissions cost
  type: simple.MultiplicativeNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type]
  output_dimensions: [stakeholder, cost_type]
  input_nodes:
  - id: co2_unit_price
    from_dimensions:
    - id: ghg
      flatten: true
    to_dimensions:
    - id: cost_type
    - id: stakeholder
      categories: [city]
  - id: net_emissions
    from_dimensions:
    - id: ghg
      flatten: true
    - id: scope
      flatten: true
    - id: sector
      flatten: true
    to_dimensions: []
  output_nodes:
  - id: total_cost

- id: total_cost
  name_fi: Kokonaiskustannus
  name_en: Total cost
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type]
  output_dimensions: [stakeholder, cost_type]

- id: aggregated_cost_types
  name_fi: Yhdistetyt kustannuslajit
  name_en: Aggregated cost types
  type: gpc.DatasetNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [cost_type, aggregated_cost_type]
  output_dimensions: [cost_type, aggregated_cost_type]
  input_datasets: [lappeenranta/defaults]
  params:
    sector: Aggregated cost types

- id: aggregated_cost
  name_fi: Yhdistetyt kustannukset
  name_en: Aggregated cost
  type: simple.MultiplicativeNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [aggregated_cost_type, stakeholder, cost_type]
  output_dimensions: [aggregated_cost_type, stakeholder, cost_type]
  input_nodes:
  - id: total_cost
    tags: [non_additive]
    to_dimensions:
    - id: cost_type
    - id: stakeholder
  - id: aggregated_cost_types
    to_dimensions:
    - id: cost_type
    - id: aggregated_cost_type

- id: discounted_cost
  name_fi: Diskontatut kustannukset
  name_en: Discounted cost
  type: costs.ExponentialNode
  quantity: currency
  unit: MEUR/a
  is_outcome: true
  input_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  output_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  input_nodes: [aggregated_cost]
  params:
  - id: annual_change
    ref: discount_rate
  - id: is_decreasing_rate
    value: true

- id: discounted_total_cost
  name_fi: Diskontatut kokonaisukustannukset
  name_en: Discounted total cost
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: stakeholder
      flatten: true
    - id: cost_type
      flatten: true
    - id: aggregated_cost_type
      flatten: true

- id: discounted_investment
  name_fi: Diskontatut sijoitukset
  name_en: Discounted investment
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type]
  output_dimensions: [stakeholder, cost_type]
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: aggregated_cost_type
#      categories: [capex]
      flatten: true
    to_dimensions:
    - id: stakeholder
    - id: cost_type

- id: discounted_benefits  # TODO Remove this if the single-node CBA visualisation gets accepted.
  name_fi: Diskontatut hyödyt
  name_en: Discounted benefits
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type]
  output_dimensions: [stakeholder, cost_type]
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: aggregated_cost_type
      categories: [capex]
      exclude: true
      flatten: true
    to_dimensions:
    - id: stakeholder
    - id: cost_type

# ------------ Lappeenranta-specific nodes -----------

- id: road_transport_emissions_intermediate
  name_fi: Tieliikenteen CO2-päästöt
  name_en: CO2 emissions from road transport
  description_fi: Päämallin ja terveysmoduulin välissä oleva välisolmu, jossa 
    summataan pois terveysmallissa tarpeettomat ulottuvuudet.
  description_en: Intermediate node between the main model and the health 
    module. Unnecessary dimensions are summed up here.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: transport_emissions
    from_dimensions:
    - id: scope
      flatten: true
    - id: energy_carrier
      categories: [petrol_diesel]
      flatten: true
    - id: transport_mode
      flatten: true
    - id: ghg
      flatten: true
  - id: freight_transport_emissions
    from_dimensions:
    - id: transport_mode
      categories: [light_trucks]
      flatten: true
    - id: pollutant
      flatten: true
    - id: energy_carrier
      flatten: true
  historical_values: [[2020, 0]]

- id: transport_co2_for_health
  name_en: CO2 emissions from road transport for health module
  name_fi: Tieliikenteen CO2-päästöt terveysmoduuliin
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: road_transport_emissions_intermediate
    to_dimensions: []

- id: district_heating_emissions_intermediate
  name_fi: Kaukolämmön CO2-päästöt
  name_en: CO2 emissions from district heating
  description_fi: Päämallin ja terveysmoduulin välissä oleva välisolmu, jossa 
    summataan pois terveysmallissa tarpeettomat ulottuvuudet.
  description_en: Intermediate node between the main model and the health 
    module. Unnecessary dimensions are summed up here.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: building_heating_emissions
    from_dimensions:
    - id: heating_type
      categories: [district_heating]
      flatten: true
    - id: fuel_type
      flatten: true
    - id: pollutant
      categories: [co2]
      flatten: true
    - id: scope
      flatten: true
  historical_values: [[2020, 0]]

- id: power_plant_emissions_for_health
  name_en: CO2 emissions from district heating for health module
  name_fi: Kaukolämmön CO2-päästöt terveysmoduuliin
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: district_heating_emissions_intermediate
    to_dimensions: []

- id: active_mobility_conversion  # TODO Should passenger and inhabitant be in the same dimension?
  name: Aktiivisen liikkumisen muunnos
  description: Tämä tekninen solmu on vain yksiköiden johdonmukaisuuden 
    varmistamiseksi.
  type: simple.AdditiveNode
  quantity: exposure
  unit: passenger
  historical_values: [[2010, 1.0], [2023, 1.0]]
  input_dataset_processors: [LinearInterpolation]

- id: amount_of_active_mobility_by_nzc
  name: Aktiivisen liikkumisen määrä NZP:n mukaan
  description_fi: Aktiivisen liikkumisen tiedot, jotka perustuvat 
    NetZeroPlanner-mallilla tuotettuun dataan. Katso myös solmu Aktiivisen 
    liikkumisen määrä HLT:n mukaan.
  type: simple.MultiplicativeNode
  quantity: exposure
  unit: km/cap/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes:
  - id: passenger_kilometres
    from_dimensions:
    - id: transport_mode
      categories: [walking]
  - id: population
    tags: [geometric_inverse]
    to_dimensions: []
  - id: active_mobility_conversion
    tags: [geometric_inverse]
    to_dimensions: []
  output_nodes:
  - id: active_mobility_combined

# ----------------------- Active mobility ------------------

- id: population_group_sizes_for_health
  name: Population group sizes
  type: gpc.DatasetNode
  quantity: population
  unit: inh
  input_dimensions: [age]
  output_dimensions: [age]
  input_datasets:
  - id: hia/heat/lappeenranta_active_mobility
  params:
    sector: Population groups

- id: population_group_shares
  name: Väestöryhmien suhteet
  type: simple.AdditiveNode
  quantity: fraction
  unit: dimensionless
  input_dimensions: [age]
  output_dimensions: [age]
  input_nodes:
  - id: population_group_sizes_for_health
  params:
    share_dimension: age
    use_input_node_unit_when_adding: true

- id: active_mover_fraction
  name_fi: Aktiivisten liikkujien osuus ikäryhmästä
  name_en: Active mover fraction in each age group
  type: gpc.DatasetNode
  quantity: fraction
  unit: '%'
  input_dimensions: [age, transport_mode]
  output_dimensions: [age, transport_mode]
  input_datasets:
  - id: hia/heat/lappeenranta_active_mobility
  params:
    sector: Fraction of movers

- id: active_mover_distance
  name_fi: Aktiivisen liikkumisen määrä HLT:n mukaan
  name_en: Active mover distance
  description_fi: Aktiivisen liikkumisen määränä käytetään aktiivisten 
    liikkujien keskimääräistä suomalaista arvoa, joka on saatu 
    Henkilöliikennetutkimuksesta 2016. Laskenta on Lehtomäen työryhmän (2021) 
    mukainen.<h3>Viitteet</h3>Heli Lehtomäki ym. 2021. Liikenteen 
    terveysvaikutukset Suomessa ja suurimmissa kaupungeissa. Suomen 
    ympäristökeskuksen raportteja 16 / 2021.
  type: gpc.DatasetNode
  quantity: mileage
  unit: km/person/d
  input_dimensions: [age, transport_mode]
  output_dimensions: [age, transport_mode]
  input_datasets:
  - id: hia/heat/lappeenranta_active_mobility
  params:
    sector: Moving distance

- id: active_mobility_by_hlt
  name_fi: Aktiivisen liikkumisen määrä ikäryhmissä
  name_en: Average active mobility in age groups
  description_fi: Tämä solmu kuvaa kyseisen väestöryhmän osuutta koko väestön 
    liikkumisesta. Summaamalla osaväestöt yhteen saadaan koko väestön 
    keskimääräinen liikkuminen.
  type: simple.MultiplicativeNode
  quantity: mileage
  unit: km/person/d
  input_dimensions: [transport_mode, age]
  output_dimensions: [transport_mode, age]
  input_nodes:
  - id: active_mover_fraction
  - id: active_mover_distance
    tags: [non_additive]
  - id: population_group_shares
    to_dimensions:
    - id: age
  output_nodes:
  - id: active_mobility_combined
    from_dimensions:
    - id: age
      flatten: true
    to_dimensions:
    - id: transport_mode

- id: active_mobility_combined
  name_fi: Aktiivisen liikkumisen yhdistelmä
  name_en: Combined active mobility
  description_fi: 'Tässä on yhdistetty kaksi tietolähdettä: toisaalta NetZeroCities-raportointi
    ja toisaalta Henkilöliikennetutkimus 2016. Tästä eteenpäin käytetään näiden lähteiden
    keskiarvoa.'
  type: simple.AdditiveNode
  quantity: mileage
  unit: km/person/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]

- id: active_mobility_average
  name_fi: Aktiivisen liikkumisen keskiarvo
  name_en: Average active mobility
  description_fi: 'Tässä on yhdistetty kaksi tietolähdettä: toisaalta NetZeroCities-raportointi
    ja toisaalta Henkilöliikennetutkimus 2016. Tämä on näiden lähteiden keskiarvoa.
    Tämä solmu toimii myös välisolmuna terveysvaikutusmalliin.'
  type: simple.FixedMultiplierNode
  quantity: mileage
  unit: km/person/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes: [active_mobility_combined]
  output_nodes:
  - id: active_mobility_distance
  params:
  - id: multiplier
    value: 0.5
    unit: dimensionless

# ------------- Effects from the other parts of the NZC model ---------

- id: other_health_effects_from_nzc
  name_fi: Muita terveysvaikutuksia NZC-mallista
  name_en: Other health effects from the NZC model
  description_fi: Lappeenrannan mallin pohjana oleva NetZeroPlanner laskee myös 
    joitakin terveyskustnnuksia liikenteelle. Nämä ovat osittain päällekkäisiä 
    THL:n mallin kanssa (pienhiukkaskuolemat) ja osittain WHO/HEATin kanssa 
    (liikenneonnettomuudet). On siis syytä olla tarkkana näiden kanssa. Ne on 
    kuitenkin toistaiseksi nostettu tänne vertailua varten.
  description_en: Other health impacts from the NetZeroPlanner model.
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [cost_type, transport_mode]
  output_dimensions: [cost_type, transport_mode]
  input_nodes:
  - id: transport_noise_cost
    from_dimensions:
    - id: stakeholder
      flatten: true
  - id: transport_accident_cost
    from_dimensions:
    - id: stakeholder
      flatten: true
  - id: transport_air_pollution_costs
    from_dimensions:
    - id: stakeholder
      flatten: true
    - id: pollutant
      flatten: true
  - id: walking_cycling_co_benefit
    from_dimensions:
    - id: stakeholder
      flatten: true
  output_nodes:
  - id: health_costs_attributed_to_exposure
    from_dimensions:
    - id: transport_mode
      flatten: true
    to_dimensions:
    - id: cost_type
    - id: response
      categories: [nzp_response]
    - id: iteration
      categories: [nzp]

pages:
- id: home
  name: Hiilineutraali Lappeenranta -päästöskenaario
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Lappeenrannan päästöskenaariot
  lead_title_en: Lappeenranta emission scenarios
  lead_paragraph: Lappeenrannan päästöskenaariot visualisoi Lappeenrannan 
    kasvihuonekaasupäästöjen kehityksen. Voit tarkastella, mistä Lappeenrannan 
    kaupungin alueen päästöt syntyvät ja kuinka niiden ennustetaan muuttuvan 
    vuoteen 2030 mennessä. Valittavana on peruskehitys-skenaario, Lappeenrannan 
    ilmasto-ohjelman mukainen skenaario sekä skenaario, jota voit itse muokata. 
    Hiilineutraaliksi pääseminen edellyttää vielä lisää toimia, ja niiden 
    riittävyyttä arvioidaan jatkossa tämän työkalun avulla.

scenarios:
- id: baseline
  name: Nykykehitys
  name_en: Baseline scenario
  params:
  - id: show_scenario_impacts
    value: false

- id: default
  default: true
  name: Lappeenrannan ilmasto-ohjelma
  name_en: Lappeenranta Climate Action Plan
  all_actions_enabled: true

- id: progress_tracking
  name: Progress tracking
  all_actions_enabled: true
  is_selectable: false
  params:
  - id: measure_data_override
    value: true
  - id: measure_data_baseline_year_only
    value: false
