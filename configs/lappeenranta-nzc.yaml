id: lappeenranta-nzc
default_language: fi
supported_languages: [en]
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  dvc_remote: kausal-s3
  commit: 391dcf63f00d46c566c2d985f4b413a5e4d11f54
  # commit: 892daa0d78ff8da19b981aea687e2d8221831721 # Old Lappeenranta-specific version of nzc/defaults
theme_identifier: lpr-ilmasto
name: Lappeenrannan missiokaupungin ilmasto-ohjelma 2030
name_en: Lappeenranta Mission City Climate Action Plan 2030
owner: Lappeenrannan kaupunki
owner_en: City of Lappeenranta
emission_unit: kt/a
target_year: 2030
model_end_year: 2045
reference_year: 2022
minimum_historical_year: 2022
maximum_historical_year: 2022
emission_forecast_from: 2023
emission_dimensions: [scope, ghg, sector]
features:
  baseline_visible_in_graphs: true
  show_significant_digits: 4
  maximum_fraction_digits: 2
  hide_node_details: false
  hide_scenario_editor: false

include:
- file: modules/health/air_pollution_exposure.yaml
  # Intermodular nodes: transport_co2_for_health, power_plant_emissions_for_health
  node_group: Health
  allow_override: true
- file: modules/health/active_mobility.yaml
  # Intermodular nodes: passenger_transport_for_health, population_group_sizes_for_health
  node_group: Health
  allow_override: true
- file: modules/health/attribution_and_cost.yaml
  node_group: Health
  allow_override: true
- file: nzc.yaml
  allow_override: true
  dataset_replacements:
  - from: nzc/defaults
    to: lappeenranta/defaults
  - from: nzc/electricity
    to: lappeenranta/electricity
  - from: nzc/passenger_transport_need_fleet
    to: lappeenranta/passenger_transport_need_fleet
  - from: nzc/buildings_stock_renovation
    to: lappeenranta/buildings_stock_renovation
  - from: nzc/freight_transport
    to: lappeenranta/freight_transport
  - from: nzc/buildings_heating_fuel_tech
    to: lappeenranta/buildings_heating_fuel_tech
  - from: nzc/buildings_materials_costs
    to: lappeenranta/buildings_materials_costs
  - from: nzc/transport_actions
    to: lappeenranta/transport_actions
  - from: nzc/passenger_transport_costs_ownership
    to: lappeenranta/passenger_transport_costs_ownership
  - from: nzc/waste_management
    to: lappeenranta/waste_management
  - from: nzc/buildings_heating_costs
    to: lappeenranta/buildings_heating_costs
  - from: nzc/passenger_transport_costs_walking_pt
    to: lappeenranta/passenger_transport_costs_walking_pt
  - from: nzc/other_sectors
    to: lappeenranta/other_sectors
  - from: nzc/passenger_transport_costs_external
    to: lappeenranta/passenger_transport_costs_external
  - from: nzc/passenger_transport_emissions
    to: lappeenranta/passenger_transport_emissions
  - from: nzc/waste_recycling_shares
    to: lappeenranta/waste_recycling_shares
  - from: nzc/population
    to: lappeenranta/population
  - from: nzc/building_actions
    to: lappeenranta/building_actions
  - from: nzc/waste_recycling_goal
    to: lappeenranta/waste_recycling_goal
  - from: nzc/other_actions
    to: lappeenranta/other_actions
  - from: nzc/buildings_heating_emission_factors
    to: lappeenranta/buildings_heating_emission_factors

params:
- id: municipality_name
  value: Lappeenranta
- id: discount_rate
  label: Discount rate
  value: 3.5
  min_value: 0
  max_value: 5
  unit: '%'
  is_visible: true
  is_customizable: false
- id: show_scenario_impacts
  label: Show scenario impacts instead of node outputs?
  value: false
  is_visible: false
  is_customizable: true
- id: statistical_correction
  label: Statistical correction
  value: true
  is_visible: true
  is_customizable: true
- id: measure_data_override
  value: false
  is_visible: false
  is_customizable: false
- id: measure_data_baseline_year_only
  value: false
  is_visible: false
  is_customizable: false

action_groups:
- id: transport
  name_en: 1. Transport
  name: 1. Liikenne
  color: '#93c572'
- id: freight_transport
  name_en: 2. Freight transport
  name: 2. Tavaraliikenne
- id: buildings
  name_en: 3. Buildings
  name: 3. Rakennukset
  color: '#32cd32'
- id: electricity
  name_en: 4. Electricity
  name: Sähkö
  color: '#29ab87'
- id: waste
  name_en: 5. Waste
  name: 5. Jätteet
  color: '#50c878'
- id: scope_3
  name_en: 6. Scope 3
  name: 6. Scope 3
- id: reforestation
  name_en: 7. Reforestation
  name: 7. Uudelleenmetsitys

