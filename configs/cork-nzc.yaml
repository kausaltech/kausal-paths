    tags: [impute]

- id: arup_consumer_electricity_price
  name_en: Consumer electricity unit price (Arup preprocessing)
  type: formula.FormulaNode
  quantity: unit_price
  unit: EUR/kWh
  input_datasets:
  - id: cork/preprocessing_data_from_arup
