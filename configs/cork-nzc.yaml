    tags: [action]
    from_dimensions:
    - id: project
      flatten: true
  input_datasets:
  - id: cork/social_housing
    column: actual_costs
    tags: [cost_per_apartment, cleaned]
  - id: cork/social_housing
    column: floor_area
    tags: [apartment_floor_area, cleaned]
  output_nodes:
  - id: building_cost
    to_dimensions:
    - id: cost_type
      categories: [capex]
    - id: stakeholder
      categories: [city]
  params:
    formula: cost_per_apartment / apartment_floor_area * difference(action)

