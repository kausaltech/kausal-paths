nodes:

- id: active_mobility_speed
  name_fi: Aktiivisen liikkumisen keskinopeus
  name_en: Average speed of active mobility
  description_fi: Aktiivisen liikkumisen keskinopeus saadaan artikkelista Kelly 
    ym. 2014. Myös Heli Lehtomäki ym. 2021. Liikenteen terveysvaikutukset 
    Suomessa ja suurimmissa kaupungeissa. Suomen ympäristökeskuksen raportteja 
    16 / 2021.
  description_en: The average speed of active mobility is obtained from the 
    article by Kelly et al. 2014. Also Heli Lehtomäki et al. 2021. Health 
    effects of transport in Finland and major cities. Reports of the Finnish 
    Environment Institute 16 / 2021.
  type: generic.GenericNode
  quantity: speed
  unit: km/h
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_datasets:
  - id: hia/heat/lappeenranta_active_mobility  # TODO Use a generic dataset instead
    forecast_from: 2024
    filters:
    - column: Sector
      value: Average speed

- id: air_pollution_attributable_fraction
  name_fi: Ilmansaasteiden syyosuus
  name_en: Attributable fraction of air pollution
  name_de: Attributabler Anteil der Luftverschmutzung
  description_fi: 'Se osuus havaitusta tautitaakasta, joka selittyy ilmansaastealtistuksella.
    Syyosuus lasketaan näin: AF = RR / (RR + 1) missä RR on suhteellinen riski.'
  description_en: The fraction of observed disease burden that can be attributed
    to air pollution exposure. Attributable fraction is typically calculated as 
    AF = RR / (RR + 1) where RR is the relative risk.
  description_de: Der Anteil der beobachteten Krankheitslast, der auf 
    Luftschadstoffexposition zurückgeführt werden kann. Der attributable Anteil 
    wird typischerweise berechnet als AF = RR / (RR + 1), wobei RR das relative 
    Risiko ist.
  type: health.AttributableFractionRR # FIXME Convert to FormulaNode.
  quantity: exposure_response
  unit: dimensionless  # TODO Allow for different units in dataset and node.
  input_dimensions: [response, pollutant]
  output_dimensions: [response, pollutant]
  input_datasets:
  - id: hia/exposure_response/air_pollution_erf
    filters:
    - column: Route
      value: inhalation
  input_nodes:
  - id: air_pollution_exposure
    to_dimensions:
    - id: pollutant
  params:
    sector: Air pollution

- id: incidence
  name_fi: Ilmaantuvuus
  name_en: Incidence
  name_de: Inzidenz
  description_fi: Ympäristöaltisteiden kannalta olennaisten tautien ja 
    vaikutusten ilmaantuvuus. Käytetään Terveyden ja hyvinvoinnin laitoksen 
    tautitaakkamallia. Useita alkuperäislähteitä.
  description_en: Incidence of environmentally relevant diseases and effects. 
    Uses the THL disease burden model. Multiple original sources.
  description_de: Inzidenz umweltrelevanter Erkrankungen und Gesundheitseffekte.
    Verwendet das THL-Krankheitslastmodell. Mehrere Originalquellen.
  type: generic.GenericNode
  quantity: incidence
  unit: case/personyear
  input_dimensions: [response]
  output_dimensions: [response]
  input_datasets:
  - id: hia/incidence
    # tags: [bring_to_maximum_historical_year]
    filters:
    - column: place
      value: default
    - column: population
      value: default

- id: case_burden
  name_fi: Tautitaakka per tapaus
  name_en: Disease burden by case
  description_fi: Yhden tapauksen aiheuttama tautitaakka eri vasteille.
  description_en: Disease burden caused by a single case.
  type: gpc.DatasetNode
  quantity: case_burden
  unit: DALY/case
  input_dimensions: [response]
  output_dimensions: [response]
  input_datasets:
  - id: hia/heat/lappeenranta_active_mobility
    forecast_from: 1990
    # tags: [extend_all]
  params:
    sector: Case burden

- id: net_emissions
  name: Net emissions
  description: The goal is just a placeholder and not based on city decisions.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  is_outcome: true
  input_dimensions: [scope, ghg, sector]
  output_dimensions: [scope, ghg, sector]
  goals:
  - is_main_goal: true
    linear_interpolation: true
    values:
    - year: 2023
      value: 1080
    - year: 2030
      value: 216
    - year: 2035
      value: 0

- id: intake_fraction
  name_fi: Ilmansaasteiden saantiosuus
  name_en: Intake fraction of air pollution
  description_fi: 'Se osuus ilmansaastepäästöstä, joka lopulta päätyy jonkun hengittämäksi.
    Tiedot on saatu artikkelista Sebastien Humbert, Julian D. Marshall, Shanna Shaked,
    Joseph V. Spadaro, Yurika Nishioka, Philipp Preiss, Thomas E. McKone, Arpad Horvath,
    and Olivier Jolliet. Intake Fraction for Particulate Matter: Recommendations for
    Life Cycle Impact Assessment (2011). Environmental Science and Technology, 45,
    4808-4816.'
  description_en: The fraction of air pollution emissions that is eventually 
    inhaled by someone.
  type: generic.GenericNode
  quantity: fraction
  unit: ppm
  input_dimensions: [pollutant, emission_height]
  output_dimensions: [pollutant, emission_height]
  input_datasets:
  - id: hia/intake_fraction/air_pollution_if
    column: Intake fraction
    filters:
    - column: population_density
      value: average

- id: active_mobility_distance
  name_en: Active mobility distance
  type: formula.FormulaNode
  quantity: distance
  unit: km/person/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes:
  - id: passenger_kilometres
    tags: [nzc_walking]
    from_dimensions:
    - id: transport_mode
      categories: [walking]
  - id: population
  input_datasets:
