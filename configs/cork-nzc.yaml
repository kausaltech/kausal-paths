  name: 7. Reforestation

impact_overviews:

- graph_type: simple_effect
  effect_node: net_emissions
  indicator_unit: t
  label: Action impacts on total emissions during the time span

- graph_type: wedge_diagram
  label_en: Wedge diagram
  effect_node: net_emissions
  indicator_unit: Mt/a

- graph_type: stacked_raw_impact
  label_en: Budget timeline
  effect_node: total_cost
  indicator_unit: MEUR/a

- graph_type: cost_benefit
  effect_node: discounted_cost
  indicator_unit: MEUR
  stakeholder_dimension: stakeholder
  outcome_dimension: cost_type
  label: Total cost-benefit

- graph_type: cost_benefit
  effect_node: health_costs_attributed_to_exposure
  indicator_unit: MEUR
  outcome_dimension: cost_type
  label: Health costs attributed to exposure

- graph_type: cost_efficiency
  cost_node: discounted_total_cost
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Overall cost efficiency

- graph_type: cost_efficiency
  cost_node: discounted_cost_for_citizens
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Cost efficiency for citizen

- graph_type: cost_efficiency
  cost_node: discounted_cost_for_property_owners
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Cost efficiency for property owners

