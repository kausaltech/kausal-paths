  - old_building_renovation_rate_observed
  - new_building_shares
  - efficient_appliances_rate
  - building_heating_type_share
  - heating_fuel_share
  - electricity_shares
  - waste_recycling_shares
  action_ids:
  - a11_reduce_all_motorised_transport
  - a12_modal_switch_from_cars_to_other_modes
  - a13_car_pooling
