# -------------- Local waste emissions --------------

- id: local_waste_emissions
  name: Local waste emissions
  description: |
    Pollutant Release and Transfer Register (PRTR) total GHG emissions for the former Kinsale Road Landfill.
    The Kinsale Road Landfill closed in July 2009.
    PRTR methane emissions are used in this model in scope 1 emissions. However, the KPMG model only present them for transparency and historical context only and are not used in the 2023 BEI Scope 1 total. 
    Cork City Council provided site-specific operational data for the former Kinsale Road Landfill, including measured methane capture, flaring and utilisation, as well as data on waste collected at the civic amenity facility.
    Information on the operations on the former Kinsale Road Landfill.
    Source: Cork City Council
    ~55.3% used in on-site engines to generate 916 MWh of renewable electricity.
    ~45% destroyed via high-temperature flaring.
    PRTR submissions represent modelled estimates of residual emissions to atmosphere after gas capture and treatment, rather than direct measurements. 
    At mature, capped landfill sites such as Kinsale Road, diffuse methane emissions cannot be directly metered and are therefore inferred using conservative modelling assumptions.
    A significant proportion of landfill methane generated on site is measured, captured, and destroyed under controlled conditions, either through electricity generation or high-temperature flaring. 
    These quantities are supported by metered gas flows, engine performance data, flare records, and regulatory compliance monitoring, and are reflected in PRTR methane emission totals in this model but not in KPMG.
    2023 BEI Assumption about treated methane
    The 2023 BEI calculations for waste scope 1 include the  methane emissions only from flaring.
    Methane utilised for on-site electricity generation is assumed to be fully combusted and therefore does not result in methane emissions.
    Any associated CO₂ emissions are assumed to be accounted for under energy consumption in the relevant sector and are not double-counted within the waste sector.
  type: generic.GenericNode
  quantity: emissions
  unit: kg/a
  input_dimensions: [ghg, scope]
  output_dimensions: [ghg, scope]
  input_datasets:
  - id: cork/local_waste_emissions
    column: emissions

- id: local_treated_waste_emissions
  name: Local Kinsale Road Landfill emissions
  description: Methane emissions are converted to CO2 equivalent emissions by 
    considering three cases. First, methane emissions to air are multiplied by 
    global warming potential for 100 years (GWP100), which is 27.9 for methane. 
    Second, if methane is used for energy production, it is already included in 
    energy production emissions and it gets multiplier 0 here. Third, with 
    flaring, methane converts to CO2 on molar basis and therefore the mass 
    conversion is 44/16 = 2.75.
  type: formula.FormulaNode
  quantity: emissions
  unit: kt/a
  input_dimensions: [ghg, scope]
  output_dimensions: [ghg, scope]
  input_nodes:
  - id: local_waste_emissions
  output_nodes:
  - id: net_emissions
    to_dimensions:
    - id: ghg
    - id: scope
    - id: sector
      categories: [waste]
  params:
    formula: local_waste_emissions * 27.9 + energy_use * 0 + flaring * 2.75

- id: active_mobility_distance
  name_en: Active mobility distance
  type: formula.FormulaNode
  quantity: distance
  unit: km/person/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes:
  - id: passenger_kilometres
    tags: [nzc_walking]
    from_dimensions:
    - id: transport_mode
      categories: [walking]
  - id: population
  input_datasets:
  - id: cork/active_mobility
    tags: [cork_cycling, cleaned]
  params:
  - id: constant
    value: 1.0
    unit: 1/trip
  - id: formula
    value: (nzc_walking + cork_cycling + corridor) / population * constant

