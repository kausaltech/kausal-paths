    - id: scope
      categories: [scope1]
    - id: transport_mode
    - id: energy_carrier
  - id: transport_emission_factor
    from_dimensions:
    - id: pollutant
      categories: [co2]
      flatten: true
    to_dimensions:
    - id: transport_mode
    - id: ghg
      categories: [co2e]
    - id: scope
      categories: [scope1]
    - id: energy_carrier
  output_nodes:
  - id: road_transport_emissions
    from_dimensions:
    - id: transport_mode
      flatten: true
    - id: energy_carrier
      categories: [electricity]
      exclude: true
      flatten: true
    to_dimensions:
    - id: sector
      categories: [transport]
    - id: ghg
    - id: scope

- id: road_transport_emissions
  name_en: Road transport emissions
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  color: '#E15759'
  input_dimensions: [scope, ghg, sector]
  output_dimensions: [scope, ghg, sector]
  output_nodes:
  - id: net_emissions

# -------------- Arup preprocessing: modal share, heating technology, renovation --------------

- id: arup_modal_share_change_walk_cycle
  name_en: Walking/cycling modal share change, target year (Arup preprocessing)
  description_en: Cork's Transport and Mobility Plan's reference share change by
    2040, scaled down to the model's 2030 target year by straight-line 
    interpolation between the 2011 baseline and 2040 reference years. Covers 
    walking, cycling and public_transport (all three rows use the identical 
    formula in the sheet); bus/rail's own split of the public_transport figure 
    (Calculation!F943/F947) is left out for now.
  type: formula.FormulaNode
  quantity: fraction
  unit: '%'
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_datasets:
  - id: cork/preprocessing_data_from_arup
    column: modal_share_existing
    tags: [existing]
    filters:
    - column: energy_carrier
    - column: fuel_type
  - id: cork/preprocessing_data_from_arup
    column: modal_share_target_ref
    tags: [target_ref]
    filters:
    - column: energy_carrier
    - column: fuel_type
  params:
    formula: (target_ref - existing) * ((2030 - 2011) / (2040 - 2011))
  output_nodes:
  - id: relative_transport_mode_switches
    tags: [impute]

- id: arup_district_heating_share_target
  name_en: District heating share, target year (Arup preprocessing)
  description_en: DECC's district-heating target for Cork over SEAI's national 
    local-heating total (Calculation!F1043) -- reused as the denominator, same 
    figure as the local heating carrier share above.
  type: formula.FormulaNode
  quantity: fraction
  unit: '%'
  input_datasets:
  - id: cork/preprocessing_data_from_arup
    column: district_heating_target_twh
    tags: [district_target]
    filters: *drop_all_dims
  - id: cork/preprocessing_data_from_arup
    column: total_local_heating_gwh
    tags: [total_local_heating]
    filters: *drop_all_dims
  params:
    formula: district_target / total_local_heating
  output_nodes:
  - id: building_heating_type_share
    tags: [impute]
    to_dimensions:
    - id: heating_type
      categories: [district_heating]

- id: arup_renovation_rate_baseline
  name_en: Old building renovation rate, baseline (Arup preprocessing)
  description_en: Cork City Council's retrofit grant programme (units/year) over
    the total residential building stock. Scoped to old_no_renovations, matching
    how old_building_renovation_rate_observed is consumed downstream 
    (renovated_building_stock reads it against the old_no_renovations category 
    of existing_building_stock). The target-year rate (Calculation!F1029, a 
    national ~15%/year decarbonisation-scenario assumption) is left out -- worth
    confirming with Cork given it implies an ~85x jump from baseline.
  type: formula.FormulaNode
  quantity: fraction
  unit: '%/a'
  input_datasets:
  - id: cork/preprocessing_data_from_arup
    column: housing_units_retrofitted_per_year
    tags: [retrofits_per_year]
    filters: *drop_all_dims
  - id: cork/preprocessing_data_from_arup
    column: total_residential_buildings_units
    tags: [total_units]
    filters: *drop_all_dims
  params:
    formula: retrofits_per_year / total_units
  output_nodes:
  - id: old_building_renovation_rate_observed
    tags: [impute]
    to_dimensions:
    - id: building_energy_class
      categories: [old_no_renovations]

