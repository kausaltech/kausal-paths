id: cork-nzc
default_language: en
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 9e9c2483ba4459868b35f3a763a0b97c30753cae
  dvc_remote: kausal-s3
name: Cork City Benefits Planner
owner: City of Cork
theme_identifier: ie-cork
target_year: 2030
model_end_year: 2060
reference_year: 2023
minimum_historical_year: 2023
maximum_historical_year: 2020
emission_unit: kt/a
emission_forecast_from: 2025
emission_dimensions: [scope, ghg, sector]
normalizations:
- normalizer_node: population
  quantities:
  - id: emissions
    unit: t/cap/a
  - id: energy
    unit: kWh/cap/a
  - id: mileage
    unit: km/cap/a
  - id: vehicle_mileage
    unit: vkm/cap/a
  - id: passenger_mileage
    unit: pkm/cap/a
  default: false
features:
  baseline_visible_in_graphs: true
  show_significant_digits: 4
  maximum_fraction_digits: 3
  hide_node_details: false
  hide_scenario_editor: false
  show_refresh_prompt: false
  requires_authentication: true
  show_explanations: true
  use_datasets_from_db: true

include:

- file: modules/health/air_pollution_exposure.yaml
  # Intermodular nodes: transport_co2_for_health, power_plant_emissions_for_health
  node_group: Health
  allow_override: true
- file: modules/health/active_mobility.yaml
  # Intermodular nodes: passenger_transport_for_health, population_group_sizes_for_health
  node_group: Health
  allow_override: true
- file: modules/health/attribution_and_cost.yaml
  node_group: Health
  allow_override: true
- file: nzc.yaml
  allow_override: true
  dataset_replacements:
  - from: nzc/defaults
    to: cork/defaults
  - from: nzc/electricity
    to: cork/electricity
  - from: nzc/passenger_transport_need_fleet
    to: cork/passenger_transport_need_fleet
  - from: nzc/buildings_stock_renovation
    to: cork/buildings_stock_renovation
  - from: nzc/freight_transport
    to: cork/freight_transport
  - from: nzc/buildings_heating_fuel_tech
    to: cork/buildings_heating_fuel_tech
  - from: nzc/buildings_materials_costs
    to: cork/buildings_materials_costs
  - from: nzc/transport_actions
    to: cork/transport_actions
  - from: nzc/passenger_transport_costs_ownership
    to: cork/passenger_transport_costs_ownership
  - from: nzc/waste_management
    to: cork/waste_management
  - from: nzc/buildings_heating_costs
    to: cork/buildings_heating_costs
  - from: nzc/passenger_transport_costs_walking_pt
    to: cork/passenger_transport_costs_walking_pt
  - from: nzc/other_sectors
    to: cork/other_sectors
  - from: nzc/passenger_transport_costs_external
    to: cork/passenger_transport_costs_external
  - from: nzc/passenger_transport_emissions
    to: cork/passenger_transport_emissions
  - from: nzc/waste_recycling_shares
    to: cork/waste_recycling_shares
  - from: nzc/population
    to: cork/population
  - from: nzc/building_actions
    to: cork/building_actions
  - from: nzc/waste_recycling_goal
    to: cork/waste_recycling_goal
  - from: nzc/other_actions
    to: cork/other_actions
  - from: nzc/buildings_heating_emission_factors
    to: cork/buildings_heating_emission_factors

result_excels:
- base_excel_url: 
    https://docs.google.com/spreadsheets/d/13URk1zrbyu5Dyjw-w7tIiaAlrERNul-L/export?format=xlsx
  name: Climate City Contract Tables
  node_ids:
  - population
  - net_emissions
  - aggregated_cost
  - discounted_cost
  - passenger_kilometres_historical # TODO Should this be _observed?
  - vehicle_kilometres
  - freight_transport_need
  - total_building_heat_energy_use
  - total_electricity_consumption
  - collected_waste
  - a11_reduce_all_motorised_transport
  - a12_modal_switch_from_cars_to_other_modes
  - transport_efficiency
  - transport_energy_carrier_shares
  - freight_transport_energy_carrier_shares
  - average_truck_utilisation
  - electrification_year_of_transport
  - old_building_renovation_rate_observed
  - new_building_shares
  - efficient_appliances_rate
  - building_heating_type_share
  - heating_fuel_share
  - electricity_shares
  - waste_recycling_shares
  action_ids:
  - a11_reduce_all_motorised_transport
  - a12_modal_switch_from_cars_to_other_modes
  - a13_car_pooling
  - a141_electrification_of_passenger_cars
  - a142_electrification_of_buses
  - a21_optimised_logistics
  - a22_truck_fleet_electrification
  - a31_renovation_improvements
  - a32_new_building_improvements
  - a33_do_efficient_appliances
  - a34_decarbonising_heat_generation
  - a41_replace_fossil_electricity
  - a51_increase_waste_recycling
  - a61_reduced_co2_emissions_in_other_sectors

params:
- id: municipality_name
  value: Cork
- id: discount_rate
  label: Discount rate
  value: 3.5
  min_value: 0
  max_value: 5
  unit: '%'
  is_visible: true
  is_customizable: false
- id: show_scenario_impacts
  label: Show scenario impacts instead of node outputs?
  value: false
  is_visible: false
  is_customizable: true
- id: statistical_correction
  label: Statistical correction
  value: true
  is_visible: true
  is_customizable: true
- id: measure_data_override
  value: false
  is_visible: false
  is_customizable: false
- id: measure_data_baseline_year_only
  value: true
  is_visible: false
  is_customizable: false
- id: use_observations
  value: false
  is_visible: false
  is_customizable: false

action_groups:
- id: project
  name: Project-level actions
  color: '#b375c2'
- id: transport
  name: 1. Transport
  color: '#93c572'
- id: freight_transport
  name: 2. Freight transport
- id: buildings
  name: 3. Buildings
  color: '#32cd32'
- id: electricity
  name: 4. Electricity
  color: '#29ab87'
- id: waste
  name: 5. Waste
  color: '#50c878'
- id: scope_3
  name: 6. Scope 3
- id: reforestation
  name: 7. Reforestation

impact_overviews:

- graph_type: simple_effect
  effect_node: net_emissions
  indicator_unit: t
  label: Action impacts on total emissions during the time span

- graph_type: wedge_diagram
  label_en: Wedge diagram
  effect_node: net_emissions
  indicator_unit: kt/a

- graph_type: stacked_raw_impact
  label_en: Budget timeline
  effect_node: total_cost
  indicator_unit: MEUR/a

- graph_type: cost_benefit
  effect_node: discounted_cost
  indicator_unit: MEUR
  stakeholder_dimension: stakeholder
  outcome_dimension: cost_type
  label: Total cost-benefit

- graph_type: cost_benefit
  effect_node: health_costs_attributed_to_exposure
  indicator_unit: MEUR
  outcome_dimension: cost_type
  label: Health costs attributed to exposure

- graph_type: cost_efficiency
  cost_node: discounted_total_cost
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Overall cost efficiency

- graph_type: cost_efficiency
  cost_node: discounted_cost_for_citizens
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Cost efficiency for citizen

- graph_type: cost_efficiency
  cost_node: discounted_cost_for_property_owners
  effect_node: aggregated_net_emissions
  indicator_unit: EUR/t
  cost_unit: MEUR
  effect_unit: kt
  plot_limit_for_indicator: 2000
  label: Cost efficiency for property owners

dimensions:

- id: project
  label: Project
  categories:
  - id: retrokit_tackle
    label: Retrokit Tackle
  - id: railyard_apartments
    label: Railyard Apartments
  - id: creamfield_projects
    label: Creamfield Projects
  - id: ballyhooly_road
    label: Ballyhooly Road

nodes:

- id: net_emissions
  name: Net emissions
  description: The goal is just a placeholder and not based on city decisions.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  is_outcome: true
  input_dimensions: [scope, ghg, sector]
  output_dimensions: [scope, ghg, sector]
  goals:
  - is_main_goal: true
    linear_interpolation: true
    values:
    - year: 2023
      value: 1080
    - year: 2030
      value: 216
    - year: 2035
      value: 0

- id: active_mobility_distance
  name_en: Active mobility distance
  type: formula.FormulaNode
  quantity: distance
  unit: km/person/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes:
  - id: passenger_kilometres
    tags: [nzc_walking]
    from_dimensions:
    - id: transport_mode
      categories: [walking]
  - id: population
  input_datasets:
  - id: cork/active_mobility
    tags: [cork_cycling, cleaned]
  params:
  - id: constant
    value: 1.0
    unit: 1/trip
  - id: formula
    value: (nzc_walking + cork_cycling + corridor) / population * constant

- id: discounted_cost_for_property_owners
  name: Discounted cost for property owners
  type: generic.GenericNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  output_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: stakeholder
      categories: [property_owners]

- id: discounted_cost_for_citizens
  name: Discounted cost for citizens
  type: generic.GenericNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  output_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: stakeholder
      categories: [citizens]

- id: discounted_cost_for_city
  name: Discounted cost for city
  type: generic.GenericNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  output_dimensions: [stakeholder, cost_type, aggregated_cost_type]
  input_nodes:
  - id: discounted_cost
    from_dimensions:
    - id: stakeholder
      categories: [city]

- id: project_renovations
  name: Project renovations
  type: generic.GenericNode
  quantity: floor_area
  unit: m**2
  input_dimensions: [building_energy_class]
  output_dimensions: [building_energy_class]
  input_nodes:
  - id: renovation_intensity_shares
  output_nodes:
  - id: building_stock

- id: social_housing_energy_saving
  name: Social housing energy saving
  type: generic.GenericNode
  quantity: emissions
  unit: MWh/a
  input_nodes:
  - id: be_1_retrofit_social_housing
    from_dimensions:
    - id: project
      flatten: true
  input_datasets:
  - id: cork/social_housing
    column: energy_saving
  output_nodes:
  - id: building_heat_energy_use
    to_dimensions:
    - id: heating_type
      categories: [local_heating]
    - id: fuel_type
      categories: [fossil]
    - id: scope
      categories: [scope1]
    - id: building_energy_class
      categories: [old_no_renovations]
    - id: energy_carrier
      categories: [fossil]

- id: social_housing_actual_cost_incurred
  name: Social housing actual cost incurred
  type: formula.FormulaNode
  quantity: emissions
  unit: MEUR/a
  input_nodes:
  - id: be_1_retrofit_social_housing
    tags: [action]
    from_dimensions:
    - id: project
      flatten: true
  input_datasets:
  - id: cork/social_housing
    column: actual_costs
    tags: [cost_per_apartment, cleaned]
  - id: cork/social_housing
    column: floor_area
    tags: [apartment_floor_area, cleaned]
  output_nodes:
  - id: building_cost
    to_dimensions:
    - id: cost_type
      categories: [capex]
    - id: stakeholder
      categories: [city]
  params:
    formula: cost_per_apartment / apartment_floor_area * difference(action)

# ------------- Building nodes

- id: public_building_floor_area
  name: Public building floor area
  type: generic.GenericNode
  quantity: floor_area
  unit: m**2
  input_datasets:
  - id: cork/public_building_data
    column: floor_area
    forecast_from: 2025
    filters:
    - column: source
    - column: building
      flatten: true

- id: renovation_prices
  name: Renovation prices
  type: generic.GenericNode
  quantity: unit_price
  unit: EUR/m**2
  input_dimensions: [cost_type]
  output_dimensions: [cost_type]
  input_datasets:
  - id: cork/renovation_prices
    column: renovation_unit_price
    forecast_from: 2025
    filters:
    - column: source

- id: reduction_efficiency_in_residential_retrofit
  name: Reduction efficiency in residential retrofit
  type: generic.GenericNode
  description: This is a causally problematic node, as it assumes that emission 
    reductions are due to money spent, rather than actions implemented with the 
    money.
  quantity: emission_factor
  unit: t_co2e/EUR
  input_datasets:
  - id: cork/cost_data
    column: reduction_efficiency
    forecast_from: 2025
    filters:
    - column: source

- id: inflation
  name: Inflation
  type: generic.GenericNode
  quantity: fraction
  unit: '%/a'
  input_datasets:
  - id: cork/cost_data
    column: inflation
    forecast_from: 2025
    filters:
    - column: source

- id: renovation_costs
  name: Renovation costs
  type: generic.GenericNode
  quantity: currency
  unit: EUR
  input_dimensions: [cost_type]
  output_dimensions: [cost_type]
  input_nodes:
  - id: public_building_floor_area
  - id: renovation_prices
  - id: inflation
    tags: [arithmetic_inverse, complement_cumulative_product]

- id: co2_reduction_by_residential_retrofit
  name: CO2 reduction by residential retrofit
  type: generic.GenericNode
  quantity: emissions
  unit: t_co2e
  input_nodes:
  - id: renovation_costs
    from_dimensions:
    - id: cost_type
      flatten: true
  - id: reduction_efficiency_in_residential_retrofit

# Emissions saved Residential Retrofit
# Residential CAPEX & OPEX Estimates
# Inflation

# ------------ Cork-specific nodes -----------

- id: road_transport_emissions_intermediate
  name_fi: Tieliikenteen CO2-päästöt
  name_en: CO2 emissions from road transport
  description_fi: Päämallin ja terveysmoduulin välissä oleva välisolmu, jossa 
    summataan pois terveysmallissa tarpeettomat ulottuvuudet.
  description_en: Intermediate node between the main model and the health 
    module. Unnecessary dimensions are summed up here.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: transport_emissions
    from_dimensions:
    - id: scope
      flatten: true
    - id: energy_carrier
      categories: [petrol_diesel]
      flatten: true
    - id: transport_mode
      flatten: true
    - id: ghg
      flatten: true
  - id: freight_transport_emissions
    from_dimensions:
    - id: transport_mode
      categories: [light_trucks]
      flatten: true
    - id: pollutant
      flatten: true
    - id: energy_carrier
      flatten: true
  historical_values: [[2020, 0]]

- id: transport_co2_for_health
  name_en: CO2 emissions from road transport for health module
  name_fi: Tieliikenteen CO2-päästöt terveysmoduuliin
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: road_transport_emissions_intermediate
    to_dimensions: []

- id: district_heating_emissions_intermediate
  name_fi: Kaukolämmön CO2-päästöt
  name_en: CO2 emissions from district heating
  description_fi: Päämallin ja terveysmoduulin välissä oleva välisolmu, jossa 
    summataan pois terveysmallissa tarpeettomat ulottuvuudet.
  description_en: Intermediate node between the main model and the health 
    module. Unnecessary dimensions are summed up here.
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: building_heating_emissions
    from_dimensions:
    - id: heating_type
      categories: [district_heating]
      flatten: true
    - id: fuel_type
      flatten: true
    - id: pollutant
      categories: [co2]
      flatten: true
    - id: scope
      flatten: true
  historical_values: [[2020, 0]]

- id: power_plant_emissions_for_health
  name_en: CO2 emissions from district heating for health module
  name_fi: Kaukolämmön CO2-päästöt terveysmoduuliin
  type: simple.AdditiveNode
  quantity: emissions
  unit: kt/a
  input_nodes:
  - id: district_heating_emissions_intermediate
    to_dimensions: []

- id: active_mobility_conversion  # TODO Should passenger and inhabitant be in the same dimension?
  name: Aktiivisen liikkumisen muunnos
  description: Tämä tekninen solmu on vain yksiköiden johdonmukaisuuden 
    varmistamiseksi.
  type: simple.AdditiveNode
  quantity: exposure
  unit: passenger
  historical_values: [[2010, 1.0], [2023, 1.0]]
  input_dataset_processors: [LinearInterpolation]

- id: amount_of_active_mobility_by_nzc
  name: Aktiivisen liikkumisen määrä NZP:n mukaan
  description_fi: Aktiivisen liikkumisen tiedot, jotka perustuvat 
    NetZeroPlanner-mallilla tuotettuun dataan. Katso myös solmu Aktiivisen 
    liikkumisen määrä HLT:n mukaan.
  type: simple.MultiplicativeNode
  quantity: exposure
  unit: km/cap/d
  input_dimensions: [transport_mode]
  output_dimensions: [transport_mode]
  input_nodes:
  - id: passenger_kilometres
    from_dimensions:
    - id: transport_mode
      categories: [walking]
  - id: population
    tags: [geometric_inverse]
    to_dimensions: []
  - id: active_mobility_conversion
    tags: [geometric_inverse]
    to_dimensions: []
  # output_nodes:
  # - id: active_mobility_combined

# ------------- Effects from the other parts of the NZC model ---------

- id: other_health_effects_from_nzc
  name_fi: Muita terveysvaikutuksia NZC-mallista
  name_en: Other health effects from the NZC model
  description_fi: Lappeenrannan mallin pohjana oleva NetZeroPlanner laskee myös 
    joitakin terveyskustnnuksia liikenteelle. Nämä ovat osittain päällekkäisiä 
    THL:n mallin kanssa (pienhiukkaskuolemat) ja osittain WHO/HEATin kanssa 
    (liikenneonnettomuudet). On siis syytä olla tarkkana näiden kanssa. Ne on 
    kuitenkin toistaiseksi nostettu tänne vertailua varten.
  description_en: Other health impacts from the NetZeroPlanner model.
  type: simple.AdditiveNode
  quantity: currency
  unit: MEUR/a
  input_dimensions: [cost_type, transport_mode]
  output_dimensions: [cost_type, transport_mode]
  input_nodes:
  - id: transport_noise_cost
    from_dimensions:
    - id: stakeholder
      flatten: true
  - id: transport_accident_cost
    from_dimensions:
    - id: stakeholder
      flatten: true
  - id: transport_air_pollution_costs
    from_dimensions:
    - id: stakeholder
      flatten: true
    - id: pollutant
      flatten: true
  - id: walking_cycling_co_benefit
    from_dimensions:
    - id: stakeholder
      flatten: true
