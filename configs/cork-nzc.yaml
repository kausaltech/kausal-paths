id: cork-nzc
default_language: en
dataset_repo:
  url: https://github.com/kausaltech/dvctest.git
  commit: 07b87a8f497dbe4e966941e2cb09badf35b58bd0
  dvc_remote: kausal-s3
name: Cork City Benefits Planner
owner: City of Cork
theme_identifier: ie-cork
target_year: 2030
model_end_year: 2060
reference_year: 2023
minimum_historical_year: 2023
maximum_historical_year: 2020
emission_unit: kt/a
emission_forecast_from: 2025
emission_dimensions: [scope, ghg, sector]
normalizations:
- normalizer_node: population
  quantities:
  - id: emissions
    unit: t/cap/a
  - id: energy
    unit: kWh/cap/a
  - id: mileage
    unit: km/cap/a
  - id: vehicle_mileage
    unit: vkm/cap/a
  - id: passenger_mileage
    unit: pkm/cap/a
  default: false
features:
  baseline_visible_in_graphs: true
  show_significant_digits: 4
  maximum_fraction_digits: 3
  hide_node_details: false
  hide_scenario_editor: false
  show_refresh_prompt: false
  requires_authentication: true
  show_explanations: true
  use_datasets_from_db: true

include:

- file: modules/health/air_pollution_exposure.yaml
  # Intermodular nodes: transport_co2_for_health, power_plant_emissions_for_health
  node_group: Health
  allow_override: true
- file: modules/health/active_mobility.yaml
  # Intermodular nodes: passenger_transport_for_health, population_group_sizes_for_health
  node_group: Health
  allow_override: true
- file: modules/health/attribution_and_cost.yaml
  node_group: Health
  allow_override: true
- file: nzc.yaml
  allow_override: true
  dataset_replacements:
  - from: nzc/defaults
    to: cork/defaults
  - from: nzc/electricity
    to: cork/electricity
  - from: nzc/passenger_transport_need_fleet
    to: cork/passenger_transport_need_fleet
  - from: nzc/buildings_stock_renovation
    to: cork/buildings_stock_renovation
  - from: nzc/freight_transport
    to: cork/freight_transport
  - from: nzc/buildings_heating_fuel_tech
    to: cork/buildings_heating_fuel_tech
  - from: nzc/buildings_materials_costs
    to: cork/buildings_materials_costs
  - from: nzc/transport_actions
    to: cork/transport_actions
  - from: nzc/passenger_transport_costs_ownership
    to: cork/passenger_transport_costs_ownership
  - from: nzc/waste_management
    to: cork/waste_management
  - from: nzc/buildings_heating_costs
    to: cork/buildings_heating_costs
  - from: nzc/passenger_transport_costs_walking_pt
    to: cork/passenger_transport_costs_walking_pt
  - from: nzc/other_sectors
    to: cork/other_sectors
  - from: nzc/passenger_transport_costs_external
    to: cork/passenger_transport_costs_external
  - from: nzc/passenger_transport_emissions
    to: cork/passenger_transport_emissions
  - from: nzc/waste_recycling_shares
    to: cork/waste_recycling_shares
  - from: nzc/population
    to: cork/population
  - from: nzc/building_actions
    to: cork/building_actions
  - from: nzc/waste_recycling_goal
