  name: Climate City Contract Tables
  node_ids:
  - population
  - net_emissions
  - aggregated_cost
  - discounted_cost
  - passenger_kilometres_historical # TODO Should this be _observed?
  - vehicle_kilometres
  - freight_transport_need
