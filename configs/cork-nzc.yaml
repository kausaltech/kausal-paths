params:
- id: municipality_name
  value: Cork
- id: discount_rate
  label: Discount rate
  value: 3.5
  min_value: 0
  max_value: 5
  unit: '%'
  is_visible: true
  is_customizable: false
- id: show_scenario_impacts
  label: Show scenario impacts instead of node outputs?
  value: false
  is_visible: false
  is_customizable: true
- id: statistical_correction
  label: Statistical correction
  value: true
  is_visible: true
  is_customizable: true
- id: measure_data_override
  value: false
  is_visible: false
  is_customizable: false
- id: measure_data_baseline_year_only
  value: true
  is_visible: false
  is_customizable: false
- id: use_observations
  value: false
  is_visible: false
  is_customizable: false

action_groups:
- id: project
  name: Project-level actions
  color: '#b375c2'
- id: transport
  name: 1. Transport
  color: '#93c572'
- id: freight_transport
  name: 2. Freight transport
- id: buildings
  name: 3. Buildings
  color: '#32cd32'
- id: electricity
  name: 4. Electricity
  color: '#29ab87'
