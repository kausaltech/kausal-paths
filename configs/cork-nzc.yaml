actions:

# --------------- Project-level actions ----------

- id: be_1_retrofit_social_housing
  name: BE.1 Retrofit social housing
  description: The details of this action are described <a 
    href="https://cork-planner.watch-test.kausal.tech/actions/BE.1">here</a>. 
    2700 apartment will be retrofitted, assuming 100 m<sup>2</sup> per 
    apartment.
  type: simple.GenericAction
  quantity: floor_area
  unit: m**2
  group: project
  input_dimensions: [project]
  output_dimensions: [project]
  input_datasets:
  - id: sunnydale/cork/cork_actions
    column: House retrofit
    forecast_from: 2025
  output_nodes:
  - id: project_renovations
    tags: [non_additive]
    from_dimensions:
    - id: project
      flatten: true
    to_dimensions: []

- id: be_2_complete_the_railyard_apartments_and_creamfields_projects
  name: BE.2 Complete the Railyard Apartments and Creamfields Projects
  description: The details of this action are described <a 
    href="https://cork-planner.watch-test.kausal.tech/actions/BE.2">here</a>. 
    823 new homes will be built, assuming 100 m<sup>2</sup> per apartment.
  type: simple.GenericAction
  quantity: floor_area
  unit: m**2
  group: project
  input_dimensions: [project]
  output_dimensions: [project]
  input_datasets:
  - id: sunnydale/cork/cork_actions
    column: New social housing
    forecast_from: 2025
  output_nodes:
  - id: building_stock
    from_dimensions:
    - id: project
      flatten: true
    to_dimensions:
    - id: building_energy_class
      categories: [new_top_performance]

- id: tm_i_developing_ballyvolane_strategic_transport_corridor
  name: TM.1 Developing Ballyvolane Strategic Transport Corridor
  description: The details of this action are described <a 
    href="https://cork-planner.watch-test.kausal.tech/actions/TM.1">here</a>. 
    This project involves improving and upgrading Ballyhooly Road from North 
    Ring Road junction to Fox & Hounds junction and onwards to Mervue Lawn and 
    also along Ballyvolane Road from North Ring Road to Banduff Road.
  type: simple.AdditiveAction
  output_metrics:
  - id: mileage
    quantity: mileage
    unit: vkm/a
  - id: distance
    quantity: distance
    unit: Mpkm/a
  - id: currency
    quantity: currency
    unit: MEUR/a
  group: project
  input_dimensions: [project]
  output_dimensions: [project]
  input_datasets:
  - id: sunnydale/cork/cork_actions
    forecast_from: 2025
    filters:
    - column: House retrofit
    - column: New social housing
    - dimension: project
      categories: [ballyhooly_road]
  output_nodes:
  - id: vehicle_kilometres
    metrics: [mileage]
    from_dimensions:
    - id: project
      flatten: true
    to_dimensions:
    - id: transport_mode
      categories: [cars]
    - id: energy_carrier
      categories: [petrol_diesel]
  - id: transport_cost
    metrics: [currency]
    from_dimensions:
    - id: project
      flatten: true
    to_dimensions:
    - id: stakeholder
      categories: [city]
    - id: transport_mode
      categories: [cars]
    - id: cost_type
      categories: [public_and_workplace_infrastructure]
  - id: active_mobility_distance
    metrics: [distance]
    tags: [corridor]
    from_dimensions:
    - id: project
      flatten: true
    to_dimensions:
    - id: transport_mode
      categories: [cycling]

pages:
- id: home
  name: Demonstration BASIC+ Greenhouse Gas Inventory
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Climate Budgeting Tool
  lead_paragraph: |
    Climate budgeting is about including climate emissions systematically
    in the city's planning and budgeting. In the first phase, the Global Protocol
    for Community-Scale (GPC) BASIC-level emissions are considered, and actions reducing
    these emissions are considered. C40 Network's website describes
    <a href="https://www.c40knowledgehub.org/s/article/Climate-budgets-why-your-city-needs-one?language=en_US">why this work is critically important</a>.
    Oslo has been a <a href="https://www.klimaoslo.no/collection/oslos-climate-budget-2023/">pioneer city</a> in this area.
    They have also made a practical <a href="https://www.c40knowledgehub.org/s/article/Manual-for-climate-budgets-as-a-governance-tool?language=en_US">manual for cities</a>
    to guide through the climate budgeting process.

