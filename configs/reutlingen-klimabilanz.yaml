#//////  Pages  ///////////////////////////////////////////////////////////////////////////////////////////////////

pages:
- id: home
  name_de: Treibhausgasbilanz
  name_en: Greenhouse Gas Inventory
  path: /
  type: emission
  outcome_node: net_emissions
  lead_title: Treibhausgasbilanz Stadt Reutlingen
  lead_paragraph: Unsere Emissionen nach Sektoren und Jahren


#//////  Scenarios  ///////////////////////////////////////////////////////////////////////////////////////////////////


scenarios:

- id: baseline
  name_de: Business as Usual
  name_en: Business as Usual

- id: default
  default: true
  all_actions_enabled: true
  name_de: Klimaschutzkonzept
  name_en: Climate Protection Concept
