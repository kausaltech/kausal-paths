#:schema https://mise.jdx.dev/schema/mise.json
[settings]
python.uv_venv_auto = "source"
experimental = true

[tools]
prek = "latest"
vault = "latest"
fnox = "latest"

[env]
_.python.venv = { path = ".venv", create = true, uv_create_args = [] }
_.fnox-env = { tools = true }
PYTHONPATH = "{{ config_root }}"

[prepare.uv]
auto = true
run = "uv sync --all-groups --all-extras"

[prepare.uv-tools]
auto = true
description = "Install development tools with uv"
outputs = [".mise/uv_tools_installed"]
run = "sh -c 'uv tool install pyproject-fmt@latest && echo $(date) >> .mise/uv_tools_installed'"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tasks.vault-token]
description = "Refresh the Vault token in the keychain"
run = "vault login -address=https://vault.kausal.tech -path=keycloak -method=oidc -token-only | fnox set -p keychain FNOX_VAULT_TOKEN"

[tasks.portless]
description = "Run the backend with Portless"
run = "portless --name paths-backend --app-port 8041 kausal_common/development/tools/portless-backend.sh"
env = { PORTLESS_WILDCARD = "1", "PORTLESS_TLD" = "dev" }
raw = true

[tasks.export-graphql-schema]
description = "Export the GraphQL schema from the Django project"
run = [
  "mkdir -p __generated__",
  "python manage.py export_schema paths.schema > __generated__/schema.graphql",
  "ENABLE_TEST_MODE=1 python manage.py export_schema paths.schema > __generated__/schema-test-mode.graphql",
]
